# ============================================================================
# Cyber-Jianghu Agent Docker Compose (Development)
# Agent 开发环境配置 - WebSocket（主通道）+ HTTP API（辅助）
# ============================================================================
#
# 使用方式：
# 1. 确保服务端已启动
#    docker compose -f ../server/docker-compose.yml up -d
#
# 2. 首次启动 Agent 时，会自动：
#    - 生成设备 ID (device_id)
#    - 向服务端注册设备并获取 auth_token
#    - 身份信息保存到 ~/.cyber-jianghu/agent.yaml
#
# 3. 启动 Agent
#    docker compose up -d
#
# 4. 创建角色（两种方式）：
#    - Web 面板: http://localhost:23340/welcome.html
#    - CLI 命令: cyber-jianghu-agent character create <name>
#
# 5. 查看日志
#    docker compose logs -f agent
#
# 多 Agent 实例：
# 参见 QuickStart-Client-SDK.md
# ============================================================================

services:
  # ============================================================================
  # Agent（WebSocket 主通道 + HTTP API 辅助）
  # ============================================================================
  agent:
    build:
      context: ../..
      dockerfile: ./crates/agent/Dockerfile
    container_name: cyber-jianghu-agent
    restart: unless-stopped
    environment:
      # Agent 运行配置
      CYBER_JIANGHU_RUNTIME_MODE: ${AGENT_RUNTIME_MODE:-cognitive}
      CYBER_JIANGHU_PORT: ${AGENT_PORT:-23340}

      # Agent HTTP API 端口（容器内部固定为 23340)
      PORT: 23340

      # 日志级别
      RUST_LOG: ${RUST_LOG:-info}

      # WebSocket 连接配置
      # 允许非 localhost 连接（Docker 部署时允许宿主机访问）
      CYBER_JIANGHU_WS_ALLOW_EXTERNAL: ${AGENT_WS_ALLOW_EXTERNAL:-1}

      # 游戏服务器 WebSocket URL
      CYBER_JIANGHU_SERVER_WS_URL: ${SERVER_WS_URL:-ws://cyber-jianghu-server:23333/ws}

      # 游戏服务器 HTTP URL
      CYBER_JIANGHU_SERVER_HTTP_URL: ${SERVER_HTTP_URL:-http://cyber-jianghu-server:23333}
    ports:
      # WebSocket + HTTP API 端口 - OpenClaw 通过 WebSocket 连接，HTTP API 用于辅助功能
      # 多 Agent 实例时，映射不同宿主机端口：23341:23340, 23342:23340 等
      - "${AGENT_PORT:-23340}:23340"
    volumes:
      # 配置文件 - 使用 bind mount 支持热修改
      - ./config:/app/config
      # 数据持久化（SQLite 数据库、记忆存储等)
      - agent_data:/app/data
    command: ["./agent", "run", "--port", "23340"]
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "10", "http://localhost:23340/api/v1/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s
    networks:
      - cyber-jianghu-network

# ============================================================================
# 网络配置
# ============================================================================
networks:
  cyber-jianghu-network:
    external: true

# ============================================================================
# 数据卷配置
# ============================================================================
volumes:
  agent_config:
    name: cyber-jianghu-agent-config
  agent_data:
    name: cyber-jianghu-agent-data
