# ============================================================================
# Cyber-Jianghu Agent Docker Compose (Production)
# Agent 生产环境配置 - 使用预构建镜像
# ============================================================================
#
# 部署步骤：
#
# 1. 础保服务端已启动
#    docker compose -f ../server/docker-compose.prod.yml up -d
#
# 2. 从服务端获取 Agent Token
#
# 3. 设置 .env 中的 AGENT_AUTH_TOKEN
#
# 4. 启动 Agent
#    docker compose -f docker-compose.prod.yml up -d
#
# 5. 查看日志
#    docker compose -f docker-compose.prod.yml logs -f agent
#
# 多 Agent 实例：
# 复制 docker-compose.prod.yml 为 docker-compose.instance.yml
# 修改 container_name、 ports、 environment
# docker compose -f docker-compose.instance.yml up -d
#
# 注意：
# - Agent 需要先登录 GHCR 获取私有镜像
# ============================================================================

services:
  # ============================================================================
  # Agent（HTTP 模式 - 供 OpenClaw 调用）
  # ============================================================================
  agent:
    image: ghcr.io/8kugames/cyber-jianghu-agent
    container_name: cyber-jianghu-agent
    restart: unless-stopped
    environment:
      # Agent 基本配置
      CYBER_JIANGHU_AGENT_NAME: ${AGENT_NAME:-江湖侠客}
      CYBER_JIANGHU_SYSTEM_PROMPT: ${AGENT_SYSTEM_PROMPT:-你是一位行走江湖的侠客。}

      # 服务端连接配置
      CYBER_JIANGHU_SERVER_URL: ${AGENT_SERVER_URL:-ws://cyber-jianghu-server:23333/ws}
      CYBER_JIANGHU_AUTH_TOKEN: ${AGENT_AUTH_TOKEN:-}

      # Agent HTTP API 端口
      PORT: 23340

      # 日志级别
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      # HTTP API 端口
      - "${AGENT_PORT:-23340}:23340"
    volumes:
      # 配置持久化
      - agent_config:/app/config
      # 数据持久化
      - agent_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23340/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cyber-jianghu-network

# ============================================================================
# 网络配置
# ============================================================================
networks:
  cyber-jianghu-network:
    external: true
    name: cyber-jianghu-network

# ============================================================================
# 数据卷配置
# ============================================================================
volumes:
  agent_config:
    name: cyber-jianghu-agent-config
  agent_data:
    name: cyber-jianghu-agent-data
