<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>赛博江湖 - 角色创建</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <h1>赛博江湖</h1>
                <nav class="nav-tabs">
                    <a href="index.html" class="nav-tab active">创建角色</a>
                    <a href="character.html" class="nav-tab">角色信息</a>
                    <a href="manage.html" class="nav-tab">管理</a>
                </nav>
            </header>

            <main>
                <form id="character-form">
                    <!-- 基本信息 -->
                    <section class="form-section">
                        <h2>基本信息</h2>
                        <div class="form-group">
                            <label for="name">姓名 <span class="required">*</span></label>
                            <input
                                type="text"
                                id="name"
                                name="name"
                                required
                                maxlength="20"
                                placeholder="侠客姓名"
                            />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="age">年龄</label>
                                <input
                                    type="number"
                                    id="age"
                                    name="age"
                                    min="1"
                                    max="100"
                                    value="25"
                                />
                            </div>
                            <div class="form-group">
                                <label for="gender">性别</label>
                                <select id="gender" name="gender">
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="appearance">外貌描述</label>
                            <textarea
                                id="appearance"
                                name="appearance"
                                rows="3"
                                placeholder="描述角色的外貌特征（可选）"
                            ></textarea>
                        </div>
                        <div class="form-group">
                            <label for="identity">身份背景</label>
                            <input
                                type="text"
                                id="identity"
                                name="identity"
                                placeholder="如：江湖游侠、商人、书生"
                            />
                        </div>
                    </section>

                    <!-- 性格特征 -->
                    <section class="form-section">
                        <h2>性格特征</h2>
                        <div class="form-group">
                            <label>选择性格特征（可多选）</label>
                            <div class="tag-container" id="personality-tags">
                                <span class="tag" data-value="豪爽">豪爽</span>
                                <span class="tag" data-value="沉稳">沉稳</span>
                                <span class="tag" data-value="机智">机智</span>
                                <span class="tag" data-value="冷漠">冷漠</span>
                                <span class="tag" data-value="善良">善良</span>
                                <span class="tag" data-value="阴险">阴险</span>
                                <span class="tag" data-value="正义">正义</span>
                                <span class="tag" data-value="贪婪">贪婪</span>
                                <span class="tag" data-value="忠诚">忠诚</span>
                                <span class="tag" data-value="狡猾">狡猾</span>
                            </div>
                            <input type="hidden" id="personality" name="personality" />
                        </div>
                    </section>

                    <!-- 核心价值观 -->
                    <section class="form-section">
                        <h2>核心价值观</h2>
                        <div class="form-group">
                            <label>选择核心价值观（可多选）</label>
                            <div class="tag-container" id="values-tags">
                                <span class="tag" data-value="侠义">侠义</span>
                                <span class="tag" data-value="财富">财富</span>
                                <span class="tag" data-value="权力">权力</span>
                                <span class="tag" data-value="自由">自由</span>
                                <span class="tag" data-value="荣誉">荣誉</span>
                                <span class="tag" data-value="知识">知识</span>
                                <span class="tag" data-value="爱情">爱情</span>
                                <span class="tag" data-value="友情">友情</span>
                                <span class="tag" data-value="复仇">复仇</span>
                                <span class="tag" data-value="和平">和平</span>
                            </div>
                            <input type="hidden" id="values" name="values" />
                        </div>
                    </section>

                    <!-- 语言风格 -->
                    <section class="form-section">
                        <h2>语言风格</h2>
                        <div class="form-group">
                            <label for="tone">语调</label>
                            <select id="tone" name="tone">
                                <option value="">默认</option>
                                <option value="豪迈">豪迈</option>
                                <option value="温和">温和</option>
                                <option value="冷漠">冷漠</option>
                                <option value="狡黠">狡黠</option>
                                <option value="文雅">文雅</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>说话特点（可多选）</label>
                            <div class="tag-container" id="speech-patterns-tags">
                                <span class="tag" data-value="喜欢引用古诗词">喜欢引用古诗词</span>
                                <span class="tag" data-value="说话简洁">说话简洁</span>
                                <span class="tag" data-value="喜欢用成语">喜欢用成语</span>
                                <span class="tag" data-value="说话带方言">说话带方言</span>
                                <span class="tag" data-value="喜欢开玩笑">喜欢开玩笑</span>
                                <span class="tag" data-value="说话谨慎">说话谨慎</span>
                            </div>
                            <input type="hidden" id="speech_patterns" name="speech_patterns" />
                        </div>
                    </section>

                    <!-- 目标 -->
                    <section class="form-section">
                        <h2>目标</h2>
                        <div class="form-group">
                            <label for="short_term_goal">短期目标</label>
                            <input
                                type="text"
                                id="short_term_goal"
                                name="short_term_goal"
                                placeholder="如：学习一门武功"
                            />
                        </div>
                        <div class="form-group">
                            <label for="long_term_goal">长远目标</label>
                            <input
                                type="text"
                                id="long_term_goal"
                                name="long_term_goal"
                                placeholder="如：成为武林盟主"
                            />
                        </div>
                    </section>

                    <!-- 提交按钮 -->
                    <div class="form-actions">
                        <button type="submit" id="submit-btn">创建角色</button>
                    </div>
                </form>

                <!-- 结果显示 -->
                <div id="result" class="result hidden">
                    <h3>角色创建成功</h3>
                    <p>角色 ID: <span id="agent-id"></span></p>
                    <p id="message"></p>
                    <a href="character.html" class="nav-link">查看角色信息</a>
                </div>

                <!-- 错误显示 -->
                <div id="error" class="error hidden">
                    <h3>创建失败</h3>
                    <p id="error-message"></p>
                </div>
            </main>
        </div>

        <script src="js/shared.js"></script>
        <script src="script.js"></script>
    </body>
</html>
