<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>赛博江湖 - 管理</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <h1>赛博江湖</h1>
                <nav class="nav-tabs">
                    <a href="welcome.html" class="nav-tab">首页</a>
                    <a href="character.html" class="nav-tab">角色信息</a>
                    <a href="manage.html" class="nav-tab active">管理</a>
                </nav>
            </header>

            <main>
                <!-- 服务器配置 -->
                <section class="form-section">
                    <h2>服务器配置</h2>
                    <p class="section-desc">
                        配置游戏服务器地址。修改后 Agent 会自动重连。
                    </p>

                    <form id="server-form">
                        <div class="form-group">
                            <label for="server-ws-url">WebSocket 地址</label>
                            <input
                                type="text"
                                id="server-ws-url"
                                name="ws_url"
                                placeholder="ws://your-server:23333/ws"
                                required
                            />
                        </div>
                        <div class="form-group">
                            <label for="server-http-url">HTTP 地址（可选）</label>
                            <input
                                type="text"
                                id="server-http-url"
                                name="http_url"
                                placeholder="http://your-server:23333"
                            />
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="save-server-btn">保存并重连</button>
                        </div>
                    </form>

                    <div id="server-result" class="result hidden">
                        <p id="server-message"></p>
                    </div>
                    <div id="server-error" class="error hidden">
                        <p id="server-error-msg"></p>
                    </div>
                </section>

                <!-- LLM 配置 -->
                <section class="form-section" id="llm-config-section">
                    <h2>LLM 配置</h2>
                    <p class="section-desc">配置 ActorSoul 和 ReflectorSoul 使用的 LLM 模型。</p>

                    <!-- Token 使用统计 -->
                    <div class="token-stats" id="token-stats">
                        <div class="token-stat-item">
                            <span class="token-stat-label">API 调用</span>
                            <span class="token-stat-value" id="stat-total-calls">--</span>
                        </div>
                        <div class="token-stat-item">
                            <span class="token-stat-label">Prompt Tokens</span>
                            <span class="token-stat-value" id="stat-prompt-tokens">--</span>
                        </div>
                        <div class="token-stat-item">
                            <span class="token-stat-label">Completion Tokens</span>
                            <span class="token-stat-value" id="stat-completion-tokens">--</span>
                        </div>
                        <div class="token-stat-item">
                            <span class="token-stat-label">Total Tokens</span>
                            <span class="token-stat-value" id="stat-total-tokens">--</span>
                        </div>
                    </div>

                    <!-- ActorSoul 配置 -->
                    <div class="subsection">
                        <h3>ActorSoul (行动之魂)</h3>
                        <form id="actor-llm-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="actor-provider">Provider</label>
                                    <select id="actor-provider" name="provider" required>
                                        <!-- 动态加载 -->
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="actor-model">Model</label>
                                    <input type="text" id="actor-model" name="model" required />
                                </div>
                            </div>
                            <div class="form-group" id="actor-base-url-group">
                                <label for="actor-base-url">Base URL</label>
                                <input type="url" id="actor-base-url" name="base_url" />
                            </div>
                            <div class="form-group" id="actor-api-key-group">
                                <label for="actor-api-key">API Key</label>
                                <input type="password" id="actor-api-key" name="api_key" />
                                <small>留空表示不修改当前值</small>
                            </div>
                        </form>
                    </div>

                    <!-- ReflectorSoul 配置 -->
                    <div class="subsection">
                        <h3>ReflectorSoul (反思之魂)</h3>
                        <div class="form-group checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="reflector-inherit" checked />
                                使用与 ActorSoul 相同的配置
                            </label>
                        </div>

                        <form id="reflector-llm-form" class="disabled-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="reflector-provider">Provider</label>
                                    <select id="reflector-provider" name="provider" required>
                                        <!-- 动态加载 -->
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="reflector-model">Model</label>
                                    <input type="text" id="reflector-model" name="model" required />
                                </div>
                            </div>
                            <div class="form-group" id="reflector-base-url-group">
                                <label for="reflector-base-url">Base URL</label>
                                <input type="url" id="reflector-base-url" name="base_url" />
                            </div>
                            <div class="form-group" id="reflector-api-key-group">
                                <label for="reflector-api-key">API Key</label>
                                <input type="password" id="reflector-api-key" name="api_key" />
                                <small>留空表示不修改当前值</small>
                            </div>
                        </form>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="save-llm-btn">保存配置</button>
                    </div>

                    <div id="llm-config-result" class="result hidden"></div>
                    <div id="llm-config-error" class="error hidden"></div>
                </section>

            </main>
        </div>

        <script src="js/shared.js"></script>
        <script src="js/manage.js"></script>
    </body>
</html>
