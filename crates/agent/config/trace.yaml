# ============================================================================
# 训练 Trace 配置（结构化 LLM 调用记录）
# ============================================================================
#
# 启用后，agent 的人魂/天魂 LLM 调用以结构化 JSONL 落盘 + 回传 server，
# 作为专用模型训练的数据基础。
#
# 放置位置：$CYBER_JIANGHU_CONFIG_DIR/trace.yaml 或 ~/.cyber-jianghu/config/trace.yaml
# 本地输出：<data_base_dir>/<base_dir>/soul={renhun,tianhun}/agent=<id>/date=*.jsonl
# server 汇聚：回传后 server 侧 traces/ 与 reward/ 同目录树
# ============================================================================

version: "0.0.2"
description: "训练 Trace 配置（结构化 LLM 调用记录 + 回传 + 脱敏）"

# 默认开启（用户要求：支持训练专用模型，默认为开）
output:
  enabled: true
  base_dir: "traces"

# 回传控制：开时回传 server，关时仅本地
upload:
  enabled: true
  batch_size: 32

# 脱敏：玩家输入（角色设定/托梦/私聊）在注入源占位，非事后清洗
sanitize:
  enabled: true
  persona_name_hash: true        # 角色名哈希化
  persona_description_mask: true # 角色描述占位
  dream_content_mask: true       # 托梦占位
  dialogue_content_mask: true    # 玩家私聊占位
