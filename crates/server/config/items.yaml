# ============================================================================
# 物品配置
# ============================================================================
#
# 定义游戏中所有物品的属性和效果
#
# 字段说明：
#   item_id: 物品唯一标识符
#   name: 物品名称（显示用）
#   item_type: 物品类型（枚举值，见下方）
#   effects: 物品效果列表
#     - attribute: 影响的属性名（对应 attributes.yaml）
#       operation: 操作类型（add/subtract/multiply/set）
#       value: 操作值
#   description: 物品描述
#   stack_size: 最大堆叠数量（覆盖 inventory.yaml 中的默认值）
#
# item_type 枚举：
#   - consumable: 消耗品（使用后消失）
#   - currency: 货币（用于交易）
#   - weapon: 武器（装备后增加攻击力）
#   - armor: 护甲（装备后增加防御）
#   - material: 材料（用于制作）
#   - tool: 工具（制作时需要，不消耗）
# ============================================================================

version: "0.0.1"
description: "物品配置文件"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-04-21"
  author: "Cyber-Jianghu Community"
  tags: ["items", "objects", "config"]

data:
  # ============================================================================
  # 消耗品
  # ============================================================================

  - item_id: "馒头"
    name: "馒头"
    item_type: "consumable"
    effects:
      - attribute: "hunger"
        operation: "add"
        value: 60
    description: "热腾腾的馒头，吃了不饿。恢复60点饥饿值。"
    stack_size: 10

  - item_id: "水"
    name: "水"
    item_type: "consumable"
    effects:
      - attribute: "thirst"
        operation: "add"
        value: 60
    description: "清凉的井水，解渴必备。恢复60点口渴值。"
    stack_size: 10

  - item_id: "李广杏"
    name: "李广杏"
    item_type: "consumable"
    effects:
      - attribute: "hunger"
        operation: "add"
        value: 10
      - attribute: "thirst"
        operation: "add"
        value: 10
    description: "敦煌特产李广杏，甘甜多汁。恢复10点饥饿与口渴。"
    stack_size: 20

  - item_id: "李广杏干"
    name: "李广杏干"
    item_type: "consumable"
    effects:
      - attribute: "hunger"
        operation: "add"
        value: 20
      - attribute: "thirst"
        operation: "add"
        value: -5 # 吃干果会口渴
    description: "风干后的李广杏，更耐饥饿，但有些干。恢复20点饥饿，扣除5点水分。"
    stack_size: 20

  # ============================================================================
  # 货币
  # ============================================================================

  - item_id: "银子"
    name: "银子"
    item_type: "currency"
    effects:
      - attribute: "hp"
        operation: "add"
        value: -15
      - attribute: "sanity"
        operation: "add"
        value: -10
    description: "流通货币，可以用来购买物品。吞食银子会导致重金属中毒。扣除15点生命和10点精神。"
    stack_size: 9999

  # ============================================================================
  # 武器
  # ============================================================================

  - item_id: "刀"
    name: "刀"
    item_type: "weapon"
    effects:
      - attribute: "hp"
        operation: "add"
        value: -30
      - attribute: "sanity"
        operation: "add"
        value: -15
    description: "一把锋利的刀。吞刀会严重割伤口腔和食道。扣除30点生命和15点精神。"
    stack_size: 1

  - item_id: "木剑"
    name: "木剑"
    item_type: "weapon"
    effects:
      - attribute: "hp"
        operation: "add"
        value: -20
      - attribute: "sanity"
        operation: "add"
        value: -10
    description: "简单削制的木剑。啃木头会崩裂牙齿并损伤口腔。扣除20点生命和10点精神。"
    stack_size: 1

  # ============================================================================
  # 材料
  # ============================================================================

  - item_id: "面粉"
    name: "面粉"
    item_type: "material"
    effects:
      - attribute: "hunger"
        operation: "add"
        value: 5
      - attribute: "thirst"
        operation: "add"
        value: -10
    description: "精细的小麦面粉。生吃勉强充饥但极其口干。恢复5点饥饿，扣除10点水分。"
    stack_size: 20

  - item_id: "小麦"
    name: "小麦"
    item_type: "material"
    effects:
      - attribute: "hunger"
        operation: "add"
        value: 3
      - attribute: "hp"
        operation: "add"
        value: -2
    description: "金黄的小麦。生嚼能略微充饥但难以消化，会损伤肠胃。恢复3点饥饿，扣除2点生命。"
    stack_size: 50

  - item_id: "生面团"
    name: "生面团"
    item_type: "material"
    effects:
      - attribute: "hunger"
        operation: "add"
        value: 8
      - attribute: "thirst"
        operation: "add"
        value: -8
    description: "未加工的生面团。勉强能吃但口干难咽。恢复8点饥饿，扣除8点水分。"
    stack_size: 20

  - item_id: "木材"
    name: "木材"
    item_type: "material"
    effects:
      - attribute: "hp"
        operation: "add"
        value: -10
      - attribute: "sanity"
        operation: "add"
        value: -5
    description: "普通的木材，用于制作工具或武器。啃木头会崩裂牙齿。扣除10点生命和5点精神。"
    stack_size: 50
