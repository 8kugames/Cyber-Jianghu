# ============================================================================
# 地图位置配置
# ============================================================================
#
# 定义游戏世界的地图结构
# - nodes: 地点节点（地图、子场景）
# - edges: 地点之间的连接（旅行路径）
# ============================================================================

version: "0.0.1"
description: "地图位置配置文件"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-03-16"
  author: "Cyber-Jianghu Community"
  tags: ["locations", "map", "config"]

data:
  # ============================================================================
  # 地点节点
  # ============================================================================
  nodes:
    # --------------------------------------------------------------------------
    # 河西走廊 - 主地图
    # --------------------------------------------------------------------------

    - node_id: "hexi_corridor"
      name: "河西走廊"
      type: "region" # 区域级别
      parent_id: ""

    # --------------------------------------------------------------------------
    # 龙门客栈（地图）
    # --------------------------------------------------------------------------

    - node_id: "longmen_inn"
      name: "龙门客栈"
      type: "map"
      parent_id: "hexi_corridor"
      description: "大漠中的传奇客栈，各路人马汇聚之地"

    # 龙门客栈 - 子场景
    - node_id: "longmen_lobby"
      name: "大堂"
      type: "sub_scene"
      parent_id: "longmen_inn"
      description: "客栈的大堂，人声鼎沸"

    - node_id: "longmen_backyard"
      name: "后院"
      type: "sub_scene"
      parent_id: "longmen_inn"
      gatherable_items:
        - "water" # 井水
      description: "客栈后院，有一口古井"

    - node_id: "longmen_kitchen"
      name: "厨房"
      type: "sub_scene"
      parent_id: "longmen_inn"
      gatherable_items:
        - "water" # 缸中清水
      description: "客栈的厨房，飘着饭香"

    # --------------------------------------------------------------------------
    # 荒漠（地图）
    # --------------------------------------------------------------------------

    - node_id: "desert"
      name: "荒漠"
      type: "map"
      parent_id: "hexi_corridor"
      environmental_damage: 5 # 沙漠环境伤害
      gatherable_items:
        - "li_guang_apricot" # 李广杏
        - "wood" # 枯木
      description: "无尽的黄沙，危险与机遇并存"

    # --------------------------------------------------------------------------
    # 酒泉（地图）
    # --------------------------------------------------------------------------

    - node_id: "jiuquan"
      name: "酒泉"
      type: "map"
      parent_id: "hexi_corridor"
      gatherable_items:
        - "wheat" # 小麦
        - "water" # 泉水
      description: "绿洲小镇，以泉水甘美闻名"

  # ============================================================================
  # 地点连接（旅行路径）
  # ============================================================================
  edges:
    # 龙门客栈 <-> 酒泉
    - from_node_id: "longmen_inn"
      to_node_id: "jiuquan"
      travel_cost: 5 # 5 tick

    - from_node_id: "jiuquan"
      to_node_id: "longmen_inn"
      travel_cost: 5

    # 龙门客栈 <-> 荒漠
    - from_node_id: "longmen_inn"
      to_node_id: "desert"
      travel_cost: 2

    - from_node_id: "desert"
      to_node_id: "longmen_inn"
      travel_cost: 3 # 回程更累

    # 龙门客栈 <-> 子场景连接（从客栈大地图进入/离开子场景）
    - from_node_id: "longmen_inn"
      to_node_id: "longmen_lobby"
      travel_cost: 1

    - from_node_id: "longmen_lobby"
      to_node_id: "longmen_inn"
      travel_cost: 1

    - from_node_id: "longmen_inn"
      to_node_id: "longmen_backyard"
      travel_cost: 1

    - from_node_id: "longmen_backyard"
      to_node_id: "longmen_inn"
      travel_cost: 1

    - from_node_id: "longmen_inn"
      to_node_id: "longmen_kitchen"
      travel_cost: 1

    - from_node_id: "longmen_kitchen"
      to_node_id: "longmen_inn"
      travel_cost: 1

    # 龙门客栈内部移动
    - from_node_id: "longmen_lobby"
      to_node_id: "longmen_backyard"
      travel_cost: 1

    - from_node_id: "longmen_backyard"
      to_node_id: "longmen_lobby"
      travel_cost: 1

    - from_node_id: "longmen_lobby"
      to_node_id: "longmen_kitchen"
      travel_cost: 1

    - from_node_id: "longmen_kitchen"
      to_node_id: "longmen_lobby"
      travel_cost: 1

    - from_node_id: "longmen_backyard"
      to_node_id: "longmen_kitchen"
      travel_cost: 1

    - from_node_id: "longmen_kitchen"
      to_node_id: "longmen_backyard"
      travel_cost: 1
