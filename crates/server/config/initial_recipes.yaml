# ============================================================================
# 初始配方配置
# ============================================================================
#
# 定义角色创建时获得的初始配方。
# 燧人氏身份由此配置指定，Server 权威控制。
#
# 字段说明：
#   default: 所有新角色的默认配方
#   roles: 按角色名分配额外配方（匹配 agent_name）
#
# 注意：
#   - recipe_id 必须在 recipes.yaml 中定义
#   - 角色名匹配规则：agent_name 包含 role_key 即匹配
# ============================================================================

version: "0.0.1"
description: "初始配方配置"

meta:
  created_at: "2026-05-13"
  tags: ["recipes", "initial", "config"]

data:
  # 默认配方（所有新角色获得）
  default:
    - recipe_id: "磨面粉"
    - recipe_id: "揉面团"

  # 角色专属配方（匹配规则：agent_name 包含 role_key）
  roles:
    - role_key: "燧人氏"
      description: "火之始祖，掌握全部食物配方"
      recipes:
        - recipe_id: "磨面粉"
        - recipe_id: "揉面团"
        - recipe_id: "蒸馒头"
        - recipe_id: "晒杏干"
        - recipe_id: "削木剑"
