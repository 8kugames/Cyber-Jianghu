# ============================================================================
# OpenClaw Cyber-Jianghu 叙事化状态描述配置
# ============================================================================
#
# 叙事化状态描述配置，将数值状态转换为自然语言描述。
# 人魂直连 WorldState 后，NarrativeGenerator 已移除。
# 此配置仍用于 WorldState.attribute_descriptions 的阈值映射。
#
# 将数值状态转换为自然语言描述
# thresholds: 按数值范围定义叙事描述
# status_effects: 状态效果的叙事描述
#
# 数据驱动架构：直接映射到 NarrativeConfig 结构
# ============================================================================

version: "0.0.1"
description: "叙事化状态描述配置"

# ------------------------------------------------------------------
# 属性分类（供前端渲染使用）
# ------------------------------------------------------------------
attribute_categories:
  primary:
    - strength
    - agility
    - constitution
    - intelligence
    - charisma
    - luck
  status:
    - hp
    - stamina
    - satiation
    - hydration
    - qi
    - sanity
    - reputation
  derived:
    - max_carry_weight
    - physical_damage
    - dodge_rate
    - critical_rate
    - skill_learning_speed
    - exp_bonus
    - stamina_regen
    - qi_regen

# ------------------------------------------------------------------
# 属性叙事描述
# ------------------------------------------------------------------
attributes:
    # -- 状态属性 --
    hp:
      name: hp
      display_name: 生命值
      drive:
        name: "疗伤求生"
        reason: "身体受伤，需要治疗"
        goal: "寻找药物或休息疗伤"
      thresholds:
        - min: 90
          max: 100
          description: "身体状况极佳，精力充沛，几乎感受不到任何伤痛"
        - min: 70
          max: 89
          description: "身体状态良好，虽有轻微疲惫但无大碍"
        - min: 50
          max: 69
          description: "身体状况一般，能感受到明显的疲劳和轻微伤痛"
        - min: 30
          max: 49
          description: "身体虚弱，伤痛明显，行动困难"
          urgency: 5
        - min: 10
          max: 29
          description: "身受重伤，剧痛袭来，意识模糊，随时可能倒下"
          urgency: 8
        - min: 0
          max: 9
          description: "生命垂危，意识在消散，死亡的阴影笼罩着你"
          urgency: 10

    satiation:
      name: satiation
      display_name: 饱食度
      drive:
        name: "寻找食物"
        reason: "肚子饿了，需要进食"
        goal: "寻找食物充饥"
      thresholds:
        - min: 80
          max: 100
          description: "肚子很饱，完全没有饥饿感"
        - min: 60
          max: 79
          description: "肚子还算饱，暂不需要进食"
        - min: 40
          max: 59
          description: "肚子有些饿了，该找点东西吃"
          urgency: 3
        - min: 25
          max: 39
          description: "饥肠辘辘，四肢乏力，必须立即进食"
          urgency: 7
        - min: 0
          max: 24
          description: "极度饥饿，生命正在消逝，不择手段也要找到食物"
          urgency: 10

    hydration:
      name: hydration
      display_name: 饱饮度
      drive:
        name: "寻找水源"
        reason: "口渴了，需要饮水"
        goal: "寻找水源解渴"
      thresholds:
        - min: 80
          max: 100
          description: "完全不渴，身体水分充足"
        - min: 60
          max: 79
          description: "略有口渴，但暂不需要喝水"
        - min: 40
          max: 59
          description: "口渴明显，嗓子发干，该找水喝了"
          urgency: 3
        - min: 20
          max: 39
          description: "口渴难耐，急需饮水，喉咙如火烧"
          urgency: 7
        - min: 0
          max: 19
          description: "脱水严重，急需饮水，视线模糊，生命垂危"
          urgency: 10

    stamina:
      name: stamina
      display_name: 体力
      drive:
        name: "休息恢复"
        reason: "体力不支，需要休息"
        goal: "找地方休息恢复体力"
      thresholds:
        - min: 80
          max: 100
          description: "体力充沛，精神饱满，可以做任何事"
        - min: 60
          max: 79
          description: "体力尚可，虽有些疲惫但还能活动"
        - min: 40
          max: 59
          description: "体力有些不支，感到疲劳，不宜进行剧烈活动"
          urgency: 2
        - min: 20
          max: 39
          description: "精疲力竭，浑身乏力，需要休息恢复体力"
          urgency: 6
        - min: 0
          max: 19
          description: "体力耗尽，已经没有力气行动，必须立即休息"
          urgency: 9

    qi:
      name: qi
      display_name: 内力
      thresholds:
        - min: 80
          max: 100
          description: "内力充沛，真气充盈全身"
        - min: 60
          max: 79
          description: "内力充足，可以施展武功"
        - min: 40
          max: 59
          description: "内力一般，不宜过度消耗"
        - min: 20
          max: 39
          description: "内力不足，真气运行艰难"
        - min: 0
          max: 19
          description: "内力枯竭，无法运功"

    sanity:
      name: sanity
      display_name: 理智值
      thresholds:
        - min: 80
          max: 100
          description: "神志清明，思维清晰"
        - min: 60
          max: 79
          description: "精神状态良好，偶尔有些恍惚"
        - min: 40
          max: 59
          description: "有些精神恍惚，思绪不太连贯"
        - min: 20
          max: 39
          description: "理智涣散，难以集中注意力"
        - min: 0
          max: 19
          description: "神志不清，幻觉与现实交织，无法分辨真伪"

    reputation:
      name: reputation
      display_name: 声望
      thresholds:
        - min: 80
          max: 100
          description: "名震江湖，人人敬仰"
        - min: 60
          max: 79
          description: "在江湖中小有名气"
        - min: 40
          max: 59
          description: "江湖中略有耳闻"
        - min: 20
          max: 39
          description: "默默无闻的江湖人"
        - min: 0
          max: 19
          description: "籍籍无名，无人知晓"

    # -- 先天属性 --
    strength:
      name: strength
      display_name: 力量
      thresholds:
        - min: 0
          max: 0
          description: "力量"

    agility:
      name: agility
      display_name: 敏捷
      thresholds:
        - min: 0
          max: 0
          description: "敏捷"

    constitution:
      name: constitution
      display_name: 根骨
      thresholds:
        - min: 0
          max: 0
          description: "根骨"

    intelligence:
      name: intelligence
      display_name: 悟性
      thresholds:
        - min: 0
          max: 0
          description: "悟性"

    charisma:
      name: charisma
      display_name: 魅力
      thresholds:
        - min: 0
          max: 0
          description: "魅力"

    luck:
      name: luck
      display_name: 福缘
      thresholds:
        - min: 0
          max: 0
          description: "福缘"

    # -- 派生属性 --
    max_carry_weight:
      name: max_carry_weight
      display_name: 负重上限
      thresholds:
        - min: 0
          max: 0
          description: "负重上限"

    physical_damage:
      name: physical_damage
      display_name: 物理伤害
      thresholds:
        - min: 0
          max: 0
          description: "物理伤害"

    dodge_rate:
      name: dodge_rate
      display_name: 闪避率
      thresholds:
        - min: 0
          max: 0
          description: "闪避率"

    critical_rate:
      name: critical_rate
      display_name: 暴击率
      thresholds:
        - min: 0
          max: 0
          description: "暴击率"

    skill_learning_speed:
      name: skill_learning_speed
      display_name: 技能学习速度
      thresholds:
        - min: 0
          max: 0
          description: "技能学习速度"

    exp_bonus:
      name: exp_bonus
      display_name: 经验加成
      thresholds:
        - min: 0
          max: 0
          description: "经验加成"

    stamina_regen:
      name: stamina_regen
      display_name: 体力恢复
      thresholds:
        - min: 0
          max: 0
          description: "体力恢复"

    qi_regen:
      name: qi_regen
      display_name: 内力恢复
      thresholds:
        - min: 0
          max: 0
          description: "内力恢复"

# ------------------------------------------------------------------
# 状态效果描述
# ------------------------------------------------------------------
status_effects:
  poisoned:
    description: "身中剧毒，浑身难受"
  bleeding:
    description: "正在流血，伤口疼痛"
  diseased:
    description: "身患疾病，身体不适"
  exhausted:
    description: "精疲力尽，需要休息"
  stunned:
    description: "神志不清，头晕目眩"
