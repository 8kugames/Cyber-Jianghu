# ============================================================================
# 世界构建规则配置
# ============================================================================
#
# 定义游戏世界的基本规则和约束，用于：
# 1. Agent 行为验证
# 2. LLM 生成内容的边界
# 3. 世界观一致性维护
# ============================================================================

version: "0.0.1"
description: "世界构建规则配置文件"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-03-18"
  author: "Cyber-Jianghu Community"
  tags: ["world-building", "rules", "config"]

data:
  # 时代设定
  era:
    name: "北宋前期（约10世纪中国）"
    tech_level: "冷兵器时代，火药仅用于烟火"
    social_structure: "封建帝制，江湖与庙堂并存"

  # 允许的概念（武侠世界内的超自然元素）
  allowed_concepts:
    - "内力"
    - "轻功"
    - "武功"
    - "点穴"
    - "暗器"
    - "毒术"
    - "医术"
    - "易容"
    - "阵法"
    - "奇门遁甲"
    - "相术"

  # 禁止的概念（打破世界观设定）
  forbidden_concepts:
    - "魔法"
    - "仙术"
    - "法术"
    - "热武器"
    - "现代科技"
    - "超能力"
    - "异能"
    - "穿越"
    - "系统"

  # 叙事规则（供 LLM 理解的详细说明）
  narrative_rules: |
    ## 时代背景
    北宋前期（约10世纪中国）。这是一个没有魔法、没有仙术的真实武侠世界。

    ## 力量体系
    - 唯一超自然力量：内力（通过修炼获得）
    - 武功招式：基于人体极限，非魔法效果
    - 轻功：夸张的物理现象，非飞行能力

    ## 允许的涌现
    - 武学创新（新招式、新流派）
    - 社会组织（帮派、商会、情报网）
    - 非常规策略（利用环境、心理战）
    - 江湖规矩与道义

    ## 禁止的行为
    - 打破时代设定（使用火枪、爆炸物）
    - 打破力量体系（发射气功波、御剑飞行）
    - 元游戏行为（提到"系统"、"玩家"、"NPC"）
    - 穿越者知识（引用后世诗词、科技）

  last_updated: "2026-03-13T00:00:00Z"
