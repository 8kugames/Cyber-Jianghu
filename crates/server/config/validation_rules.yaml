# ============================================================================
# 配置引用完整性验证规则
# ============================================================================
#
# 每条规则定义：从 source 配置的 source_field 路径提取引用值，
# 应在 target 配置的 target_key 路径中存在。
#
# 路径语法：
# - `*`       ：匹配 mapping 的所有值
# - `[*]`     ：匹配 sequence 的所有元素
# - `$keys`   ：提取 mapping 的所有 key（仅用于 target_key）
# - `key`     ：精确匹配 mapping 中的 key
#
# 基于 2026-06-12 config schema inventory 的 9 条规则。
# ============================================================================

rules:
  # R1: actions.yaml.requirements[*].attribute → attributes.yaml 中必须存在
  - source_type: actions
    source_field: "data.*.requirements[*].attribute"
    target_type: attributes
    target_key: "data.*.attributes.$keys"

  # R2: recipes.yaml.materials[*].item_id → items.yaml 中必须存在
  - source_type: recipes
    source_field: "data.*.materials[*].item_id"
    target_type: items
    target_key: "data[*].item_id"

  # R3: locations.yaml.edges[*].from_node_id → nodes[*].node_id 中必须存在（自引用）
  - source_type: locations
    source_field: "data.edges[*].from_node_id"
    target_type: locations
    target_key: "data.nodes[*].node_id"

  # R4: locations.yaml.edges[*].to_node_id → nodes[*].node_id 中必须存在（自引用）
  - source_type: locations
    source_field: "data.edges[*].to_node_id"
    target_type: locations
    target_key: "data.nodes[*].node_id"

  # R5: initial_inventory.yaml.items.{role}[*].item_id → items.yaml 中必须存在
  - source_type: initial_inventory
    source_field: "data.items.*.[*].item_id"
    target_type: items
    target_key: "data[*].item_id"

  # R6: initial_recipes.yaml.default[*].recipe_id → recipes.yaml 中必须存在
  - source_type: initial_recipes
    source_field: "data.default[*].recipe_id"
    target_type: recipes
    target_key: "data.$keys"

  # R7: initial_recipes.yaml.roles[*].recipes[*].recipe_id → recipes.yaml 中必须存在
  - source_type: initial_recipes
    source_field: "data.roles[*].recipes[*].recipe_id"
    target_type: recipes
    target_key: "data.$keys"

  # R8: emotion.yaml.core_affect.attributes[*].attribute → attributes.yaml 中必须存在
  - source_type: emotion
    source_field: "core_affect.attributes[*].attribute"
    target_type: attributes
    target_key: "data.*.attributes.$keys"

  # R9: game_rules.yaml.data.agent_state.location.spawn_location → locations.yaml 中必须存在
  - source_type: game_rules
    source_field: "data.agent_state.location.spawn_location"
    target_type: locations
    target_key: "data.nodes[*].node_id"
