# ============================================================================
# 因果涌现检测配置
# ============================================================================
#
# 设计原则：全部阈值/动作映射可调，脚本判定逻辑零硬编码。
# 缺失此文件时 detect_emergence.py fail-fast（与 server config 哲学一致）。
#
# 动作名（攻击/说话/予/取/教导/用/吃/喝）来自 actions.yaml，不在此重复定义，
# 仅在此声明"动作 → 社会类别"的映射规则。
# ============================================================================

version: "1.0"

detection:
  # --- 社会类别映射规则（数据驱动） ---
  category_rules:
    conflict:
      # 冲突类：攻击且成功且指向某 agent
      actions: [攻击]
      require_target: true       # 需 action_data->>'target_agent_id' 非空
      require_success: true
    trade:
      # 交易类：物品在 agent 间转移（单向原语，双向涌现即交易）
      transfer_actions:
        - { action: 予, direction_field: recipient_type, direction_value: agent }
        - { action: 取, direction_field: source_type, direction_value: agent }
    cooperation:
      # 协作类：教导配方（知识复制）
      actions: [教导]
      require_target: true
    communication:
      # 交流类：说话且成功
      actions: [说话]
      require_success: true

  # --- 事件链阈值（MVP §6.1.3 机器化） ---
  min_agents: 2                  # 簇内去重 agent 数下限
  min_actions: 3                 # 簇内动作数下限
  min_categories: 2              # 簇内覆盖社会类别数下限（conflict/trade/cooperation/communication 中）
  chain_gap_ticks: 5             # 相邻合格簇合并的最大 tick 间隔（tick_id 单位=墙钟秒，见方案）
  max_events: 50                 # 单次查询返回事件上限

causal:
  # --- 因果验证（区分真涌现 vs 虚假叙事） ---
  min_causal_edges: 1            # 候选链内经验证因果边数下限，达标则判 causal_emergence
  # thought 推理文本中匹配对方 agent 的依据
  match_by: [name, short_uuid]   # name=agent 全名；short_uuid=UUID 前 N 位
  short_uuid_len: 8

health:
  # --- MVP §6.1.2 生存能力 ---
  supply_actions: [用, 吃, 喝]   # 自主补给动作（吃/喝 是 用的归一化别名，DB 存 raw，三者均列）
  min_survivors: 3               # 窗口末点存活数下限
  min_supply_count: 3            # 每存活 agent 窗口内补给次数下限
