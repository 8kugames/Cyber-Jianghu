# ============================================================================
# OpenClaw Cyber-Jianghu 制作配方配置
# ============================================================================
#
# 配方定义：材料、工具、产出和消耗
#
# 字段说明：
#   name: 配方名称（显示用）
#   description: 配方描述
#   result_item: 产出物品 ID（对应 items.yaml）
#   result_quantity: 产出数量
#   materials: 所需材料列表
#     - item_id: 物品 ID
#       quantity: 所需数量
#   tools: 所需工具列表（物品 ID，不消耗）
#   stamina_cost: 体力消耗（对应 actions.yaml 中 craft 的基础消耗）
#
# 注意：
#   - tools 列表中的物品不会被消耗，只需存在即可
#   - 材料和工具的 item_id 必须在 items.yaml 中定义
# ============================================================================

version: "0.0.1"
description: "制作配方配置文件（统一数据格式）"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-04-21"
  author: "Cyber-Jianghu Community"
  tags:
    - recipes
    - crafting
    - config

data:
  # --------------------------------------------------------------------------
  # 食物制作
  # --------------------------------------------------------------------------

  磨面粉:
    name: 磨面粉
    description: "将小麦磨成面粉"
    result_item: 面粉
    result_quantity: 1
    materials:
      - item_id: 小麦
        quantity: 2
    tools: []
    stamina_cost: 5

  揉面团:
    name: 揉面团
    description: "将面粉和水混合，揉制成生面团"
    result_item: 生面团
    result_quantity: 1
    materials:
      - item_id: 面粉
        quantity: 1
      - item_id: 水
        quantity: 1
    tools: []
    stamina_cost: 5

  蒸馒头:
    name: 蒸馒头
    description: "用生面团蒸制而成的热馒头，能大幅恢复饥饿"
    result_item: 馒头
    result_quantity: 1
    materials:
      - item_id: 生面团
        quantity: 1
    tools: []
    stamina_cost: 10

  晒杏干:
    name: 晒杏干
    description: "风干李广杏，更易保存"
    result_item: 李广杏干
    result_quantity: 1
    materials:
      - item_id: 李广杏
        quantity: 2
    tools: []
    stamina_cost: 5

  # --------------------------------------------------------------------------
  # 武器制作
  # --------------------------------------------------------------------------

  削木剑:
    name: 削木剑
    description: "简单削制的木剑，适合防身"
    result_item: 木剑
    result_quantity: 1
    materials:
      - item_id: 木材
        quantity: 2
    tools:
      - 刀
    stamina_cost: 20
