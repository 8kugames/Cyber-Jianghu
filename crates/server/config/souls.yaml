version: "0.0.1"

data:
  souls:
    fuxi:
      display_name: "伏羲氏"
      governance_role: "evolution"
      review_policy:
        hard_approve_if: []
        hard_reject_if: []
        soft_concern_if: []
      system_prompt_template: "fuxi_review_prompt"

    shennong:
      display_name: "神农氏"
      governance_role: "survival"
      # 第二阶段延后项：神农氏核心职责（种群生存率/资源平衡/生态稳健的指标监控）
      # 当前仅参与动作演化治理共审（侧面审视）
      review_policy:
        hard_approve_if: []
        hard_reject_if: []
        soft_concern_if: []
      system_prompt_template: "shennong_review_prompt"

    xuanyuan:
      display_name: "轩辕氏"
      governance_role: "order"
      # 第二阶段延后项：轩辕氏核心职责（世界观稳定秩序监控——法则自洽/循环稳定/规则套利防御）
      # 当前仅参与动作演化治理共审（侧面审视）
      review_policy:
        hard_approve_if: []
        hard_reject_if: []
        soft_concern_if: []
      system_prompt_template: "xuanyuan_review_prompt"

  topic_to_soul:
    evolution: "fuxi"
    resource: "shennong"
    order: "xuanyuan"

  topic_priority:
    evolution: 0
    resource: 1
    order: 2

  classifier:
    confidence_threshold: 0.6
    default_fallback_topic: "evolution"

  review:
    timeout_secs: 1800
    dissent_log_threshold: 3
    # 三皇共审：三分之二批准才写入 actions.yaml
    approve_threshold: 2
    poll_interval_secs: 60
    group_stale_secs: 1800

  # 天魂层展示名映射（数据驱动，前端从 API 拉取渲染，零硬编码）
  layer_display:
    layer1: "动作审查"
    layer2: "规则校验"
    layer3: "意图审查"
