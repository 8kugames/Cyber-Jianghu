# ============================================================================
# 游戏规则配置
# ============================================================================
#
# 职责：定义现实时间和 tick 的消耗关系（服务器调度用）
# - real_seconds_per_tick: 服务器每多少秒执行一个 tick
#
# 配合 time.yaml 使用：
# - game_rules.yaml 定义"现实时间 → Tick"的转换（服务器调度）
# - time.yaml 定义"Tick → 游戏时间"的转换（游戏世界观）
#
# 示例：
# - real_seconds_per_tick: 60 → 现实每60秒执行1个tick
# - time.yaml 中 ticks_per_hour: 1 → 1 tick = 1 游戏小时
# - 结果：现实1分钟 = 1 tick = 1 游戏小时
# ============================================================================

version: "0.0.1"
description: "游戏规则配置文件"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-03-18"
  author: "Cyber-Jianghu Community"
  tags: ["rules", "gameplay", "config"]
  notes:
    - "decay 配置已移至 attributes.yaml（每属性独立配置）"
    - "action 消耗配置已移至 actions.yaml（每个动作独立配置）"
    - "此处只保留真正的全局游戏规则"
    - "tick → 游戏时间转换由 time.yaml 管理"

data:
  # Agent 状态规则
  agent_state:
    # Tick 调度配置（现实时间 → Tick 转换）
    tick:
      # 服务器每多少秒执行一个 tick
      real_seconds_per_tick: 60
      # 收集窗口时长（秒）：每个 tick 周期开始后，等待此时间再执行 tick
      # 用于收集 Agent 意图，避免意图因时序错位而丢失
      # 设为 0 可禁用收集窗口
      collection_window_secs: 55

    # 生存底线配置
    survival:
      # hunger/thirst 低于此阈值时，survival 动作绕过 ReflectorSoul 审查
      critical_threshold: 30

    # 出生点配置
    location:
      spawn_location: "longmen_lobby"

    # 游戏纪元（用于计算 tick_id）
    game_time:
      # 游戏纪元起始日期（格式：YYYY-MM-DD）
      start_date: "2026-03-03"
      # 时区偏移量（UTC+8 = 8，UTC-5 = -5）
      # 用于将 start_date 解释为当地时区的午夜
      timezone_offset: 8

  # 验证规则
  validation:
    action_validation:
      max_content_length: 500
    max_agent_name_length: 100
    max_system_prompt_length: 102400
    max_speak_content_length: 500

  # Agent 状态定义（数据驱动）
  # 用于前端显示状态标签、颜色和描述
  agent_statuses:
    # 在线（活跃+已连接）
    online:
      display_name: "在线"
      description: "当前在线的角色"
      color: "#2196F3"
      sort_order: 0
    # 活跃状态
    active:
      display_name: "活跃"
      description: "当前活跃的角色"
      color: "#4CAF50"
      sort_order: 1
    # 离线（活跃+未连接）
    offline:
      display_name: "离线"
      description: "暂时离线的角色"
      color: "#9E9E9E"
      sort_order: 2
    # 归隐（主动转生）
    retired:
      display_name: "归隐"
      description: "主动归隐的角色"
      color: "#FF9800"
      sort_order: 3
    # 死亡（被动死亡）
    dead:
      display_name: "死亡"
      description: "因饥饿、口渴或战斗而死亡的角色"
      color: "#F44336"
      sort_order: 4

  # 运维与监控配置
  ops:
    # 单个 Tick 自然死亡人数告警阈值
    death_threshold: 10
    # 离线多久（天）的 Agent 会被清理脚本删除
    offline_cleanup_days: 30

  # 死亡默认配置（当属性未配置 death_cause/death_message 时使用）
  death_defaults:
    # 未知原因死亡的默认消息
    unknown:
      cause: "unknown"
      message: "你死了..."
    # 环境伤害死亡的默认消息（当 hp 因环境伤害归零但未追踪来源时）
    environmental:
      cause: "environmental"
      message: "你被恶劣的环境吞噬..."
