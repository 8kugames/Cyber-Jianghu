# ============================================================================
# 游戏规则配置
# ============================================================================
#
# 职责：定义现实时间和 tick 的消耗关系（服务器调度用）
# - real_seconds_per_tick: 服务器每多少秒执行一个 tick
#
# 配合 time.yaml 使用：
# - game_rules.yaml 定义"现实时间 → Tick"的转换（服务器调度）
# - time.yaml 定义"Tick → 游戏时间"的转换（游戏世界观）
#
# 示例：
# - real_seconds_per_tick: 60 → 现实每60秒执行1个tick
# - time.yaml 中 ticks_per_hour: 1 → 1 tick = 1 游戏小时
# - 结果：现实1分钟 = 1 tick = 1 游戏小时
# ============================================================================

version: "0.0.1"
description: "游戏规则配置文件"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-03-18"
  author: "Cyber-Jianghu Community"
  tags: ["rules", "gameplay", "config"]
  notes:
    - "decay 配置已移至 attributes.yaml（每属性独立配置）"
    - "action 消耗配置已移至 actions.yaml（每个动作独立配置）"
    - "此处只保留真正的全局游戏规则"
    - "tick → 游戏时间转换由 time.yaml 管理"

data:
  # Agent 状态规则
  agent_state:
    # Tick 调度配置（现实时间 → Tick 转换）
    tick:
      # 服务器每多少秒执行一个 tick
      real_seconds_per_tick: 60

    # 生存底线配置
    survival:
      # 自动重生配置
      rebirth:
        # 死亡后延迟 N 个 tick 自动重生 (0 = 不自动重生)
        delay_ticks: 5
        # 重置属性到初始值
        reset_attributes: true
        # 重生地点 (空字符串 = 使用 spawn_location)
        spawn_location: ""
        # 自动重生重试次数
        retry_max_attempts: 3
        # 自动重生重试间隔（秒）
        retry_interval_secs: 30

    # 出生点配置
    location:
      spawn_location: "龙门大堂"
      # parent-child 隐式连接的默认 travel_cost
      # 节点可在 locations.yaml 中通过 implicit_travel_cost 覆盖
      default_implicit_travel_cost: 1
      # 移动体力消耗倍率（stamina_cost = travel_cost * 此值）
      travel_stamina_multiplier: 2

    # 游戏纪元（用于计算 tick_id）
    game_time:
      # 游戏纪元起始日期（格式：YYYY-MM-DD）
      start_date: "2026-03-03"
      # 时区偏移量（UTC+8 = 8，UTC-5 = -5）
      # 用于将 start_date 解释为当地时区的午夜
      timezone_offset: 8

  # 验证规则
  validation:
    action_validation:
      max_content_length: 500
    max_agent_name_length: 100
    max_system_prompt_length: 102400
    max_speak_content_length: 500

  # LLM 审核配置（天魂分级审核策略）
  # intent_batch: multi-Intent Pipeline 配置（含分级审核）
  # 注意：always_types/adaptive_types/skip_types 由 actions.yaml 的 ooc_risk 字段动态生成，
  # 此处不再手动配置。仅保留抽审辅助配置。
  intent_batch:
    # 每 tick 最大 Intent 数
    max_intents_per_tick: 5
    # 三魂循环最大重试次数
    max_retries: 12
    # LLM 连续失败多少 tick 后激活 chaos 模式
    llm_chaos_threshold: 12
    # 分级审核辅助配置
    llm_validation:
      # 每 tick 至少审核的 Intent 数量
      minimum_per_tick: 1
      # 限制区域 node_id 前缀/关键词（medium 风险 move 动作抽审用）
      restricted_area_keywords:
        - admin
        - vault
        - secret
      # 高价值物品 item_id 前缀/关键词（medium 风险 trade/steal/give 抽审用）
      high_value_item_keywords:
        - 银子
        - silver
        - gold
      # Adaptive 审核字段映射（medium 风险动作抽审逻辑用）
      adaptive_field_mapping:
        move: target_location
        trade: item_id
        steal: item_id
        give: item_id

  # 涌现配置：跨 tick 动作观察（Agent 能看到其他 Agent 做了什么）
  emergence:
    # 回溯多少个 tick 的动作历史
    recent_action_ticks: 9
    # 每个实体最多展示多少条最近动作
    max_recent_actions_per_entity: 9

  # 技能配置
  skills:
    # 单个 Agent 可掌握的技能上限
    max_skills_per_agent: 10

  # 技能习得阈值配置（数据驱动）
  # trigger_categories: 对应 actions.yaml 中每个 action 的 category
  # min_count: 该 category 的 action 成功执行多少次后自动习得
  skill_acquisition:
    social/trust-reading:
      trigger_categories: ["social"]
      min_count: 5
    social/conflict-navigation:
      trigger_categories: ["martial", "social"]
      min_count: 4
    cognitive/risk-assessment:
      trigger_categories: ["martial", "social", "survival"]
      min_count: 8
    cognitive/resource-planning:
      trigger_categories: ["survival", "economic"]
      min_count: 5
    survival/situational-awareness:
      trigger_categories: ["martial", "survival"]
      min_count: 6

  # 即时事件处理配置
  immediate_events:
    # 事件 triage 配置（DB 持久化 + Session LLM 分流）
    event_triage:
      # Session 生命周期
      lifecycle: game_day
      # 无事件时的兜底轮询间隔（秒）
      poll_interval_secs: 10
      # 收到事件后的收集窗口（秒）
      debounce_secs: 3
      # 单次 triage LLM 调用超时（ms）
      triage_llm_timeout_ms: 10000
      # SQL 预筛
      pre_filter:
        max_events_per_triage: 50
        default_priority: 0
        fallback_urgent_cutoff_priority: 80
        fallback_ignore_cutoff_priority: 20
        event_type_priority:
          death_notification: 100
          private_dialogue: 80
          social_interaction: 60
          state_change: 50
          action_result: 40
          public_message: 20
          environmental_change: 10
          system_notification: 10
          time_update: 5
      # 主 tick 上下文注入
      context:
        max_urgent_events: 5
        max_batch_summary_chars: 500
      # 保留最近 N 个游戏日的事件
      retention_game_days: 3
      # 每日摘要写入 episodic memory 的 importance (0.0-1.0)
      daily_summary_importance: 0.8

  # Agent 状态定义（数据驱动）
  # 用于前端显示状态标签、颜色和描述
  agent_statuses:
    # 在线（活跃+已连接）
    online:
      display_name: "在线"
      description: "当前在线的角色"
      color: "#2196F3"
      sort_order: 0
    # 活跃状态
    active:
      display_name: "活跃"
      description: "当前活跃的角色"
      color: "#4CAF50"
      sort_order: 1
    # 离线（活跃+未连接）
    offline:
      display_name: "离线"
      description: "暂时离线的角色"
      color: "#9E9E9E"
      sort_order: 2
    # 归隐（主动转生）
    retired:
      display_name: "归隐"
      description: "主动归隐的角色"
      color: "#FF9800"
      sort_order: 3
    # 死亡（被动死亡）
    dead:
      display_name: "死亡"
      description: "因饥饿、口渴或战斗而死亡的角色"
      color: "#F44336"
      sort_order: 4

  # 运维与监控配置
  ops:
    # 单个 Tick 自然死亡人数告警阈值
    death_threshold: 10
    # 离线多久（天）的 Agent 会被清理脚本删除
    offline_cleanup_days: 30

  # 每日 LLM 日志摘要提交配置
  daily_summary:
    # 发送失败时的最大重试次数
    max_retries: 3
    # 超过此 tick 数后丢弃（防止跨 game_day 重试）
    ttl_ticks: 10080

  # 群像传记配置
  chronicle:
    # 关键事件每个类型的最大数量
    highlight_threshold: 3
    # 传记生成周期（游戏日）
    days_per_period: 7

  # 死亡默认配置（当属性未配置 death_cause/death_message 时使用）
  death_defaults:
    # 未知原因死亡的默认消息
    unknown:
      cause: "unknown"
      message: "你死了..."
    # 环境伤害死亡的默认消息（当 hp 因环境伤害归零但未追踪来源时）
    environmental:
      cause: "environmental"
      message: "你被恶劣的环境吞噬..."
    # 寿终正寝死亡的默认消息
    old_age:
      cause: "old_age"
      message: "你已寿终正寝，安详离世......"

  # 寿命配置（数据驱动，下发到 Agent 端）
  # max_age: 角色最大寿命（岁），超过后寿终正寝
  # aging_start_age: 衰老叙事开始年龄
  lifespan:
    max_age: 80
    aging_start_age: 50
    starting_age: 18

  # 跨 Agent 传承 Layer 2: 共享教训库
  # threshold: 同一死因累计多少次死亡后生成教训
  # max_broadcast: WorldState 下发最多几条教训
  # cause_advice_map: 死因 → 中文标签/建议映射（数据驱动，可扩展）
  lesson:
    threshold: 3
    max_broadcast: 5
    cause_advice_map:
      hunger:
        label: "饥饿"
        advice: "请留意饱食度，及时进食"
      thirst:
        label: "口渴"
        advice: "请留意水分，及时饮水"
      hp:
        label: "外伤"
        advice: "请避免危险区域，注意安全"
      old_age:
        label: "寿终正寝"
        advice: "自然规律，无人可免"
      environmental:
        label: "环境"
        advice: "请注意天气和环境影响"
