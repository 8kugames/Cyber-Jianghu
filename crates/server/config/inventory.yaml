# ============================================================================
# 背包系统配置
# ============================================================================
#
# 定义玩家背包的限制参数
#
# 字段说明：
#   max_slots: 背包最大槽位数（不同物品类型的上限）
#   max_stack_size: 每个槽位最大堆叠数量（同类物品可堆叠上限）
#
# 注意：
#   - 负重上限由 attributes.yaml 中的 max_carry_weight 派生属性决定
#   - 具体物品的 stack_size 在 items.yaml 中单独定义
# ============================================================================

version: "0.0.1"
description: "背包系统配置"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-03-19"
  author: "Cyber-Jianghu Community"
  tags: ["inventory", "backpack", "config"]

data:
  # 背包最大槽位数（不同物品类型上限）
  max_slots: 10
  # 每个槽位最大堆叠数量（同类物品可堆叠上限，具体物品可覆盖此值）
  max_stack_size: 10
