  逃跑:
    name: "逃跑"
    description: "尝试脱离战斗或危险情境，移动到相邻位置。必须指定逃跑目标位置（target_location）。成功率由敏捷属性决定的公式计算，失败则留在原地但仍消耗体力。"
    category: combat
    ooc_risk: low
    transmission: silent
    flee_success_formula: "agility * 0.03"
    default_flee_success_rate: 0.5
    validation:
      required_fields:
        - target_location
      field_aliases:
        target_location: ["目标地点", "目的地", "destination"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 15
        cost: 10

  # ==========================================================================
  # 江湖技能
  # ==========================================================================
  偷窃:
    name: "偷窃"
    description: "尝试从目标 Agent 身上偷取物品。必须指定目标 Agent ID（target_agent_id）和物品 ID（item_id）。成功率由属性决定，失败可能被目标发现并遭受惩罚。此动作需要目标存活。注意区分：给予 是主动提供，偷窃 是偷窃（目标不知情）。"
    category: martial
    ooc_risk: medium
    transmission: silent
    success_rate_formula: "agility * 0.02 + luck * 0.01"
    detection_threshold: 0.3
    validation:
      requires_target: true
      requires_target_alive: true
      requires_target_colocated: true
      required_fields:
        - target_agent_id
        - item_id
      field_aliases:
        target_agent_id: ["目标人物ID", "对象ID", "目标ID"]
        item_id: ["物品ID", "物品", "item"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 5

  # NOTE: 以下江湖技能动作仅有 generic fallback，无实际效果
  # 取消注释前需实现对应 executor：
  #   - stealth: 需 AgentState.stealth_status + 发现概率判定
  #   - poison: 需 StateChange::PoisonApplied + 多 tick 持续伤害
  #   - practice: 需 AgentState.skills + 技能进度系统
