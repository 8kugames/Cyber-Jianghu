  meditate:
    name: "打坐"
    aliases: ["冥想", "打坐冥想"]
    description: "通过打坐恢复内力和心神。不消耗体力，但需要一定体力才能执行。打坐是恢复理智的有效方式。注意区分：meditate 恢复内力和理智，idle 恢复体力和少量理智。"
    category: martial
    ooc_risk: low
    validation: {}
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 0
    effects:
      - effect_type: attribute_change
        attribute: qi
        operation: add
        value: 15
      - effect_type: attribute_change
        attribute: sanity
        operation: add
        value: 5

  practice:
    name: "修炼"
    aliases: ["练功", "练习", "练"]
    description: "通过练习提升武功技能进度。必须指定技能 ID（skill_id）。消耗体力，当前无实际技能系统，修炼仅验证 skill_id 有效后返回成功。"
    category: martial
    ooc_risk: low
