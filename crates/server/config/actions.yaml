      field_aliases:
        content: ["内容", "消息", "话语", "message", "text"]
      field_validations:
        - field: content
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 0
        cost: 1
    effects:
      - effect_type: attribute_change
        attribute: thirst
        operation: add
        value: 2

  私语:
    name: "私语"
    description: "对目标 Agent 说悄悄话，只有目标和说话者能听到。必须指定目标 Agent ID（target_agent_id）和内容（content）。私语是私密对话，不会被在场其他 Agent 听到。注意区分：私语 是私聊（只有目标听到），说话 是公开说（所有人都听到）。"
    category: social
    ooc_risk: high
    transmission: session
    max_content_length: 200
    validation:
      requires_target: true
      requires_target_colocated: true
      required_fields:
        - target_agent_id
        - content
      field_aliases:
        target_agent_id: ["目标人物ID", "对象ID", "目标ID"]
        content: ["内容", "消息", "话语", "message"]
      field_validations:
        - field: content
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: qi
        min: 0
        cost: 2

  # NOTE: 以下社交动作仅有 generic fallback，无实际效果
  #   - follow: 需 AgentState.following + 移动同步逻辑
  #
  大喊:
    name: "大喊"
    display_name: "呼喊"
    description: "向当前位置大声喊叫，内容可被所有在场 Agent 听到。必须指定内容（content）。消耗较多体力。注意区分：大喊 是大喊，说话 是普通说话，私语 是私聊（仅双方可见）。"
    category: social
    ooc_risk: high
    transmission: silent
    max_content_length: 300
    validation:
      required_fields:
        - content
      field_aliases:
        content: ["内容", "消息", "话语", "message"]
      field_validations:
        - field: content
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 3
