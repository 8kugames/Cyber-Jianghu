  # ==========================================================================
  # 经济
  # ==========================================================================
  give:
    name: "给予物品"
    aliases: ["赠送", "给", "送"]
    description: "将自己的物品给予目标 Agent。必须指定目标 Agent ID（target_agent_id）、物品 ID（item_id）和数量（quantity）。发起方单方面将物品从背包转移到目标背包。注意区分：give 是主动给予，steal 是偷窃（目标不知情）。"
    category: economic
    ooc_risk: medium
    validation:
      requires_target: true
      requires_target_alive: true
      required_fields:
        - target_agent_id
        - item_id
        - quantity
      field_aliases:
