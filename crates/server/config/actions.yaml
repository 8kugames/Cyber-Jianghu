    name: "偷窃"
    aliases: ["偷", "窃取"]
    description: "尝试从目标 Agent 身上偷取物品。必须指定目标 Agent ID（target_agent_id）和物品 ID（item_id）。成功率由属性决定，失败可能被目标发现并遭受惩罚。此动作需要目标存活。注意区分：give 是主动给予，steal 是偷窃（目标不知情）。"
    category: martial
    ooc_risk: medium
