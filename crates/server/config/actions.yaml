  #   requirements:
  #     - requirement_type: attribute
  #       attribute: stamina
  #       min: 10
  #       cost: 8
  #
  打坐:
    name: "打坐"
    description: "通过打坐恢复内力和心神。不消耗体力，但需要一定体力才能执行。打坐是恢复理智的有效方式。注意区分：打坐 恢复内力和理智，休息 恢复体力和少量理智。"
    category: martial
    ooc_risk: low
    transmission: silent
    validation: {}
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 0
    effects:
      - effect_type: attribute_change
        attribute: qi
        operation: add
        value: 15
      - effect_type: attribute_change
        attribute: sanity
        operation: add
        value: 5
      - effect_type: attribute_change
        attribute: hp
        operation: add
        value: 2

  修炼:
    name: "修炼"
    description: "通过修炼提升内力上限。消耗体力，永久提升内力（qi）上限值。"
    category: martial
    ooc_risk: low
    transmission: silent
    validation: {}
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 8
        cost: 5
    effects:
      - effect_type: attribute_max_change
        attribute: qi
        value: 3
      - effect_type: attribute_change
        attribute: qi
        operation: add
        value: 10

