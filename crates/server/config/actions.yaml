          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 2
        cost: 2

  trade:
    name: "交易"
    aliases: ["买卖", "交换", "购买"]
    description: "与目标 Agent 进行物品交易。必须指定目标 Agent ID（target_agent_id）、物品 ID（item_id）、数量（quantity）和价格（price）。价格可以为 0（表示赠送）。发起方提交 trade intent 即可执行，系统自动完成物品和金钱的交换。"
    category: economic
    ooc_risk: medium
    validation:
      requires_target: true
      requires_target_alive: true
      required_fields:
        - target_agent_id
        - item_id
        - quantity
        - price
      field_aliases:
        target_agent_id: ["目标人物ID", "对象ID", "目标ID"]
        item_id: ["物品ID", "物品", "item"]
        quantity: ["数量", "个数"]
        price: ["价格", "价钱", "cost"]
      field_validations:
        - field: quantity
          validation_type: min_value
          min_value: 1
        - field: price
          validation_type: min_value
          min_value: 0
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 3
        cost: 3

  gather:
    name: "采集"
    aliases: ["收集", "采", "采集资源"]
    description: "从目标资源点采集物品。必须指定资源点 ID（target_id）。资源点必须是有效的采集地点（如矿点、药草点），采集可获得原材料物品。消耗体力。注意：gather 是从资源点采集原材料，craft 是使用材料制造物品。"
    category: economic
    ooc_risk: low
    resource_yield: "1 + luck * 0.1"
    validation:
      required_fields:
        - target_id
      field_aliases:
        target_id: ["目标ID", "资源ID", "资源点", "resource"]
    requirements:
