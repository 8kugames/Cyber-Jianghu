        attribute: stamina
        min: 5
        cost: 5

  craft:
    name: "制造"
    aliases: ["锻造", "制作", "打造"]
    description: "使用配方制造物品。必须指定配方 ID（recipe_id）。制造会消耗背包中的材料（根据配方定义）并产生成品。需要较高体力。注意：craft 是制造成品，gather 是采集原材料。"
    category: economic
    ooc_risk: low
    quality_formula: "craft_skill * 0.5 + luck * 0.1"
    validation:
      required_fields:
        - recipe_id
      field_aliases:
        recipe_id: ["配方ID", "配方", "蓝图", "recipe"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10

