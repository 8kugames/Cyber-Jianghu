# ============================================================================
# Cyber-Jianghu 动作系统配置
# ============================================================================
#
# 动作定义：原子行为单元，不可再分
#
# name: 动作简短名称（用于日志、调试显示）
# description: 动作详细描述（说明行为和效果，避免 LLM 歧义）
#
# requirements 字段说明（执行前校验 + 消耗）：
#   - cost: 执行动作扣减的属性值（正值）
#   - min: 执行动作前属性需达到的最小值
#
# effects 字段说明（执行成功后效果，走 StateChange 管线）：
#   - effect_type: attribute_change
#       attribute: 属性名（对应 attributes.yaml 中的 key）
#       operation: add | sub
#       value: 变化量（整数）
#   - effect_type: add_item
#       item_id: 物品 ID（对应 items.yaml 中的 key）
#       quantity: 数量（默认 1）
#
# 职责划分：
#   - requirements: 前置校验（min）+ 扣减消耗（cost），失败则整动作中止
#   - effects: 成功后追加效果（属性变化、物品获取等），走完整 StateChange 管线
#
# effects 示例（见 idle 动作的实际配置）：
#
#   idle:
#     name: "休息"
#     description: "不做任何操作，恢复体力和心神。恢复量由 effects 定义。"
#     effects:
#       - effect_type: attribute_change    # 属性变化
#         attribute: stamina
#         operation: add
#         value: 5
#       - effect_type: attribute_change    # 可叠加多个效果
#         attribute: sanity
#         operation: add
#         value: 1
#       - effect_type: add_item            # 获取物品（可选）
#         item_id: herb
#         quantity: 2
#
# 动作分类：
#   - survival: 基础生存
#   - combat: 战斗
#   - martial: 江湖技能
#   - social: 社交
#   - economic: 经济
# ============================================================================

version: "0.1.0"
description: "动作系统配置文件"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-04-19"
  tags:
    - actions
    - config

data:
  # ==========================================================================
  # 基础生存
  # ==========================================================================
  idle:
    name: "休息"
    aliases: ["静修", "原地等待", "等待", "待机"]
    description: "不执行任何主动操作，静待下一个 tick。恢复效果由 effects 定义：通常恢复 stamina 和 sanity。此动作不会拾取、使用或丢弃任何物品，也不会与任何对象产生交互。切勿将 idle 与 eat/drink/pickup 等动作混淆。"
    category: survival
    ooc_risk: low
    validation: {}
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 0
    effects:
      - effect_type: attribute_change
        attribute: stamina
        operation: add
        value: 5
      - effect_type: attribute_change
        attribute: sanity
        operation: add
        value: 3

  use:
    name: "使用物品"
    aliases: ["使用", "用"]
    description: "对背包中的物品进行使用操作。根据物品类型产生不同效果，此动作需要指定 item_id。不会消耗或丢弃物品（除非物品本身是一次性消耗品）。注意：eat 和 drink 是独立的进食/饮水动作，不要将 use 误用于进食饮水。"
    category: survival
    ooc_risk: low
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  eat:
    name: "进食"
    aliases: ["吃", "食用", "吃东西"]
    description: '消耗食物以恢复饥饿度。必须指定要吃的食物物品 ID（如 item_id: "mantou" 表示吃馒头）。此动作会从背包中移除食物并恢复 hunger 属性。注意区分：eat 用于固体食物，drink 用于液体饮水，pickup 用于拾取地面物品，use 用于其他物品交互。'
    category: survival
    ooc_risk: low
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  drink:
    name: "饮水"
    aliases: ["喝", "喝水"]
    description: '消耗液体以恢复口渴度。必须指定要饮用的液体物品 ID（如 item_id: "water" 表示喝水）。此动作会从背包中移除液体并恢复 thirst 属性。注意区分：drink 用于饮水（water、wine 等液体），eat 用于进食（固体食物），pickup 用于拾取地面物品。'
    category: survival
    ooc_risk: low
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  pickup:
    name: "拾取物品"
    aliases: ["拾取", "捡起", "捡"]
    description: "从地面拾取物品到背包。必须指定要拾取的物品 ID（item_id）和数量（quantity）。此动作从当前位置的地面物品列表中移除指定物品，添加到执行者的背包。拾取消耗 stamina。注意：拾取是将地面物品收入背包，不是饮用或进食。"
    category: survival
    ooc_risk: low
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
        quantity: ["数量", "个数"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 2
        cost: 2

  drop:
    name: "丢弃物品"
    aliases: ["丢弃", "扔", "丢"]
    description: "从背包中丢弃物品到地面。必须指定物品 ID（item_id）和数量（quantity）。此动作从执行者背包中移除指定物品，放置到当前位置的地面。"
    category: survival
    ooc_risk: low
    validation:
      required_fields:
        - item_id
        - quantity
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
        quantity: ["数量", "个数"]
      field_validations:
        - field: quantity
          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  move:
    name: "移动"
    aliases: ["行走", "前往", "走", "移动到", "去"]
    description: "移动到相邻位置。必须指定目标位置 ID（target_location）。只能移动到 WorldState 中 adjacent_nodes 列出的相邻节点，不支持非相邻节点的直接移动。移动消耗 stamina。"
    category: survival
    ooc_risk: low
    validation:
      required_fields:
        - target_location
      field_aliases:
        target_location: ["目标地点", "目的地", "目标位置", "destination", "target"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10
        cost: 10

