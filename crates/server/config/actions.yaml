    aliases: ["喊", "大喊", "呼喊"]
    description: "向当前位置大声喊叫，内容可被所有在场 Agent 听到。必须指定内容（content）。消耗较多体力。注意区分：shout 是大喊，speak 是普通说话，whisper 是私聊（仅双方可见）。"
