# ============================================================================
# Cyber-Jianghu 动作系统配置
# ============================================================================
#
# 动作定义：原子行为单元，不可再分
#
# name: 动作简短名称（用于日志、调试显示）
# description: 动作详细描述（说明行为和效果，避免 LLM 歧义）
#
# requirements 字段说明（执行前校验 + 消耗）：
#   - cost: 执行动作扣减的属性值（正值）
#   - min: 执行动作前属性需达到的最小值
#
# effects 字段说明（执行成功后效果，走 StateChange 管线）：
#   - effect_type: attribute_change
#       attribute: 属性名（对应 attributes.yaml 中的 key）
#       operation: add | sub
#       value: 变化量（整数）
#   - effect_type: add_item
#       item_id: 物品 ID（对应 items.yaml 中的 key）
#       quantity: 数量（默认 1）
#
# 职责划分：
#   - requirements: 前置校验（min）+ 扣减消耗（cost），失败则整动作中止
#   - effects: 成功后追加效果（属性变化、物品获取等），走完整 StateChange 管线
#
# effects 示例（见 休息 动作的实际配置）：
#
#   休息:
#     name: "休息"
#     description: "不做任何操作，恢复体力和心神。恢复量由 effects 定义。"
#     effects:
#       - effect_type: attribute_change    # 属性变化
#         attribute: stamina
#         operation: add
#         value: 5
#       - effect_type: attribute_change    # 可叠加多个效果
#         attribute: sanity
#         operation: add
#         value: 1
#       - effect_type: add_item            # 获取物品（可选）
#         item_id: herb
#         quantity: 2
#
# 动作分类：
#   - survival: 基础生存
#   - combat: 战斗
#   - martial: 江湖技能
#   - social: 社交
#   - economic: 经济
#
# transmission 字段（Phase 5 数据驱动：动作执行后如何传播）：
#   - broadcast: 公共频道广播给同 Location 所有 Agent（当前仅 说话 用）
#   - session:   定向 + 服务器维护 Dialogue Session（当前仅 私语 用）
#   - silent:    触发方动作，仅修改状态不广播（默认；其他 18 动作均属此类）
#
# display_name 字段（chronicle_generator 展示用，未配置时回退到 name）：
#   仅当展示名与 name 不同时配置；当前 6 个动作有美化名
# ============================================================================

version: "0.1.0"
description: "动作系统配置文件"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-04-19"
  tags:
    - actions
    - config

data:
  # ==========================================================================
  # 基础生存
  # ==========================================================================
  休息:
    name: "休息"
    display_name: "静修"
    description: "不执行任何主动操作，静待下一个 tick。恢复效果由 effects 定义：通常恢复 stamina 和 sanity。此动作不会拾取、使用或丢弃任何物品，也不会与任何对象产生交互。切勿将 休息 与 进食/饮水/拾取 等动作混淆。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation: {}
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 0
    effects:
      - effect_type: attribute_change
        attribute: stamina
        operation: add
        value: 5
      - effect_type: attribute_change
        attribute: sanity
        operation: add
        value: 5
      - effect_type: attribute_change
        attribute: hp
        operation: add
        value: 2

  使用:
    name: "使用"
    description: "对背包中的物品进行使用操作。根据物品类型产生不同效果，此动作需要指定 item_id。不会消耗或丢弃物品（除非物品本身是一次性消耗品）。注意：进食 和 饮水 是独立的进食/饮水动作，不要将 使用 误用于进食饮水。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  进食:
    name: "进食"
    description: '消耗食物恢复饥饿度。长期不进食将导致饥饿值归零而死亡。必须指定食物的 item_id（如 item_id: "馒头"）。此动作从背包中移除食物并恢复 hunger 属性。'
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1
    effects:
      - effect_type: attribute_change
        attribute: hp
        operation: add
        value: 1

  饮水:
    name: "饮水"
    description: '消耗液体恢复口渴度。长期不饮水将导致脱水死亡。必须指定液体的 item_id（如 item_id: "水"）。此动作从背包中移除液体并恢复 thirst 属性。'
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1
    effects:
      - effect_type: attribute_change
        attribute: hp
        operation: add
        value: 1

  拾取:
    name: "拾取"
    description: "从地面拾取物品到背包。必须指定要拾取的物品 ID（item_id）和数量（quantity）。此动作从当前位置的地面物品列表中移除指定物品，添加到执行者的背包。拾取消耗 stamina。注意：拾取是将地面物品收入背包，不是饮用或进食。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - item_id
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
        quantity: ["数量", "个数"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 2
        cost: 2

  丢弃:
    name: "丢弃"
    description: "从背包中丢弃物品到地面。必须指定物品 ID（item_id）和数量（quantity）。此动作从执行者背包中移除指定物品，放置到当前位置的地面。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - item_id
        - quantity
      field_aliases:
        item_id: ["物品ID", "物品", "item"]
        quantity: ["数量", "个数"]
      field_validations:
        - field: quantity
          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  移动:
    name: "移动"
    display_name: "行走"
    description: "移动到相邻位置。必须指定目标位置 ID（target_location）。只能移动到 WorldState 中 adjacent_nodes 列出的相邻节点，不支持非相邻节点的直接移动。移动消耗 stamina。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - target_location
      field_aliases:
        target_location:
          ["目标地点", "目的地", "目标位置", "destination", "target"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10
        cost: 2

  观察:
    name: "观察"
    description: "观察周围环境或特定角色。无目标时环顾当前所在位置，获取环境信息；有目标时注视某个角色，获取其外貌和行为信息。轻微消耗体力。此动作不产生任何战斗、社交或经济效果，纯粹用于获取信息。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      optional_fields:
        - target_agent_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  # ==========================================================================
  # 战斗
  # ==========================================================================
  攻击:
    name: "攻击"
    display_name: "战斗"
    description: "对目标 Agent 发起物理攻击。必须指定目标 Agent ID（target_agent_id）。伤害由力量属性和武器加成决定，会使目标损失 HP。"
    category: combat
    ooc_risk: medium
    transmission: silent
    base_damage: 10
    damage_formula: "10 + strength * 0.5 + weapon_bonus"
    validation:
      requires_target: true
      requires_target_alive: true
      requires_target_colocated: true
      required_fields:
        - target_agent_id
      field_aliases:
        target_agent_id:
          ["目标人物ID", "对象ID", "目标ID", "target_uuid", "character_id"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 5

