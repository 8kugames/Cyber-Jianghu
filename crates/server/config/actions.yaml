  flee:
    name: "逃跑"
    aliases: ["逃", "逃离", "撤退"]
    description: "尝试脱离战斗或危险情境，移动到相邻位置。必须指定逃跑目标位置（target_location）。成功率由敏捷属性决定的公式计算，失败则留在原地但仍消耗体力。"
