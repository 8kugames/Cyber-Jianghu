  # ==========================================================================
  # 经济
  # ==========================================================================
  给予:
    name: "给予"
    description: "将自己的物品给予目标 Agent。必须指定目标 Agent ID（target_agent_id）、物品 ID（item_id）和数量（quantity）。发起方单方面将物品从背包转移到目标背包。注意区分：给予 是主动给予，偷窃 是偷窃（目标不知情）。"
    category: economic
    ooc_risk: medium
    transmission: silent
    validation:
      requires_target: true
      requires_target_alive: true
      requires_target_colocated: true
      required_fields:
        - target_agent_id
        - item_id
        - quantity
      field_aliases:
        target_agent_id: ["目标人物ID", "对象ID", "目标ID"]
        item_id: ["物品ID", "物品", "item"]
        quantity: ["数量", "个数"]
      field_validations:
        - field: quantity
          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 2
        cost: 2

  采集:
    name: "采集"
    description: "从目标资源点采集物品。必须指定资源点 ID（target_id）。资源点必须是有效的采集地点（如矿点、药草点），采集可获得原材料物品。消耗体力。注意：采集 是从资源点采集原材料，制造 是使用材料制造物品。"
    category: economic
    ooc_risk: low
    transmission: silent
    resource_yield: "1 + luck * 0.1"
    validation:
      required_fields:
        - target_id
      field_aliases:
        target_id: ["目标ID", "资源ID", "资源点", "resource"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 5

  制造:
    name: "制造"
    display_name: "锻造"
    description: "使用配方制造物品。必须指定配方 ID（recipe_id）。制造会消耗背包中的材料（根据配方定义）并产生成品。需要较高体力。注意：制造 是制造成品，采集 是采集原材料。"
    category: economic
    ooc_risk: low
    transmission: silent
    quality_formula: "craft_skill * 0.5 + luck * 0.1"
    validation:
      required_fields:
        - recipe_id
      field_aliases:
        recipe_id: ["配方ID", "配方", "蓝图", "recipe"]
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10

  传授:
    name: "传授"
    description: "将自己已知的配方传授给同一地点的他人。必须指定目标人物 ID（target_agent_id）和配方 ID（recipe_id）。传授会消耗体力。"
    category: social
    ooc_risk: low
    transmission: silent
    validation:
      requires_target: true
      requires_target_alive: true
      requires_target_colocated: true
      required_fields:
