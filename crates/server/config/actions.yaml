  attack:
    name: "攻击"
    aliases: ["打", "战斗", "出手"]
    description: "对目标 Agent 发起物理攻击。必须指定目标 Agent ID（target_agent_id）。伤害由力量属性和武器加成决定，会使目标损失 HP。"
    category: combat
    ooc_risk: medium
    base_damage: 10
    damage_formula: "10 + strength * 0.5 + weapon_bonus"
    validation:
      requires_target: true
      requires_target_alive: true
      required_fields:
        - target_agent_id
      field_aliases:
        target_agent_id: ["目标人物ID", "对象ID", "目标ID", "target_uuid", "character_id"]
    requirements:
