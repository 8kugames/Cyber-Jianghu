# ============================================================================
# Cyber-Jianghu 动作系统配置 v2 — 原子化重构
# ============================================================================
#
# 设计原则：10个原子动作，每个动作对应唯一的物理操作。
# 予/取/用 覆盖所有物品交互，不重叠不遗漏。
# ============================================================================
#
# version: "2.0"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-06-10"
  tags:
    - actions
    - config

data:
  # ==========================================================================
  # 物品交互三原语
  # ==========================================================================
  予:
    name: "予"
    description: "将背包中的物品给予他人或丢弃到地面。指定 recipient_type（agent/ground）和 item_id。予 target=agent 时单向转移所有权；予 target=ground 时物品变为可拾取状态。予是物理上的单向输出操作，不带赠予/丢弃的社会含义。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - recipient_type
        - item_id
        - quantity
      field_validations:
        - field: quantity
          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  取:
    name: "取"
    description: "从地点或他人获取物品到背包。指定 source_type（ground/agent/resource）决定来源：ground 从地面拾取，agent 从目标背包获取（需授权判定），resource 从资源点采集。取是物理上的单向输入操作，不携带拥有权或道德判断。"
    category: survival
    ooc_risk: medium
    transmission: silent
    validation:
      required_fields:
        - source_type
        - item_id
        - quantity
      field_validations:
        - field: quantity
          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 2
        cost: 2

  用:
    name: "用"
    description: "消耗或激活背包中的物品。所有物品消耗（进食、饮水、服药、使用道具）统一走此动作。效果由物品定义中的 effects 决定，动作本身不做语义过滤。用不涉及物品的转移或丢弃，仅触发消耗+效果。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - item_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  # ==========================================================================
  # 物理操作
  # ==========================================================================
  移动:
    name: "移动"
    display_name: "行走"
    description: "移动到相邻位置。必须指定 target_location。只能移动到 adjacent_nodes 中列出的相邻节点。不涉及物品、战斗或社交。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      required_fields:
        - target_location
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10
        cost: 2

  说话:
    name: "说话"
    display_name: "交谈"
    description: "发出信息。channel=public（默认）对当前位置所有人可见；channel=private 仅 target_agent_id 可见（私语）；channel=broadcast 附近位置均可闻（大喊）。必须指定 content。消耗体力并增加口渴感。"
    category: social
    ooc_risk: high
    transmission: broadcast
    highlight_kind: dialogue
    max_content_length: 500
    validation:
      required_fields:
        - content
      optional_fields:
        - channel
        - target_agent_id
      field_validations:
        - field: content
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 0
        cost: 1
    effects:
      - effect_type: attribute_change
        attribute: thirst
        operation: add
        value: 2

  观察:
    name: "观察"
    description: "观察周围环境或特定角色。无 target_agent_id 时环顾当前位置，获取环境信息；有 target_agent_id 时注视目标角色，获取外貌和行为定性描述。有潜行技能时可避免被察觉。纯粹用于信息采集，不改变任何世界状态。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      optional_fields:
        - target_agent_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  攻击:
    name: "攻击"
    display_name: "战斗"
    description: "对目标 Agent 发起物理攻击。必须指定 target_agent_id。伤害由力量属性和武器加成决定，会使目标损失 HP。攻击是武力施加，不预设善恶——可用于战斗、防卫或狩猎。"
    category: combat
    ooc_risk: medium
    transmission: silent
    highlight_kind: combat
    base_damage: 10
    damage_formula: "10 + strength * 0.5 + weapon_bonus"
    validation:
      requires_target: true
      requires_target_alive: true
      requires_target_colocated: true
      required_fields:
        - target_agent_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 5

  休整:
    name: "休整"
    display_name: "静修"
    description: "不执行主动操作，静待时间流逝并恢复状态。intent 参数可选（如 recover_stamina/cultivate_qi/meditate），不同 intent 触发不同恢复效果。此动作不产生物品、战斗或社交效果，纯粹等待+恢复。"
    category: survival
    ooc_risk: low
    transmission: silent
    validation:
      optional_fields:
        - intent
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 0
    effects:
      - effect_type: attribute_change
        attribute: stamina
        operation: add
        value: 5
      - effect_type: attribute_change
        attribute: sanity
        operation: add
        value: 5
      - effect_type: attribute_change
        attribute: hp
        operation: add
        value: 2

  # ==========================================================================
  # 生产与知识
  # ==========================================================================
  制造:
    name: "制造"
    display_name: "锻造"
    description: "使用配方制造物品。必须指定 recipe_id。消耗背包中的材料并产生成品。需知晓配方。制造是原子操作——材料扣除和产物添加在同一事务中完成。"
    category: economic
    ooc_risk: low
    transmission: silent
    validator_kind: recipe_knowledge
    quality_formula: "craft_skill * 0.5 + luck * 0.1"
    validation:
      required_fields:
        - recipe_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10

  教导:
    name: "教导"
    description: "将自己知晓的配方传授给同一地点的他人。必须指定 target_agent_id 和 recipe_id。传授消耗体力。教导是知识复制操作——传授者保留配方，学习者获得副本。"
    category: social
    ooc_risk: low
    transmission: silent
    validator_kind: teach_recipe
    validation:
      requires_target: true
      requires_target_alive: true
      requires_target_colocated: true
      required_fields:
        - target_agent_id
        - recipe_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10
