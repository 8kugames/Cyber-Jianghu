# ============================================================================
# OpenClaw Cyber-Jianghu 动作系统配置
# ============================================================================
#
# 动作定义：包含验证规则和属性要求
#
# requirements 字段说明：
#   - cost: 执行动作扣减的属性值（正值）
#   - recovery: 执行动作恢复的属性值（正值）
#   - min: 执行动作前属性需达到的最小值
# ============================================================================

version: "0.0.1"
description: "动作系统配置文件（统一数据格式）"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-03-18"
  author: "Cyber-Jianghu Community"
  tags:
    - actions
    - commands
    - config
  notes:
    - "requirements 中的 cost 表示执行动作扣减的属性值（正值）"
    - "requirements 中的 recovery 表示执行动作恢复的属性值（正值）"
    - "min 表示执行动作前属性需达到的最小值"

data:
  idle:
    description: "休息，不做任何操作"
    validation: {}
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 0
        recovery: 5

  attack:
    description: "攻击目标，造成伤害"
    base_damage: 10
    damage_formula: "10 + strength * 0.5 + weapon_bonus * weapon_multiplier"
    weapon_bonus: 5
    weapon_bonus_multiplier: 1.0
    validation:
      requires_target: true
      requires_target_alive: true
      required_fields:
        - target_agent_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 5

  steal:
    description: "从目标身上偷取物品，有一定成功率"
    success_rate: 0.5
    validation:
      requires_target: true
      requires_target_alive: true
      required_fields:
        - target_agent_id
        - item_id
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 5

  speak:
    description: "公开说话，所有人可见"
    max_content_length: 500
    validation:
      required_fields:
        - content
      field_validations:
        - field: content
          validation_type: not_empty
        - field: content
          validation_type: max_length
          max_length: 500
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 0
        cost: 1

  move:
    description: "移动到指定位置（多场景版本）"
    validation:
      required_fields:
        - target_location
      field_validations:
        - field: target_location
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10
        cost: 10

  give:
    description: "将物品给予目标"
    validation:
      requires_target: true
      requires_target_alive: true
      required_fields:
        - target_agent_id
        - item_id
        - quantity
      field_validations:
        - field: quantity
          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 2
        cost: 2

  use:
    description: "使用物品（如食物、水等）"
    validation:
      required_fields:
        - item_id
      field_validations:
        - field: item_id
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  eat:
    description: "进食（恢复饥饿值）"
    tags: [survival]
    validation:
      required_fields:
        - item_id
      field_validations:
        - field: item_id
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  drink:
    description: "饮水（恢复口渴值）"
    tags: [survival]
    validation:
      required_fields:
        - item_id
      field_validations:
        - field: item_id
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  pickup:
    description: "从地面拾取物品"
    validation:
      required_fields:
        - item_id
      field_validations:
        - field: item_id
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 2
        cost: 2

  drop:
    description: "将物品丢弃到地面"
    validation:
      required_fields:
        - item_id
        - quantity
      field_validations:
        - field: item_id
          validation_type: not_empty
        - field: quantity
          validation_type: min_value
          min_value: 1
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 1
        cost: 1

  gather:
    description: "从场景中采集自然资源"
    validation:
      required_fields:
        - target_id
      field_validations:
        - field: target_id
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 5
        cost: 5

  craft:
    description: "制造/合成物品"
    validation:
      required_fields:
        - recipe_id
      field_validations:
        - field: recipe_id
          validation_type: not_empty
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 10
        cost: 10

  trade:
    description: "与目标进行交易，以指定价格买卖物品"
    validation:
      requires_target: true
      requires_target_alive: true
      required_fields:
        - target_agent_id
        - item_id
        - price
      field_validations:
        - field: price
          validation_type: min_value
          min_value: 0
    requirements:
      - requirement_type: attribute
        attribute: stamina
        min: 3
        cost: 3
