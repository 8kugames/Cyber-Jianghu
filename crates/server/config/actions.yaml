    aliases: ["悄悄话", "耳语", "私聊"]
    description: "对目标 Agent 说悄悄话，只有目标和说话者能听到。必须指定目标 Agent ID（target_agent_id）和内容（content）。私语是私密对话，不会被在场其他 Agent 听到。注意区分：whisper 是私聊（只有目标听到），speak 是公开说（所有人都听到）。"
    category: social
    ooc_risk: high
    max_content_length: 200
    validation:
