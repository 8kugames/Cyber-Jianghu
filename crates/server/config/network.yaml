# ============================================================================
# 网络系统配置
# ============================================================================
#
# 定义 WebSocket 和对话系统的网络参数
#
# 字段说明：
#   websocket:
#     rate_limit_ms: 消息发送速率限制（毫秒），防止客户端刷屏
#     cleanup_interval_secs: 清理断开连接的间隔（秒）
#     cleanup_threshold: 触发清理的连接数阈值
#   device_register:
#     rate_limit_secs: 同一 IP 设备注册最小间隔（秒）
#   dialogue:
#     window_seconds: 对话窗口时间（秒），用于对话上下文
#     max_messages_per_agent: 每个 Agent 最大消息数，超出后移除最早消息
#
# 注意：
#   - rate_limit_ms 过低可能导致正常交互受限
#   - cleanup_interval_secs 建议与心跳检测周期协调
# ============================================================================

version: "0.0.1"
description: "网络系统配置"

meta:
  created_at: "2026-03-16"
  updated_at: "2026-03-19"
  author: "Cyber-Jianghu Community"
  tags: ["network", "websocket", "config"]

data:
  # WebSocket 配置
  websocket:
    # 消息发送速率限制（毫秒），防止客户端刷屏
    rate_limit_ms: 500
    # 清理断开连接的间隔（秒）
    cleanup_interval_secs: 300
    # 触发清理的连接数阈值
    cleanup_threshold: 100
    # WebSocket 消息通道容量（背压控制）
    channel_capacity: 100
    # 心跳 Ping 间隔（秒）
    heartbeat_interval_secs: 30
    # 连续未收到 Pong 的最大次数（超过则断连）
    max_missed_pongs: 3
    # 日志消息预览截断长度（字节）
    log_preview_length: 50

  # 设备显式注册限流
  device_register:
    # 同一 IP 最短 10 秒可注册一次，防止匿名刷库
    rate_limit_secs: 10

  # 对话系统配置
  dialogue:
    # 对话窗口时间（秒），用于对话上下文
    window_seconds: 300
    # 每个 Agent 最大消息数，超出后移除最早消息
    max_messages_per_agent: 20
