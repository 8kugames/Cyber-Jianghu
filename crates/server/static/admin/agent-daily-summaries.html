<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日摘要 | Cyber-Jianghu</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
        body {
            background: var(--bg-base);
            min-height: 100vh;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header h1 span {
            color: var(--accent);
        }

        .back-btn {
            padding: 8px 16px;
            background: var(--bg-level-1);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            transition: all 0.15s;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            padding: 8px 14px;
            background: var(--bg-level-1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            min-width: 240px;
            outline: none;
            transition: all 0.15s;
            font-family: var(--font-family);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-muted);
        }

        .search-input::placeholder {
            color: var(--text-subtle);
        }

        select {
            padding: 8px 14px;
            background: var(--bg-level-1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            outline: none;
            cursor: pointer;
            font-family: var(--font-family);
        }

        select:focus {
            border-color: var(--accent);
        }

        .summaries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 16px;
        }

        .summary-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 18px;
            transition: all 0.2s var(--ease-out);
            box-shadow: var(--card-shadow);
        }

        .summary-card:hover {
            border-color: var(--accent);
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .summary-agent {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
        }

        .summary-game-day {
            padding: 3px 9px;
            background: var(--accent-muted);
            color: var(--accent);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(20, 184, 166, 0.2);
        }

        .summary-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .summary-content {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: var(--bg-level-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 15px;
            margin: 0;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
        }

        .pagination button {
            padding: 8px 14px;
            background: var(--bg-level-1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: var(--font-family);
        }

        .pagination button:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .summaries-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>每日<span>摘要</span></h1>
        <a href="index.html" class="back-btn">← 返回仪表盘</a>
    </div>

    <div class="controls">
        <input type="text" class="search-input" placeholder="搜索摘要内容..." id="search-input" oninput="filterSummaries()">
        <button class="btn btn-secondary" onclick="loadSummaries()">刷新</button>
    </div>

    <div id="summaries-container" class="summaries-grid">
        <div class="loading">加载中...</div>
    </div>

    <div id="pagination" class="pagination" style="display: none;">
        <button id="prev-btn" onclick="prevPage()">上一页</button>
        <span id="page-info"></span>
        <button id="next-btn" onclick="nextPage()">下一页</button>
    </div>

    <script src="js/js-yaml.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let summaries = [];
        let currentPage = 1;
        let pageSize = 20;
        let totalCount = 0;

        async function loadSummaries() {
            try {
                const res = await apiFetch(API.BASE + '/agent-daily-summaries?page=' + currentPage + '&limit=' + pageSize);
                const data = await res.json();

                summaries = data.summaries || [];
                totalCount = data.total || 0;

                renderSummaries(summaries);
                updatePagination();
            } catch (e) {
                if (e.name !== 'ApiError') {
                    document.getElementById('summaries-container').innerHTML =
                        '<div class="empty-state"><p>加载失败，请刷新重试</p></div>';
                }
            }
        }

        function renderSummaries(list) {
            const container = document.getElementById('summaries-container');
            if (!list.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                        </svg>
                        <p>暂无每日摘要</p>
                        <p style="font-size: 12px; margin-top: 8px; color: var(--text-subtle)">游戏日结束后自动生成</p>
                    </div>`;
                return;
            }

            container.innerHTML = list.map(s => {
                const createdDate = new Date(s.created_at);
                const dateStr = createdDate.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const agentIdShort = s.agent_id.substring(0, 8);
                return `
                    <div class="summary-card">
                        <div class="summary-header">
                            <span class="summary-agent">Agent ${escapeHtml(agentIdShort)}...</span>
                            <span class="summary-game-day">第${s.game_day}日</span>
                        </div>
                        <div class="summary-meta">存档时间: ${dateStr}</div>
                        <div class="summary-content">${escapeHtml(s.summary)}</div>
                    </div>
                `;
            }).join('');
        }

        function filterSummaries() {
            const query = document.getElementById('search-input').value.toLowerCase();
            if (!query) {
                renderSummaries(summaries);
                return;
            }
            const filtered = summaries.filter(s =>
                s.summary.toLowerCase().includes(query) ||
                s.agent_id.toLowerCase().includes(query)
            );
            renderSummaries(filtered);
        }

        function updatePagination() {
            const totalPages = Math.ceil(totalCount / pageSize);
            const paginationEl = document.getElementById('pagination');
            const pageInfo = document.getElementById('page-info');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            if (totalPages <= 1) {
                paginationEl.style.display = 'none';
                return;
            }

            paginationEl.style.display = 'flex';
            pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页，共 ${totalCount} 条`;
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadSummaries();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(totalCount / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                loadSummaries();
            }
        }

        loadSummaries();
    </script>
</body>
</html>
