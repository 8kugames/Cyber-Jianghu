<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群像传记 | Cyber-Jianghu</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
        /* chronicles-specific overrides — Light Mode */

        body {
            background: var(--bg-base);
            min-height: 100vh;
            padding: 24px;
        }

        .chr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .chr-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .chr-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chr-header h1 span {
            color: var(--accent);
        }

        .chr-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            padding: 8px 14px;
            background: var(--bg-level-1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 13px;
            min-width: 240px;
            outline: none;
            transition: all 0.15s;
            font-family: var(--font-family);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-muted);
        }

        .search-input::placeholder {
            color: var(--text-subtle);
        }

        .chronicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
        }

        .chronicle-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s var(--ease-out);
            box-shadow: var(--card-shadow);
        }

        .chronicle-card:hover {
            border-color: var(--accent);
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-2px);
        }

        .chronicle-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .chronicle-id {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
        }

        .chronicle-season {
            padding: 3px 9px;
            background: var(--accent-muted);
            color: var(--accent);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(20, 184, 166, 0.2);
        }

        .chronicle-period {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 12px;
        }

        .chronicle-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            padding: 10px;
            background: var(--bg-level-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
        }

        .chr-stat-item {
            text-align: center;
        }

        .chr-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .chr-stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .chronicle-preview {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .chronicle-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-template {
            background: var(--warning-muted);
            color: var(--warning);
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .status-llm {
            background: var(--accent-muted);
            color: var(--accent);
            border: 1px solid rgba(20, 184, 166, 0.2);
        }

        .status-both {
            background: var(--success-muted);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        .status-generating {
            background: var(--accent-muted);
            color: var(--accent);
            border: 1px solid rgba(20, 184, 166, 0.2);
            animation: subtle-pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Detail Modal specifics */
        .modal-content {
            width: 100%;
            max-width: 860px;
        }

        .narrative {
            background: var(--bg-level-2);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.8;
            max-height: 380px;
            overflow-y: auto;
            color: var(--text-primary);
        }

        .narrative::-webkit-scrollbar { width: 5px; }
        .narrative::-webkit-scrollbar-track { background: var(--bg-level-2); border-radius: 3px; }
        .narrative::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        .narrative::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .highlight-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .highlight-item {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-level-2);
            border-radius: var(--radius-sm);
            align-items: flex-start;
            border: 1px solid var(--border-subtle);
        }

        .highlight-type {
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .type-death    { background: var(--error-muted);   color: var(--error); border: 1px solid rgba(248, 113, 113, 0.2); }
        .type-dialogue { background: var(--accent-muted);   color: var(--accent); border: 1px solid rgba(20, 184, 166, 0.2); }
        .type-combat   { background: var(--warning-muted); color: var(--warning); border: 1px solid rgba(251, 191, 36, 0.2); }
        .type-social   { background: var(--success-muted); color: var(--success); border: 1px solid rgba(52, 211, 153, 0.2); }

        .highlight-desc {
            flex: 1;
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .agent-card {
            padding: 12px;
            background: var(--bg-level-2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
        }

        .agent-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-size: 13px;
        }

        .agent-info {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .agent-died {
            color: var(--error);
            font-weight: 500;
        }

        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .tab-btn {
            padding: 6px 14px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
            font-family: var(--font-family);
        }

        .tab-btn.active,
        .tab-btn:hover {
            background: var(--accent-muted);
            color: var(--accent);
            border-color: rgba(20, 184, 166, 0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .chronicles-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="chr-header">
        <h1>群像<span>传记</span></h1>
        <a href="index.html" class="back-btn">← 返回仪表盘</a>
    </div>

    <div class="chr-controls">
        <input type="text" class="search-input" placeholder="搜索传记内容..." id="search-input" oninput="filterChronicles()">
        <button class="btn btn-primary" onclick="generateChronicle()">手动生成</button>
        <button class="btn btn-secondary" onclick="loadChronicles()">刷新</button>
    </div>

    <div id="chronicles-container" class="chronicles-grid">
        <div class="loading">加载中...</div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">群像传记详情</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script src="js/js-yaml.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let chronicles = [];

        async function loadChronicles() {
            try {
                const [chroniclesRes, pendingRes] = await Promise.all([
                    apiFetch(API.BASE + '/chronicles'),
                    apiFetch(API.BASE + '/chronicles/pending').catch(e => {
                        if (e.name === 'ApiError') throw e; // 强制放行框架级异常 (401/500)
                        return { ok: false };
                    })
                ]);

                const chroniclesData = await chroniclesRes.json();
                chronicles = chroniclesData.chronicles || [];

                let pendingMap = {};
                if (pendingRes && pendingRes.ok) {
                    const pendingData = await pendingRes.json();
                    for (const task of (pendingData.tasks || [])) {
                        pendingMap[task.chronicle_id] = task;
                    }
                }

                chronicles = chronicles.map(c => ({
                    ...c,
                    _pending: pendingMap[c.chronicle_id] || null
                }));

                renderChronicles(chronicles);
            } catch (e) {
                if (e.name !== "ApiError") {
                    document.getElementById('chronicles-container').innerHTML =
                        '<div class="empty-state">加载失败，请刷新重试</div>';
                }
            }
        }

        function renderChronicles(list) {
            const container = document.getElementById('chronicles-container');
            if (!list.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
                        </svg>
                        <p>暂无群像传记</p>
                        <p style="font-size: 12px; margin-top: 8px; color: var(--text-subtle)">每7个游戏日会自动生成</p>
                    </div>`;
                return;
            }

            container.innerHTML = list.map(c => `
                <div class="chronicle-card" onclick="openChronicle(${JSON.stringify(c.chronicle_id)})">
                    <div class="chronicle-header">
                        <span class="chronicle-id">${escapeHtml(c.chronicle_id)}</span>
                        <span class="chronicle-season">${escapeHtml(c.season)}</span>
                    </div>
                    <div class="chronicle-period">第${c.game_day_start}日 - 第${c.game_day_end}日</div>
                    <div class="chronicle-stats">
                        <div class="chr-stat-item">
                            <div class="chr-stat-value">${c.agent_count}</div>
                            <div class="chr-stat-label">江湖儿女</div>
                        </div>
                        <div class="chr-stat-item">
                            <div class="chr-stat-value">${c.actions_count}</div>
                            <div class="chr-stat-label">行动次数</div>
                        </div>
                        <div class="chr-stat-item">
                            <div class="chr-stat-value">${c.deaths}</div>
                            <div class="chr-stat-label">陨落</div>
                        </div>
                        <div class="chr-stat-item">
                            <div class="chr-stat-value">${c.births}</div>
                            <div class="chr-stat-label">新生</div>
                        </div>
                    </div>
                    <div class="chronicle-preview">${escapeHtml(c.summary_preview)}</div>
                    <span class="chronicle-status status-${escapeHtml(getChronicleStatus(c))}">${escapeHtml(getChronicleStatusText(c))}</span>
                </div>
            `).join('');
        }

        function statusText(status) {
            switch(status) {
                case 'template': return '模板生成';
                case 'llm': return 'LLM 版本';
                case 'both': return '完整版';
                default: return status;
            }
        }

        function getChronicleStatus(c) {
            if (c._pending) {
                const task = c._pending;
                if (task.supplement_status === 'generating' || task.supplement_status === 'pending') {
                    return 'generating';
                }
            }
            return c.status;
        }

        function getChronicleStatusText(c) {
            if (c._pending) {
                const task = c._pending;
                if (task.supplement_status === 'generating') {
                    return 'LLM 生成中';
                }
                if (task.supplement_status === 'pending') {
                    return '等待生成';
                }
            }
            return statusText(c.status);
        }

        function filterChronicles() {
            const query = document.getElementById('search-input').value.toLowerCase();
            if (!query) {
                renderChronicles(chronicles);
                return;
            }
            const filtered = chronicles.filter(c =>
                c.summary_preview.toLowerCase().includes(query) ||
                c.chronicle_id.toLowerCase().includes(query) ||
                c.season.toLowerCase().includes(query)
            );
            renderChronicles(filtered);
        }

        async function openChronicle(id) {
            try {
                const res = await apiFetch(API.BASE + '/chronicles/' + id);
                if (!res.ok) {
                    throw new Error(`加载失败 (HTTP ${res.status})`);
                }
                const c = await res.json();
                showModal(c);
            } catch (e) {
                if (e.name !== "ApiError") {
                    console.error(e);
                    alert(`详情加载失败: ${e.message}`);
                }
            }
        }

        function showModal(c) {
            document.getElementById('modal-title').textContent = `${c.chronicle_id} · ${c.season}季`;
            document.getElementById('modal-body').innerHTML = `
                <div class="detail-section">
                    <h3>基本统计</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="label">周期</div>
                            <div class="value">第${c.game_day_start} - ${c.game_day_end}日</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">江湖儿女</div>
                            <div class="value">${c.agent_count}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">行动次数</div>
                            <div class="value">${c.actions_count}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">陨落人数</div>
                            <div class="value">${c.deaths}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">新生人数</div>
                            <div class="value">${c.births}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">状态</div>
                            <div class="value">${escapeHtml(statusText(c.status))}</div>
                        </div>
                    </div>
                </div>

                <div class="tab-nav">
                    <button class="tab-btn active" onclick="switchTab('template')">模板版本</button>
                    ${c.summary_llm ? '<button class="tab-btn" onclick="switchTab(\'llm\')">LLM 版本</button>' : ''}
                </div>

                <div id="tab-template" class="tab-content active">
                    <div class="narrative">${escapeHtml(c.summary)}</div>
                </div>
                ${c.summary_llm ? `
                <div id="tab-llm" class="tab-content">
                    <div class="narrative">${escapeHtml(c.summary_llm)}</div>
                </div>
                ` : ''}

                ${c.highlights && c.highlights.length > 0 ? `
                <div class="detail-section" style="margin-top: 20px;">
                    <h3>关键事件</h3>
                    <div class="highlight-list">
                        ${c.highlights.map(h => `
                            <div class="highlight-item">
                                <span class="highlight-type type-${escapeHtml(h.event_type || '')}">${escapeHtml(eventTypeName(h.event_type))}</span>
                                <span class="highlight-desc">${escapeHtml(h.description)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                ${c.agent_summaries && c.agent_summaries.length > 0 ? `
                <div class="detail-section" style="margin-top: 20px;">
                    <h3>江湖群像</h3>
                    <div class="agents-grid">
                        ${c.agent_summaries.map(a => `
                            <div class="agent-card">
                                <div class="agent-name">${escapeHtml(a.name)}</div>
                                <div class="agent-info">
                                    <div>位置: ${escapeHtml(a.location)}</div>
                                    <div>行动: ${a.actions_count}次</div>
                                    ${a.died_this_period ? '<div class="agent-died">已于本周期陨落</div>' : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
            `;
            document.getElementById('detail-modal').classList.add('show');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            if (typeof event !== 'undefined' && event && event.target) {
                event.target.classList.add('active');
            } else {
                document.querySelector(`.tab-btn[onclick*="${tab}"]`)?.classList.add('active');
            }
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function eventTypeName(type) {
            const names = {
                death: '陨落',
                dialogue: '对话',
                combat: '战斗',
                social: '交际'
            };
            return names[type] || type;
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('show');
        }

        async function generateChronicle() {
            if (!confirm('确定要手动生成一份群像传记吗？')) return;
            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = '生成中...';
            try {
                const res = await apiFetch(API.BASE + '/chronicles/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const text = await res.text();
                if (res.ok) {
                    alert('生成成功');
                    loadChronicles();
                } else {
                    alert('生成失败: ' + text);
                }
            } catch (e) {
                if (e.name !== "ApiError") {
                    alert('生成失败: ' + e.message);
                }
            } finally {
                btn.disabled = false;
                btn.textContent = '手动生成';
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });

        loadChronicles();
    </script>
</body>
</html>
