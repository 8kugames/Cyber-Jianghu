<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>天道 | Cyber-Jianghu</title>
        <link rel="stylesheet" href="css/dashboard.css" />
        <link rel="stylesheet" href="css/action-evolution.css" />
    </head>
    <body>
        <header>
            <div style="display: flex; align-items: center; gap: 12px">
                <h1>天道 | Cyber-Jianghu</h1>
                <span
                    style="
                        font-size: 11px;
                        background: var(--bg-level-2);
                        color: var(--text-secondary);
                        padding: 2px 8px;
                        border-radius: 10px;
                        border: 1px solid var(--border-color);
                    "
                    ><span id="server-version">v--</span></span
                >
            </div>
            <div class="nav-tabs">
                <div class="nav-tab active" data-tab-id="dashboard" onclick="switchTab('dashboard')">
                    监控面板
                </div>
                <div class="nav-tab" data-tab-id="config" onclick="switchTab('config')">
                    配置编辑器
                </div>
                <div class="nav-tab" onclick="window.open('history.html', '_blank')">
                    历史记录
                </div>
                <div class="nav-tab" onclick="window.open('settings.html', '_blank')">
                    LLM 设置
                </div>
                <div class="nav-tab" data-tab-id="evolution" onclick="switchTab('evolution'); loadActionEvolution();">
                    动作演化
                </div>
            </div>
        </header>

        <main>
            <!-- Dashboard View -->
            <div id="dashboard" class="view-section active">
                <div class="dashboard-layout">
                    <!-- Left Column: Stats & Agents -->
                    <div class="dashboard-left">
                        <div class="dashboard-controls">
                            <h2>系统状态</h2>
                            <div style="display: flex; align-items: center; gap: 10px">
                                <span style="font-size: 12px; color: var(--text-secondary)">自动刷新</span>
                                <label class="switch">
                                    <input
                                        type="checkbox"
                                        id="auto-refresh"
                                        checked
                                        onchange="toggleAutoRefresh()"
                                    />
                                    <span class="slider"></span>
                                </label>
                                <button
                                    class="btn btn-primary"
                                    onclick="loadStats()"
                                >
                                    刷新
                                </button>
                                <button
                                    class="btn btn-secondary"
                                    onclick="cleanupOfflineAgents()"
                                >
                                    清理离线
                                </button>
                            </div>
                        </div>

                        <div class="stats-grid" id="stats-grid">
                            <!-- Stats injected by JS -->
                        </div>

                        <div class="agents-title-bar">
                            <h2 id="agents-total-title" style="margin: 0">
                                所有角色 (0)
                            </h2>
                            <div style="display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--text-secondary)">
                                <span>在线: <span id="online-count" style="color: var(--success); font-weight: 600">0</span></span>
                                <span>离线: <span id="offline-count" style="color: var(--warning); font-weight: 600">0</span></span>
                                <span>已死亡: <span id="dead-count" style="color: var(--error); font-weight: 600">0</span></span>
                            </div>
                        </div>
                        <input
                            type="text"
                            id="agent-filter"
                            class="form-input"
                            placeholder="搜索名称或位置..."
                            oninput="renderAgents()"
                            style="width: 200px; margin-bottom: 10px"
                        />
                        <div id="agents-list" class="agent-list">
                            <div
                                style="
                                    grid-column: 1/-1;
                                    color: var(--text-secondary);
                                    text-align: center;
                                    padding: 24px;
                                    font-size: 13px;
                                "
                            >
                                加载中...
                            </div>
                        </div>
                        <div class="agent-pagination">
                            <button class="btn btn-secondary" onclick="changeAgentPage(-1)" id="agent-page-prev">上一页</button>
                            <span id="agent-page-info">第 1 / 1 页 · 共 0 条</span>
                            <button class="btn btn-secondary" onclick="changeAgentPage(1)" id="agent-page-next">下一页</button>
                        </div>
                    </div>

                    <!-- Right Column: World Log -->
                    <div class="dashboard-right" id="world-overview-panel">
                        <div class="panel-header">
                            <h2>世界概览</h2>
                            <button
                                class="panel-toggle"
                                id="world-overview-toggle"
                                onclick="toggleWorldOverview()"
                                aria-expanded="true"
                                title="最小化"
                            >
                                »
                            </button>
                        </div>
                        <div id="world-overview" class="world-log">
                            Loading...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Agent Detail Modal -->
            <div id="agent-modal" class="modal">
                <div class="modal-content modal-large">
                    <div class="modal-header">
                        <h3 id="modal-agent-name">Agent详情</h3>
                        <span class="close-btn" onclick="closeAgentModal()"
                            >&times;</span
                        >
                    </div>
                    <div class="modal-tabs">
                        <button class="modal-tab active" data-tab="basic" onclick="switchModalTab('basic')">基本信息</button>
                        <button class="modal-tab" data-tab="experiences" onclick="switchModalTab('experiences')">经历日志</button>
                        <button class="modal-tab" data-tab="roles" onclick="switchModalTab('roles')">身份管理</button>
                        <button class="modal-tab" data-tab="inventory" onclick="switchModalTab('inventory')">物品管理</button>
                        <button class="modal-tab" data-tab="biography" onclick="switchModalTab('biography')">传记</button>
                    </div>
                    <div class="modal-body" id="modal-agent-body">
                        <div id="modal-tab-basic" class="modal-tab-content active"></div>
                        <div id="modal-tab-experiences" class="modal-tab-content"></div>
                        <div id="modal-tab-roles" class="modal-tab-content"></div>
                        <div id="modal-tab-inventory" class="modal-tab-content"></div>
                        <div id="modal-tab-biography" class="modal-tab-content"></div>
                    </div>
                </div>
            </div>

            <!-- Config Editor View -->
            <div id="config" class="view-section">
                <div class="editor-layout">
                    <div class="file-list" id="config-list">
                        <!-- File list injected by JS -->
                    </div>
                    <div class="editor-area">
                        <div class="editor-toolbar">
                            <div
                                id="current-file-name"
                                style="font-weight: 600; font-size: 13px; color: var(--text-primary)"
                            >
                                选择文件
                            </div>
                            <div style="display: flex; gap: 10px">
                                <button
                                    class="btn btn-success"
                                    onclick="saveConfig()"
                                >
                                    保存并热更新
                                </button>
                            </div>
                        </div>
                        <textarea
                            id="code-editor"
                            class="code-editor"
                            spellcheck="false"
                            placeholder="Select a config file to edit..."
                        ></textarea>
                    </div>
                </div>
            </div>

            <div id="evolution" class="view-section">
                <div id="evolution-content">
                    <p>加载中...</p>
                </div>
            </div>
        </main>

        <div id="toast" class="toast">Message</div>

        <script src="js/js-yaml.min.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/stats.js"></script>
        <script src="js/agents.js"></script>
        <script src="js/config-editor.js"></script>
        <script src="js/app.js"></script>
        <script src="js/action-evolution.js"></script>
    </body>
</html>
