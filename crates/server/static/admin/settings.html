<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LLM 配置 | Cyber-Jianghu</title>
        <link rel="stylesheet" href="css/dashboard.css" />
        <style>
            /* page-private: cannot be scoped via .settings-container (body-level) */
            body {
                background: var(--bg-base);
                min-height: 100vh;
                padding: 24px;
            }
        </style>
    </head>
    <body>
        <div class="settings-header">
            <h1>LLM <span>配置</span></h1>
            <a href="index.html" class="back-btn">← 返回面板</a>
        </div>

        <div class="settings-container" id="app">
            <div class="loading" id="loading">加载中...</div>

            <div id="settings-form" style="display: none">
                <div class="settings-card">
                    <div class="status-row">
                        <div class="status-left">
                            <h2>LLM 配置</h2>
                            <label class="toggle">
                                <input
                                    type="checkbox"
                                    id="llm-enabled-toggle"
                                />
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="status-right">
                            <div class="connection-indicator">
                                <span
                                    class="connection-dot"
                                    id="connection-dot"
                                ></span>
                                <span id="connection-text">检测中...</span>
                            </div>
                        </div>
                    </div>

                    <div class="info-box">
                        <p>
                            <strong>LLM 服务配置</strong> — 为游戏系统提供 LLM
                            增强能力。当前用于群像传记生成，后续可扩展其他 LLM
                            增强功能。
                        </p>
                    </div>

                    <!-- 表单内容区域 -->
                    <div id="form-content">
                        <!-- Token 统计 -->
                        <div class="stats-grid" id="token-stats">
                            <div class="stat-card">
                                <div class="stat-value" id="stat-input-tokens">
                                    -
                                </div>
                                <div class="stat-label">输入 Token</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="stat-output-tokens">
                                    -
                                </div>
                                <div class="stat-label">输出 Token</div>
                            </div>
                            <div class="stat-card">
                                <div
                                    class="stat-value"
                                    id="stat-total-requests"
                                >
                                    -
                                </div>
                                <div class="stat-label">累计请求</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="stat-error-count">
                                    -
                                </div>
                                <div class="stat-label">错误次数</div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="llm-provider">Provider</label>
                            <select id="llm-provider" class="form-select">
                                <option value="ollama">
                                    Ollama (本地模型)
                                </option>
                                <option value="openai">OpenAI</option>
                                <option value="openai_compatible">
                                    OpenAI 兼容接口
                                </option>
                            </select>
                            <p id="provider-hint" class="provider-hint"></p>
                        </div>

                        <div class="form-group">
                            <label for="llm-base-url">Base URL</label>
                            <input
                                type="text"
                                id="llm-base-url"
                                class="form-input"
                                placeholder="http://localhost:11434/v1"
                            />
                            <p class="hint">
                                Ollama 默认: <code>http://localhost:11434/v1</code>
                            </p>
                        </div>

                        <div class="form-group">
                            <label for="llm-api-key">API Key</label>
                            <input
                                type="password"
                                id="llm-api-key"
                                class="form-input"
                                placeholder="输入 API Key"
                            />
                            <p class="hint">
                                Ollama 通常无需 Key；OpenAI 需要填写
                            </p>
                        </div>

                        <div class="form-group">
                            <label for="llm-model">模型名称</label>
                            <input
                                type="text"
                                id="llm-model"
                                class="form-input"
                                placeholder="qwen2.5:14b"
                            />
                            <p class="hint">确保模型已下载并可通过 API 访问</p>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="llm-temperature">Temperature</label>
                                <input
                                    type="number"
                                    id="llm-temperature"
                                    class="form-input"
                                    min="0"
                                    max="2"
                                    step="0.1"
                                    value="0.8"
                                />
                                <p class="hint">控制随机性 (0=确定, 2=创意)</p>
                            </div>
                            <div class="form-group">
                                <label for="llm-max-tokens"
                                    >最大 Token 数</label
                                >
                                <input
                                    type="number"
                                    id="llm-max-tokens"
                                    class="form-input"
                                    min="256"
                                    max="8192"
                                    step="256"
                                    value="4096"
                                />
                                <p class="hint">生成文本的最大长度</p>
                            </div>
                        </div>

                        <!-- 按钮区域 -->
                        <div
                            style="
                                display: flex;
                                gap: 10px;
                                align-items: center;
                                margin-top: 20px;
                            "
                        >
                            <button
                                class="btn btn-primary"
                                id="save-btn"
                                onclick="saveConfig()"
                            >
                                保存配置
                            </button>
                        </div>

                        <div id="result" class="result"></div>
                    </div>
                </div>
            </div>
        </div>
        <script src="js/js-yaml.min.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/auth.js"></script>
        <script>
            const PROVIDER_HINTS = {
                ollama: "Ollama 是本地模型运行器。请确保已安装并运行：<br>• <code>ollama serve</code> 启动服务<br>• <code>ollama pull qwen2.5:14b</code> 下载模型",
                openai: "使用 OpenAI 官方 API。请填写有效的 API Key。",
                openai_compatible:
                    "兼容 OpenAI 格式的第三方 API（如 vLLM、FastChat 等）",
            };

            async function loadConfig() {
                document.getElementById("loading").style.display = "none";
                document.getElementById("settings-form").style.display =
                    "block";

                try {
                    const res = await apiFetch(API.BASE + "/config/llm");
                    if (!res.ok) {
                        showResult("加载配置失败", false);
                        return;
                    }
                    const config = await res.json();
                    populateForm(config);
                } catch (e) {
                    if (e.name !== "ApiError") {
                        showResult("加载配置失败: " + e.message, false);
                    }
                }
            }

            let originalConfig = null;

            function populateForm(config) {
                originalConfig = config;
                const enabled = config.data?.enabled ?? false;
                document.getElementById("llm-enabled-toggle").checked = enabled;
                document.getElementById("llm-provider").value =
                    config.data?.provider ?? "ollama";
                document.getElementById("llm-base-url").value =
                    config.data?.base_url ?? "";
                const apiKey = config.data?.api_key ?? "";
                const apiKeyInput = document.getElementById("llm-api-key");
                if (apiKey) {
                    apiKeyInput.placeholder = "已填写（修改请输入新值）";
                    apiKeyInput.value = maskApiKey(apiKey);
                } else {
                    apiKeyInput.placeholder = "API 密钥";
                    apiKeyInput.value = "";
                }
                document.getElementById("llm-model").value =
                    config.data?.model ?? "";
                document.getElementById("llm-temperature").value =
                    config.data?.temperature ?? 0.8;
                document.getElementById("llm-max-tokens").value =
                    config.data?.max_tokens ?? 4096;
                updateProviderHint();
                updateFormState(enabled);
            }

            function maskApiKey(key) {
                if (!key || key.length < 4) return "••••••••";
                return key.substring(0, 2) + "••••••••" + key.substring(key.length - 2);
            }

            function isMasked(value) {
                return value.includes("••••") || value === "" || value === "已填写（修改请输入新值）";
            }

            function updateFormState(enabled) {
                const formContent = document.getElementById("form-content");
                if (enabled) {
                    formContent.classList.remove("form-section-disabled");
                } else {
                    formContent.classList.add("form-section-disabled");
                }
            }

            function updateProviderHint() {
                const provider = document.getElementById("llm-provider").value;
                document.getElementById("provider-hint").innerHTML =
                    PROVIDER_HINTS[provider] || "";
            }

            document
                .getElementById("llm-provider")
                .addEventListener("change", updateProviderHint);

            async function saveConfig() {
                const btn = document.getElementById("save-btn");
                btn.disabled = true;
                btn.textContent = "保存中...";

                const apiKeyInput = document.getElementById("llm-api-key").value;
                const apiKey = isMasked(apiKeyInput)
                    ? (originalConfig?.data?.api_key ?? "")
                    : apiKeyInput;

                const config = {
                    version: "0.0.1",
                    description: "LLM 配置",
                    meta: {
                        created_at: originalConfig?.meta?.created_at ?? new Date().toISOString().split("T")[0],
                        author: originalConfig?.meta?.author ?? "Cyber-Jianghu",
                    },
                    data: {
                        enabled:
                            document.getElementById("llm-enabled-toggle")
                                .checked,
                        provider: document.getElementById("llm-provider").value,
                        base_url: document.getElementById("llm-base-url").value,
                        api_key: apiKey,
                        model: document.getElementById("llm-model").value,
                        temperature: parseFloat(
                            document.getElementById("llm-temperature").value,
                        ),
                        max_tokens: parseInt(
                            document.getElementById("llm-max-tokens").value,
                        ),
                    },
                };

                try {
                    const res = await apiFetch(API.BASE + "/config/llm", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(config),
                    });

                    const result = await res.json();
                    if (res.ok) {
                        showResult("配置已保存", true);
                    } else {
                        showResult(result.message || "保存失败", false);
                    }
                } catch (e) {
                    if (e.name !== "ApiError") {
                        showResult("保存失败: " + e.message, false);
                    }
                } finally {
                    btn.disabled = false;
                    btn.textContent = "保存配置";
                }
            }

            function showResult(msg, success) {
                const el = document.getElementById("result");
                el.textContent = msg;
                el.className = "result " + (success ? "success" : "error");
                setTimeout(() => (el.className = "result"), 3000);
            }

            document
                .getElementById("llm-enabled-toggle")
                .addEventListener("change", async function () {
                    const enabled = this.checked;
                    try {
                        const res = await apiFetch(API.BASE + "/config/llm/enabled",
                            {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                },
                                body: JSON.stringify({ enabled }),
                            },
                        );
                        if (res.ok) {
                            updateFormState(enabled);
                            checkLlmStatus();
                        } else {
                            alert("设置失败");
                            this.checked = !enabled;
                        }
                    } catch (e) {
                        if (e.name !== "ApiError") {
                            alert("设置失败: " + e.message);
                            this.checked = !enabled;
                        }
                    }
                });

            async function checkLlmStatus() {
                try {
                    const res = await apiFetch(API.BASE + "/config/llm/status");
                    if (res.ok) {
                        const data = await res.json();
                        updateConnectionIndicator(data.connected, data.message);
                    }
                } catch (e) {
                    if (e.name !== "ApiError") {
                        updateConnectionIndicator(false, "检测失败");
                    }
                }
            }

            function updateConnectionIndicator(connected, message) {
                const dot = document.getElementById("connection-dot");
                const text = document.getElementById("connection-text");
                if (connected) {
                    dot.className = "connection-dot connected";
                    text.textContent = "已连接";
                } else {
                    dot.className = "connection-dot disconnected";
                    text.textContent = message || "未连接";
                }
            }

            async function loadTokenStats() {
                try {
                    const res = await apiFetch(API.BASE + "/chronicles/llm-stats");
                    if (res.ok) {
                        const data = await res.json();
                        document.getElementById(
                            "stat-input-tokens",
                        ).textContent = formatNumber(data.input_tokens || 0);
                        document.getElementById(
                            "stat-output-tokens",
                        ).textContent = formatNumber(data.output_tokens || 0);
                        document.getElementById(
                            "stat-total-requests",
                        ).textContent = formatNumber(data.total_requests || 0);
                        document.getElementById(
                            "stat-error-count",
                        ).textContent = formatNumber(data.error_count || 0);
                    }
                } catch (e) {
                    if (e.name !== "ApiError") {
                        console.warn("加载 Token 统计失败:", e);
                    }
                }
            }

            function formatNumber(n) {
                if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
                if (n >= 1000) return (n / 1000).toFixed(1) + "K";
                return n.toString();
            }

            loadConfig();
            loadTokenStats();
            checkLlmStatus();

            setInterval(loadTokenStats, 30000);
            setInterval(checkLlmStatus, 30000);
        </script>
    </body>
</html>
