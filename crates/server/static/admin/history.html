<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>历史记录 | Cyber-Jianghu</title>
        <link rel="stylesheet" href="css/dashboard.css" />
        <link rel="stylesheet" href="css/history.css" />
    </head>
    <body>
        <div class="page-header">
            <h1>历史<span>记录</span></h1>
            <a href="index.html" class="back-btn">← 返回仪表盘</a>
        </div>

        <!-- Top-level tab navigation -->
        <div class="top-tab-nav">
            <button
                class="top-tab-btn active"
                data-tab="experiences"
                onclick="switchTopTab('experiences')"
            >
                经历日志
            </button>
            <button
                class="top-tab-btn"
                data-tab="summaries"
                onclick="switchTopTab('summaries')"
            >
                每日摘要
            </button>
            <button
                class="top-tab-btn"
                data-tab="chronicles"
                onclick="switchTopTab('chronicles')"
            >
                群像传记
            </button>
        </div>

        <!-- ========== Chronicles Panel ========== -->
        <div id="panel-chronicles" class="tab-panel">
            <div class="chr-controls">
                <input
                    type="text"
                    class="search-input"
                    placeholder="搜索传记内容..."
                    id="chr-search-input"
                    oninput="filterChronicles()"
                />
                <button class="btn btn-primary" onclick="generateChronicle()">
                    手动生成
                </button>
                <button class="btn btn-secondary" onclick="loadChronicles()">
                    刷新
                </button>
            </div>

            <div id="chronicles-container" class="chronicles-grid">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- ========== Experiences Panel ========== -->
        <div id="panel-experiences" class="tab-panel active">
            <div class="exp-controls">
                <div class="filter-group">
                    <select id="filter-agent" class="filter-select">
                        <option value="">所有角色</option>
                    </select>
                    <select id="filter-location" class="filter-select">
                        <option value="">所有位置</option>
                    </select>
                    <select id="filter-action" class="filter-select">
                        <option value="">所有动作</option>
                    </select>
                    <select id="filter-result" class="filter-select">
                        <option value="all">全部</option>
                        <option value="success">仅成功</option>
                        <option value="failed">仅失败</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span
                        class="filter-label"
                        style="color: var(--text-secondary); font-size: 12px"
                        >Tick:</span
                    >
                    <div class="tick-range">
                        <input
                            type="number"
                            id="filter-from-tick"
                            class="filter-input"
                            placeholder="from"
                            style="width: 80px"
                        />
                        <span class="tick-range-sep">-</span>
                        <input
                            type="number"
                            id="filter-to-tick"
                            class="filter-input"
                            placeholder="to"
                            style="width: 80px"
                        />
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="resetExpFilters()">
                    重置
                </button>
                <button class="btn btn-primary" onclick="loadExperiences()">
                    刷新
                </button>
            </div>

            <div id="experiences-cards" class="exp-cards-list">
                <!-- Cards injected by JS -->
            </div>
            <div id="exp-loading" class="loading" style="display: none">
                加载中...
            </div>
            <div id="exp-empty" class="empty-state" style="display: none">
                <p>暂无符合条件的经历记录</p>
            </div>

            <div
                id="exp-pagination"
                class="exp-pagination"
                style="display: none"
            >
                <button id="exp-prev-btn" onclick="changeExpPage(-1)">
                    上一页
                </button>
                <select
                    id="exp-page-size"
                    class="page-size-select"
                    onchange="changeExpPageSize()"
                >
                    <option value="20">20条/页</option>
                    <option value="50">50条/页</option>
                    <option value="100">100条/页</option>
                </select>
                <span id="exp-page-info" class="page-info"></span>
                <button id="exp-next-btn" onclick="changeExpPage(1)">
                    下一页
                </button>
            </div>
        </div>

        <!-- ========== Daily Summaries Panel ========== -->
        <div id="panel-summaries" class="tab-panel">
            <div class="summaries-controls">
                <input
                    type="text"
                    class="search-input"
                    placeholder="搜索摘要内容..."
                    id="sum-search-input"
                    oninput="debouncedSumTextFilter()"
                />
                <div class="combobox" id="sum-agent-combobox">
                    <input
                        type="text"
                        class="combobox-input"
                        placeholder="搜索角色（名字/ID）..."
                        id="sum-agent-input"
                        autocomplete="off"
                    />
                    <input type="hidden" id="sum-agent-id" value="" />
                    <div class="combobox-dropdown" id="sum-agent-dropdown"></div>
                </div>
                <button class="btn btn-secondary" onclick="resetSumFilters()">
                    重置
                </button>
            </div>

            <div id="summaries-container" class="timeline-container">
                <div class="loading">加载中...</div>
            </div>

            <div
                id="sum-pagination"
                class="exp-pagination"
                style="display: none"
            >
                <button id="sum-prev-btn" onclick="changeSumPage(-1)">
                    上一页
                </button>
                <select
                    id="sum-page-size"
                    class="page-size-select"
                    onchange="changeSumPageSize()"
                >
                    <option value="20">20条/页</option>
                    <option value="50">50条/页</option>
                    <option value="100">100条/页</option>
                </select>
                <span id="sum-page-info" class="page-info"></span>
                <button id="sum-next-btn" onclick="changeSumPage(1)">
                    下一页
                </button>
            </div>
        </div>

        <!-- Detail Modal (for chronicles) -->
        <div id="detail-modal" class="modal" role="dialog" aria-modal="true" tabindex="-1">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">群像传记详情</h2>
                    <span class="close-btn" onclick="closeModal()"
                        >&times;</span
                    >
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <script src="js/js-yaml.min.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/agents.js"></script>
        <script src="js/history.js"></script>
    </body>
</html>
