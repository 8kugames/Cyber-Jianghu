<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>历史记录 | Cyber-Jianghu</title>
        <link rel="stylesheet" href="css/dashboard.css" />
        <style>
            body {
                background: var(--bg-base);
                min-height: 100vh;
                padding: 24px;
            }

            .page-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 24px;
                padding-bottom: 20px;
                border-bottom: 1px solid var(--border-color);
                position: relative;
            }

            .page-header::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: linear-gradient(
                    90deg,
                    transparent,
                    var(--accent),
                    transparent
                );
                opacity: 0.5;
            }

            .page-header h1 {
                font-size: 22px;
                font-weight: 700;
                color: var(--text-primary);
            }

            .page-header h1 span {
                color: var(--accent);
            }

            .back-btn {
                padding: 8px 16px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                color: var(--text-secondary);
                text-decoration: none;
                border-radius: var(--radius-sm);
                font-size: 13px;
                transition: all 0.15s;
            }

            .back-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

            /* Top-level tab nav */
            .top-tab-nav {
                display: flex;
                gap: 4px;
                margin-bottom: 20px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
                padding: 4px;
                width: fit-content;
            }

            .top-tab-btn {
                padding: 8px 20px;
                background: transparent;
                border: none;
                color: var(--text-secondary);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                border-radius: var(--radius-sm);
                transition: all 0.15s;
                font-family: var(--font-family);
            }

            .top-tab-btn.active {
                background: var(--accent);
                color: #fff;
            }

            .top-tab-btn:not(.active):hover {
                background: var(--bg-level-2);
                color: var(--text-primary);
            }

            .tab-panel {
                display: none;
            }

            .tab-panel.active {
                display: block;
            }

            /* ========== Chronicles panel ========== */
            .chr-controls {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
                flex-wrap: wrap;
                align-items: center;
            }

            .search-input {
                padding: 8px 14px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                color: var(--text-primary);
                border-radius: var(--radius-sm);
                font-size: 13px;
                min-width: 240px;
                outline: none;
                transition: all 0.15s;
                font-family: var(--font-family);
            }

            .search-input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 2px var(--accent-muted);
            }

            .search-input::placeholder {
                color: var(--text-subtle);
            }

            .chronicles-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
                gap: 16px;
            }

            .chronicle-card {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: var(--radius-lg);
                padding: 18px;
                cursor: pointer;
                transition: all 0.2s var(--ease-out);
                box-shadow: var(--card-shadow);
            }

            .chronicle-card:hover {
                border-color: var(--accent);
                box-shadow: var(--card-shadow-hover);
                transform: translateY(-2px);
            }

            .chronicle-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 12px;
            }

            .chronicle-id {
                font-size: 15px;
                font-weight: 600;
                color: var(--accent);
            }

            .chronicle-season {
                padding: 3px 9px;
                background: var(--accent-muted);
                color: var(--accent);
                border-radius: 12px;
                font-size: 11px;
                font-weight: 600;
                border: 1px solid rgba(20, 184, 166, 0.2);
            }

            .chronicle-period {
                color: var(--text-secondary);
                font-size: 12px;
                margin-bottom: 12px;
            }

            .chronicle-stats {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                margin-bottom: 12px;
                padding: 10px;
                background: var(--bg-level-2);
                border-radius: var(--radius-sm);
                border: 1px solid var(--border-subtle);
            }

            .chr-stat-item {
                text-align: center;
            }

            .chr-stat-value {
                font-size: 18px;
                font-weight: 700;
                color: var(--text-primary);
            }

            .chr-stat-label {
                font-size: 10px;
                color: var(--text-secondary);
                margin-top: 2px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }

            .chronicle-preview {
                color: var(--text-secondary);
                font-size: 12px;
                line-height: 1.6;
                display: -webkit-box;
                -webkit-line-clamp: 3;
                -webkit-box-orient: vertical;
                overflow: hidden;
                margin-bottom: 10px;
            }

            .chronicle-status {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 11px;
                font-weight: 600;
            }

            .status-template {
                background: var(--warning-muted);
                color: var(--warning);
            }
            .status-llm {
                background: var(--accent-muted);
                color: var(--accent);
            }
            .status-both {
                background: var(--success-muted);
                color: var(--success);
            }
            .status-generating {
                background: var(--accent-muted);
                color: var(--accent);
                animation: subtle-pulse 1.5s ease-in-out infinite;
            }

            @keyframes subtle-pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.7;
                }
            }

            /* ========== Experiences panel ========== */
            .exp-controls {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
                flex-wrap: wrap;
                align-items: center;
            }

            .filter-group {
                display: flex;
                gap: 8px;
                align-items: center;
            }

            .filter-select,
            .filter-input {
                padding: 8px 12px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                color: var(--text-primary);
                border-radius: var(--radius-sm);
                font-size: 13px;
                outline: none;
                font-family: var(--font-family);
            }

            .filter-select:focus,
            .filter-input:focus {
                border-color: var(--accent);
            }

            .tick-range {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .tick-range-sep {
                color: var(--text-secondary);
            }

            .exp-table-wrap {
                overflow-x: auto;
                border: 1px solid var(--border-color);
                border-radius: var(--radius-md);
            }

            .exp-table-wrap.hidden {
                display: none;
            }

            .exp-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
            }

            .exp-table th {
                background: var(--bg-level-2);
                padding: 8px 10px;
                text-align: left;
                font-weight: 600;
                font-size: 11px;
                color: var(--text-secondary);
                border-bottom: 1px solid var(--border-color);
                white-space: nowrap;
                position: sticky;
                top: 0;
                z-index: 1;
            }

            .exp-table th.soul-th {
                color: var(--accent);
                letter-spacing: 0.3px;
            }

            .exp-table td {
                padding: 8px 10px;
                border-bottom: 1px solid var(--border-subtle);
                color: var(--text-primary);
                vertical-align: top;
                font-size: 12px;
                line-height: 1.5;
            }

            .exp-table tr:last-child td {
                border-bottom: none;
            }

            .exp-table tr:hover td {
                background: rgba(20, 184, 166, 0.04);
            }

            .soul-cell {
                max-width: 220px;
                min-width: 140px;
            }

            .soul-cell-inner {
                max-height: 100px;
                overflow-y: auto;
                font-size: 12px;
                line-height: 1.5;
            }

            .narrative-cell {
                max-width: 280px;
                min-width: 180px;
            }

            .narrative-cell-inner {
                max-height: 100px;
                overflow-y: auto;
                font-size: 12px;
                line-height: 1.6;
                color: var(--text-secondary);
            }

            .result-badge {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 11px;
                font-weight: 600;
            }

            .result-success {
                background: var(--success-muted);
                color: var(--success);
            }

            .result-failed {
                background: var(--error-muted);
                color: var(--error);
            }

            .tick-badge {
                font-family: monospace;
                font-size: 12px;
                color: var(--accent);
            }

            .mono-text {
                font-family: monospace;
                font-size: 12px;
                color: var(--text-secondary);
            }

            .exp-action-badge {
                display: inline-block;
                padding: 2px 8px;
                background: var(--bg-level-2);
                border: 1px solid var(--border-subtle);
                border-radius: 4px;
                font-size: 12px;
            }

            .exp-narrative-full {
                font-size: 12px;
                line-height: 1.5;
                color: var(--text-secondary);
            }

            .exp-meta-text {
                font-size: 11px;
                line-height: 1.4;
                color: var(--text-primary);
                margin: 2px 0;
            }

            .tick-attempt-label {
                font-size: 10px;
                font-weight: 600;
                color: var(--accent);
                margin-top: 4px;
            }

            .soul-layers {
                display: flex;
                flex-wrap: wrap;
                gap: 3px;
                margin: 2px 0;
            }

            .exp-pagination {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 8px;
                margin-top: 20px;
            }

            .exp-pagination button {
                padding: 8px 14px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                color: var(--text-primary);
                border-radius: var(--radius-sm);
                font-size: 13px;
                cursor: pointer;
                transition: all 0.15s;
                font-family: var(--font-family);
            }

            .exp-pagination button:hover:not(:disabled) {
                border-color: var(--accent);
                color: var(--accent);
            }

            .exp-pagination button:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .page-size-select {
                padding: 8px 12px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                color: var(--text-primary);
                border-radius: var(--radius-sm);
                font-size: 13px;
                cursor: pointer;
                font-family: var(--font-family);
            }

            .page-info {
                font-size: 13px;
                color: var(--text-secondary);
            }

            /* ========== Daily Summaries panel ========== */
            .summaries-controls {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
                flex-wrap: wrap;
                align-items: center;
            }

            .summaries-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
                gap: 16px;
            }

            .summary-card {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: var(--radius-lg);
                padding: 18px;
                transition: all 0.2s var(--ease-out);
                box-shadow: var(--card-shadow);
            }

            .summary-card:hover {
                border-color: var(--accent);
                box-shadow: var(--card-shadow-hover);
                transform: translateY(-2px);
            }

            .summary-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 12px;
            }

            .summary-agent {
                font-size: 15px;
                font-weight: 600;
                color: var(--accent);
            }

            .summary-game-day {
                padding: 3px 9px;
                background: var(--accent-muted);
                color: var(--accent);
                border-radius: 12px;
                font-size: 11px;
                font-weight: 600;
                border: 1px solid rgba(20, 184, 166, 0.2);
            }

            .summary-meta {
                font-size: 12px;
                color: var(--text-secondary);
                margin-bottom: 12px;
            }

            .summary-content {
                font-size: 13px;
                color: var(--text-primary);
                line-height: 1.6;
                white-space: pre-wrap;
                word-break: break-word;
                max-height: 200px;
                overflow-y: hidden;
                padding: 10px;
                background: var(--bg-level-2);
                border-radius: var(--radius-sm);
                border: 1px solid var(--border-subtle);
                position: relative;
                transition: max-height 0.3s ease;
            }

            .summary-content.expanded {
                max-height: none;
                overflow-y: auto;
            }

            .summary-expand-btn {
                display: block;
                margin-top: 8px;
                padding: 4px 12px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                color: var(--text-secondary);
                border-radius: var(--radius-sm);
                font-size: 11px;
                cursor: pointer;
                text-align: center;
                transition: all 0.15s;
                font-family: var(--font-family);
            }

            .summary-expand-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
            }

            /* ========== Shared ========== */
            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 20px;
                color: var(--text-secondary);
            }

            .empty-state svg {
                width: 64px;
                height: 64px;
                margin-bottom: 16px;
                opacity: 0.4;
            }

            .empty-state p {
                font-size: 15px;
                margin: 0;
            }

            .loading {
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 60px 20px;
                color: var(--text-secondary);
                font-size: 14px;
            }

            /* Modal */
            .modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 1000;
                align-items: center;
                justify-content: center;
            }

            .modal.show {
                display: flex;
            }

            .modal-content {
                background: var(--bg-base);
                border: 1px solid var(--border-color);
                border-radius: var(--radius-lg);
                max-width: 860px;
                width: 90%;
                max-height: 90vh;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 20px;
                border-bottom: 1px solid var(--border-color);
            }

            .modal-header h2 {
                font-size: 16px;
                font-weight: 600;
                color: var(--text-primary);
                margin: 0;
            }

            .close-btn {
                font-size: 24px;
                cursor: pointer;
                color: var(--text-secondary);
                line-height: 1;
            }

            .close-btn:hover {
                color: var(--text-primary);
            }

            .modal-body {
                padding: 20px;
            }

            .detail-section {
                margin-bottom: 20px;
            }

            .detail-section h3 {
                font-size: 14px;
                font-weight: 600;
                color: var(--text-primary);
                margin: 0 0 12px;
            }

            .detail-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            .detail-item {
                padding: 10px 12px;
                background: var(--bg-level-2);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-sm);
            }

            .detail-item .label {
                font-size: 11px;
                color: var(--text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }

            .detail-item .value {
                font-size: 14px;
                font-weight: 600;
                color: var(--text-primary);
                margin-top: 4px;
            }

            .detail-tab-nav {
                display: flex;
                gap: 8px;
                margin-bottom: 12px;
            }

            .detail-tab-btn {
                padding: 6px 14px;
                background: var(--bg-level-1);
                border: 1px solid var(--border-color);
                color: var(--text-secondary);
                font-size: 12px;
                cursor: pointer;
                border-radius: var(--radius-sm);
                font-family: var(--font-family);
            }

            .detail-tab-btn.active {
                background: var(--accent-muted);
                color: var(--accent);
                border-color: rgba(20, 184, 166, 0.3);
            }

            .detail-tab-content {
                display: none;
            }

            .detail-tab-content.active {
                display: block;
            }

            .narrative {
                background: var(--bg-level-2);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-md);
                padding: 16px;
                white-space: pre-wrap;
                font-size: 13px;
                line-height: 1.8;
                max-height: 400px;
                overflow-y: auto;
                color: var(--text-primary);
            }

            .highlight-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .highlight-item {
                display: flex;
                gap: 10px;
                padding: 10px 12px;
                background: var(--bg-level-2);
                border-radius: var(--radius-sm);
                align-items: flex-start;
                border: 1px solid var(--border-subtle);
            }

            .highlight-type {
                padding: 2px 8px;
                border-radius: var(--radius-sm);
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                flex-shrink: 0;
            }

            .type-death {
                background: var(--error-muted);
                color: var(--error);
            }
            .type-dialogue {
                background: var(--accent-muted);
                color: var(--accent);
            }
            .type-combat {
                background: var(--warning-muted);
                color: var(--warning);
            }
            .type-social {
                background: var(--success-muted);
                color: var(--success);
            }

            .highlight-desc {
                flex: 1;
                font-size: 13px;
                color: var(--text-primary);
                line-height: 1.5;
            }

            .agents-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 10px;
            }

            .agent-card {
                padding: 12px;
                background: var(--bg-level-2);
                border-radius: var(--radius-sm);
                border: 1px solid var(--border-subtle);
            }

            .agent-name {
                font-weight: 600;
                color: var(--text-primary);
                margin-bottom: 6px;
                font-size: 13px;
            }

            .agent-info {
                font-size: 12px;
                color: var(--text-secondary);
                line-height: 1.5;
            }

            .agent-died {
                color: var(--error);
                font-weight: 500;
            }

            @media (max-width: 768px) {
                .chronicles-grid,
                .summaries-grid {
                    grid-template-columns: 1fr;
                }
                .detail-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
        </style>
    </head>
    <body>
        <div class="page-header">
            <h1>历史<span>记录</span></h1>
            <a href="index.html" class="back-btn">← 返回仪表盘</a>
        </div>

        <!-- Top-level tab navigation -->
        <div class="top-tab-nav">
            <button
                class="top-tab-btn active"
                data-tab="experiences"
                onclick="switchTopTab('experiences')"
            >
                经历日志
            </button>
            <button
                class="top-tab-btn"
                data-tab="summaries"
                onclick="switchTopTab('summaries')"
            >
                每日摘要
            </button>
            <button
                class="top-tab-btn"
                data-tab="chronicles"
                onclick="switchTopTab('chronicles')"
            >
                群像传记
            </button>
        </div>

        <!-- ========== Chronicles Panel ========== -->
        <div id="panel-chronicles" class="tab-panel">
            <div class="chr-controls">
                <input
                    type="text"
                    class="search-input"
                    placeholder="搜索传记内容..."
                    id="chr-search-input"
                    oninput="filterChronicles()"
                />
                <button class="btn btn-primary" onclick="generateChronicle()">
                    手动生成
                </button>
                <button class="btn btn-secondary" onclick="loadChronicles()">
                    刷新
                </button>
            </div>

            <div id="chronicles-container" class="chronicles-grid">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- ========== Experiences Panel ========== -->
        <div id="panel-experiences" class="tab-panel active">
            <div class="exp-controls">
                <div class="filter-group">
                    <select id="filter-agent" class="filter-select">
                        <option value="">所有角色</option>
                    </select>
                    <select id="filter-location" class="filter-select">
                        <option value="">所有位置</option>
                    </select>
                    <select id="filter-action" class="filter-select">
                        <option value="">所有动作</option>
                    </select>
                    <select id="filter-result" class="filter-select">
                        <option value="success">仅成功</option>
                        <option value="failed">仅失败</option>
                        <option value="all">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span
                        class="filter-label"
                        style="color: var(--text-secondary); font-size: 12px"
                        >Tick:</span
                    >
                    <div class="tick-range">
                        <input
                            type="number"
                            id="filter-from-tick"
                            class="filter-input"
                            placeholder="from"
                            style="width: 80px"
                        />
                        <span class="tick-range-sep">-</span>
                        <input
                            type="number"
                            id="filter-to-tick"
                            class="filter-input"
                            placeholder="to"
                            style="width: 80px"
                        />
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="resetExpFilters()">
                    重置
                </button>
                <button class="btn btn-primary" onclick="loadExperiences()">
                    刷新
                </button>
            </div>

            <div class="exp-table-wrap">
                <table class="exp-table">
                    <thead>
                        <tr>
                            <th>Tick</th>
                            <th>角色</th>
                            <th>位置</th>
                            <th>动作</th>
                            <th class="soul-th">人魂</th>
                            <th class="soul-th">天魂</th>
                            <th class="soul-th">地魂</th>
                            <th class="soul-th">叙事</th>
                            <th>结果</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody id="experiences-tbody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
            <div id="exp-loading" class="loading" style="display: none">
                加载中...
            </div>
            <div id="exp-empty" class="empty-state" style="display: none">
                <p>暂无符合条件的经历记录</p>
            </div>

            <div
                id="exp-pagination"
                class="exp-pagination"
                style="display: none"
            >
                <button id="exp-prev-btn" onclick="changeExpPage(-1)">
                    上一页
                </button>
                <select
                    id="exp-page-size"
                    class="page-size-select"
                    onchange="changeExpPageSize()"
                >
                    <option value="20">20条/页</option>
                    <option value="50">50条/页</option>
                    <option value="100">100条/页</option>
                </select>
                <span id="exp-page-info" class="page-info"></span>
                <button id="exp-next-btn" onclick="changeExpPage(1)">
                    下一页
                </button>
            </div>
        </div>

        <!-- ========== Daily Summaries Panel ========== -->
        <div id="panel-summaries" class="tab-panel">
            <div class="summaries-controls">
                <input
                    type="text"
                    class="search-input"
                    placeholder="搜索摘要内容（当前页内筛选）..."
                    id="sum-search-input"
                />
                <select id="sum-agent-filter" class="filter-select">
                    <option value="">所有角色</option>
                </select>
                <input
                    type="number"
                    id="sum-game-day-filter"
                    class="filter-input"
                    placeholder="游戏日"
                    style="width: 100px"
                />
                <button class="btn btn-primary" onclick="searchSummaries()">
                    搜索
                </button>
                <button class="btn btn-secondary" onclick="resetSumFilters()">
                    重置
                </button>
            </div>

            <div id="summaries-container" class="summaries-grid">
                <div class="loading">加载中...</div>
            </div>

            <div
                id="sum-pagination"
                class="exp-pagination"
                style="display: none"
            >
                <button id="sum-prev-btn" onclick="changeSumPage(-1)">
                    上一页
                </button>
                <select
                    id="sum-page-size"
                    class="page-size-select"
                    onchange="changeSumPageSize()"
                >
                    <option value="20">20条/页</option>
                    <option value="50">50条/页</option>
                    <option value="100">100条/页</option>
                </select>
                <span id="sum-page-info" class="page-info"></span>
                <button id="sum-next-btn" onclick="changeSumPage(1)">
                    下一页
                </button>
            </div>
        </div>

        <!-- Detail Modal (for chronicles) -->
        <div id="detail-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">群像传记详情</h2>
                    <span class="close-btn" onclick="closeModal()"
                        >&times;</span
                    >
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>

        <script src="js/js-yaml.min.js"></script>
        <script src="js/utils.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/agents.js"></script>
        <script>
            // ============================================================
            // Top-level tab switching
            // ============================================================
            function switchTopTab(tab) {
                document
                    .querySelectorAll(".top-tab-btn")
                    .forEach((b) => b.classList.remove("active"));
                document
                    .querySelectorAll(".tab-panel")
                    .forEach((p) => p.classList.remove("active"));
                document
                    .querySelector(`.top-tab-btn[data-tab="${tab}"]`)
                    .classList.add("active");
                document.getElementById(`panel-${tab}`).classList.add("active");

                // Lazy load data on first tab switch
                loadHistoryTab(tab);
            }

            function loadHistoryTab(tab) {
                if (tab === "experiences") return ensureExperiencesLoaded();
                if (tab === "summaries" && !summariesLoaded)
                    return loadSummaries();
                if (tab === "chronicles" && !chroniclesLoaded)
                    return loadChronicles();
            }

            function loadActiveHistoryTab() {
                const activeBtn = document.querySelector(".top-tab-btn.active");
                loadHistoryTab(
                    activeBtn ? activeBtn.dataset.tab : "experiences",
                );
            }

            // ============================================================
            // ========== Chronicles Panel ==========
            // ============================================================
            let chronicles = [];
            let chroniclesLoaded = false;

            async function loadChronicles() {
                const container = document.getElementById(
                    "chronicles-container",
                );
                container.innerHTML = '<div class="loading">加载中...</div>';
                try {
                    const [chrRes, pendingRes] = await Promise.all([
                        apiFetch(API.BASE + "/chronicles"),
                        apiFetch(API.BASE + "/chronicles/pending").catch(
                            () => ({ ok: false }),
                        ),
                    ]);
                    const chrData = await chrRes.json();
                    chronicles = chrData.chronicles || [];

                    let pendingMap = {};
                    if (pendingRes.ok) {
                        const pendingData = await pendingRes.json();
                        for (const t of pendingData.tasks || []) {
                            pendingMap[t.chronicle_id] = t;
                        }
                    }
                    chronicles = chronicles.map((c) => ({
                        ...c,
                        _pending: pendingMap[c.chronicle_id] || null,
                    }));
                    chroniclesLoaded = true;
                    renderChronicles(chronicles);
                } catch (e) {
                    if (e.name === "ApiError") {
                        container.innerHTML =
                            `<div class="empty-state"><p>${e.message === "UNAUTHORIZED" ? "请先登录" : "请求失败，请稍后重试"}</p></div>`;
                    } else {
                        container.innerHTML =
                            `<div class="empty-state"><p>加载失败: ${escapeHtml(e.message)}</p></div>`;
                    }
                }
            }

            function renderChronicles(list) {
                const container = document.getElementById(
                    "chronicles-container",
                );
                if (!list.length) {
                    container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/>
                        </svg>
                        <p>暂无群像传记</p>
                        <p style="font-size: 12px; margin-top: 8px; color: var(--text-subtle)">每7个游戏日会自动生成</p>
                    </div>`;
                    return;
                }
                container.innerHTML = list
                    .map(
                        (c) => `
                <div class="chronicle-card" data-chronicle-id="${escapeHtml(c.chronicle_id)}">
                    <div class="chronicle-header">
                        <span class="chronicle-id">${escapeHtml(c.season)} · 第${escapeHtml(c.game_day_start)}-${escapeHtml(c.game_day_end)}日</span>
                        <span class="chronicle-season">${escapeHtml(c.chronicle_id)}</span>
                    </div>
                    <div class="chronicle-period">第${escapeHtml(c.game_day_start)}日 - 第${escapeHtml(c.game_day_end)}日</div>
                    <div class="chronicle-stats">
                        <div class="chr-stat-item"><div class="chr-stat-value">${escapeHtml(c.agent_count)}</div><div class="chr-stat-label">江湖儿女</div></div>
                        <div class="chr-stat-item"><div class="chr-stat-value">${escapeHtml(c.actions_count)}</div><div class="chr-stat-label">行动次数</div></div>
                        <div class="chr-stat-item"><div class="chr-stat-value">${escapeHtml(c.deaths)}</div><div class="chr-stat-label">陨落</div></div>
                        <div class="chr-stat-item"><div class="chr-stat-value">${escapeHtml(c.births)}</div><div class="chr-stat-label">新生</div></div>
                    </div>
                    <div class="chronicle-preview">${escapeHtml(c.summary_preview || "")}</div>
                    <span class="chronicle-status status-${escapeHtml(getChrStatus(c))}">${escapeHtml(getChrStatusText(c))}</span>
                </div>
            `,
                    )
                    .join("");
            }

            function getChrStatus(c) {
                if (c._pending) {
                    const t = c._pending;
                    if (
                        t.supplement_status === "generating" ||
                        t.supplement_status === "pending"
                    )
                        return "generating";
                }
                return c.status;
            }

            function getChrStatusText(c) {
                if (c._pending) {
                    const t = c._pending;
                    if (t.supplement_status === "generating")
                        return "LLM 生成中";
                    if (t.supplement_status === "pending") return "等待生成";
                }
                return (
                    { template: "模板生成", llm: "LLM 版本", both: "完整版" }[
                        c.status
                    ] || c.status
                );
            }

            function filterChronicles() {
                const q = document
                    .getElementById("chr-search-input")
                    .value.toLowerCase();
                if (!q) {
                    renderChronicles(chronicles);
                    return;
                }
                renderChronicles(
                    chronicles.filter(
                        (c) =>
                            (c.summary_preview || "")
                                .toLowerCase()
                                .includes(q) ||
                            (c.chronicle_id || "").toLowerCase().includes(q) ||
                            (c.season || "").toLowerCase().includes(q),
                    ),
                );
            }

            async function openChronicle(id) {
                try {
                    const res = await apiFetch(API.BASE + "/chronicles/" + id);
                    if (!res.ok) throw new Error("加载失败");
                    showChrModal(await res.json());
                } catch (e) {
                    if (e.name !== "ApiError")
                        alert("详情加载失败: " + e.message);
                }
            }

            function showChrModal(c) {
                document.getElementById("modal-title").textContent =
                    `${c.chronicle_id} · ${c.season}季`;
                document.getElementById("modal-body").innerHTML = `
                <div class="detail-section">
                    <h3>基本统计</h3>
                    <div class="detail-grid">
                        <div class="detail-item"><div class="label">周期</div><div class="value">第${escapeHtml(c.game_day_start)} - ${escapeHtml(c.game_day_end)}日</div></div>
                        <div class="detail-item"><div class="label">江湖儿女</div><div class="value">${escapeHtml(c.agent_count)}</div></div>
                        <div class="detail-item"><div class="label">行动次数</div><div class="value">${escapeHtml(c.actions_count)}</div></div>
                        <div class="detail-item"><div class="label">陨落人数</div><div class="value">${escapeHtml(c.deaths)}</div></div>
                        <div class="detail-item"><div class="label">新生人数</div><div class="value">${escapeHtml(c.births)}</div></div>
                        <div class="detail-item"><div class="label">状态</div><div class="value">${escapeHtml(getChrStatusText(c))}</div></div>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-tab-nav">
                        <button class="detail-tab-btn active" data-detail-tab="template" onclick="switchDetailTab('template')">模板版本</button>
                        ${c.summary_llm ? '<button class="detail-tab-btn" data-detail-tab="llm" onclick="switchDetailTab(\'llm\')">LLM 版本</button>' : ""}
                    </div>
                    <div id="dt-template" class="detail-tab-content active">
                        <div class="narrative">${escapeHtml(c.summary || "")}</div>
                    </div>
                    ${c.summary_llm ? `<div id="dt-llm" class="detail-tab-content"><div class="narrative">${escapeHtml(c.summary_llm)}</div></div>` : ""}
                </div>
                ${
                    c.highlights && c.highlights.length
                        ? `
                <div class="detail-section">
                    <h3>关键事件</h3>
                    <div class="highlight-list">
                        ${c.highlights.map((h) => `<div class="highlight-item"><span class="highlight-type type-${escapeHtml(h.event_type || "")}">${escapeHtml({ death: "陨落", dialogue: "对话", combat: "战斗", social: "交际" }[h.event_type] || h.event_type || "")}</span><span class="highlight-desc">${escapeHtml(h.description || "")}</span></div>`).join("")}
                    </div>
                </div>`
                        : ""
                }
                ${
                    c.agent_summaries && c.agent_summaries.length
                        ? `
                <div class="detail-section">
                    <h3>江湖群像</h3>
                    <div class="agents-grid">
                        ${c.agent_summaries.map((a) => `<div class="agent-card"><div class="agent-name">${escapeHtml(a.name || "")}</div><div class="agent-info"><div>位置: ${escapeHtml(getLocationName(a.location || "-"))}</div><div>行动: ${escapeHtml(a.actions_count || 0)}次</div>${a.died_this_period ? '<div class="agent-died">已于本周期陨落</div>' : ""}</div></div>`).join("")}
                    </div>
                </div>`
                        : ""
                }
            `;
                document.getElementById("detail-modal").classList.add("show");
            }

            function switchDetailTab(tab) {
                document
                    .querySelectorAll(".detail-tab-btn")
                    .forEach((b) => b.classList.remove("active"));
                document
                    .querySelectorAll(".detail-tab-content")
                    .forEach((c) => c.classList.remove("active"));
                document
                    .querySelector(`.detail-tab-btn[data-detail-tab="${tab}"]`)
                    .classList.add("active");
                document.getElementById(`dt-${tab}`).classList.add("active");
            }

            function closeModal() {
                document
                    .getElementById("detail-modal")
                    .classList.remove("show");
            }

            async function generateChronicle() {
                if (!confirm("确定要手动生成一份群像传记吗？")) return;
                const btn = document.querySelector(
                    ".chr-controls .btn-primary",
                );
                btn.disabled = true;
                btn.textContent = "生成中...";
                try {
                    const res = await apiFetch(
                        API.BASE + "/chronicles/generate",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: "{}",
                        },
                    );
                    if (res.ok) {
                        alert("生成成功");
                        loadChronicles();
                    } else alert("生成失败: " + (await res.text()));
                } catch (e) {
                    if (e.name !== "ApiError") alert("生成失败: " + e.message);
                } finally {
                    btn.disabled = false;
                    btn.textContent = "手动生成";
                }
            }

            // ============================================================
            // ========== Experiences Panel ==========
            // ============================================================
            let experiences = [];
            let expTotal = 0,
                expPage = 1,
                expPageSize = 20;
            let expFiltersLoaded = false;
            let experiencesLoaded = false;

            async function ensureExperiencesLoaded() {
                if (!expFiltersLoaded) await initExpFilters();
                if (!experiencesLoaded) await loadExperiences();
                // 确保 location 映射已加载
                if (!Object.keys(locationNames).length) await initLocationMapping();
            }

            async function initExpFilters() {
                if (expFiltersLoaded) return;
                try {
                    const [agentsRes, actRes] = await Promise.all([
                        apiFetch(API.BASE + "/agents"),
                        apiFetch(API.BASE + "/actions-map"),
                    ]);
                    if (agentsRes.ok) {
                        const agents = await agentsRes.json();
                        // 同步填充全局 allAgentsMap（供 resolveTargetName / getAgentName 使用）
                        agents.forEach((a) => {
                            allAgentsMap[a.id] = a;
                            if (a.agent_id) allAgentsMap[a.agent_id] = a;
                        });
                        const agentSel =
                            document.getElementById("filter-agent");
                        const locSel =
                            document.getElementById("filter-location");
                        const locSet = new Set();
                        const agentFrag = document.createDocumentFragment();
                        agents.forEach((a) => {
                            const opt = document.createElement("option");
                            opt.value = a.id;
                            opt.textContent = a.name;
                            agentFrag.appendChild(opt);
                            if (a.location && a.location !== "unknown")
                                locSet.add(a.location);
                        });
                        agentSel.appendChild(agentFrag);
                        const locFrag = document.createDocumentFragment();
                        [...locSet].sort().forEach((loc) => {
                            const opt = document.createElement("option");
                            opt.value = loc;
                            opt.textContent = loc;
                            locFrag.appendChild(opt);
                        });
                        locSel.appendChild(locFrag);
                    }
                    if (actRes.ok) {
                        const actMap = await actRes.json();
                        const sel = document.getElementById("filter-action");
                        const actFrag = document.createDocumentFragment();
                        Object.entries(actMap).forEach(([k, v]) => {
                            const opt = document.createElement("option");
                            opt.value = k;
                            opt.textContent = v;
                            actFrag.appendChild(opt);
                        });
                        sel.appendChild(actFrag);
                    }
                    expFiltersLoaded = true;
                } catch (e) {
                    if (e.name !== "ApiError")
                        console.warn("加载过滤器失败:", e);
                }
            }

            async function loadExperiences() {
                const loading = document.getElementById("exp-loading");
                const empty = document.getElementById("exp-empty");
                const tbody = document.getElementById("experiences-tbody");
                loading.style.display = "flex";
                empty.style.display = "none";
                tbody.innerHTML = "";

                const params = new URLSearchParams();
                params.set("page", expPage);
                params.set("limit", expPageSize);
                const aid = document.getElementById("filter-agent").value;
                const loc = document.getElementById("filter-location").value;
                const act = document.getElementById("filter-action").value;
                const resultVal = document.getElementById("filter-result").value;
                const from = document.getElementById("filter-from-tick").value;
                const to = document.getElementById("filter-to-tick").value;
                if (aid) params.set("agent_id", aid);
                if (loc) params.set("location", loc);
                if (act) params.set("action_type", act);
                if (resultVal && resultVal !== "success") params.set("result", resultVal);
                if (from) params.set("from_tick", from);
                if (to) params.set("to_tick", to);

                try {
                    const data = await (
                        await apiFetch(API.BASE + "/experiences?" + params)
                    ).json();
                    experiences = data.entries || [];
                    expTotal = data.total || 0;
                    experiencesLoaded = true;
                    renderExpTable();
                    updateExpPagination();
                } catch (e) {
                    if (e.name === "ApiError") {
                        // 401 已由 apiFetch 弹 auth modal，500 已由 apiFetch showToast
                        tbody.innerHTML = `<tr><td colspan="10" class="empty-state"><p>${e.message === "UNAUTHORIZED" ? "请先登录" : "请求失败"}</p></td></tr>`;
                    } else {
                        tbody.innerHTML = `<tr><td colspan="10" class="empty-state"><p>加载失败: ${escapeHtml(e.message)}</p></td></tr>`;
                    }
                } finally {
                    loading.style.display = "none";
                }
            }

            function renderExpTable() {
                const empty = document.getElementById("exp-empty");
                const tbody = document.getElementById("experiences-tbody");
                const tableWrap = tbody.closest(".exp-table-wrap");
                if (!experiences.length) {
                    empty.style.display = "flex";
                    if (tableWrap) tableWrap.classList.add("hidden");
                    return;
                }
                empty.style.display = "none";
                if (tableWrap) tableWrap.classList.remove("hidden");
                tbody.innerHTML = experiences
                    .map((e) => {
                        const metadata = e.soul_cycle_metadata || {};
                        const cycles = metadata.cycles || [];
                        const isSuccess = e.result === "success";
                        const resultBadge = `<span class="result-badge ${isSuccess ? "result-success" : "result-failed"}">${isSuccess ? "成功" : "失败"}</span>`;

                        const timeStr = e.created_at
                            ? new Date(e.created_at).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })
                            : "-";

                        const renhunHtml = renderRenhunCell(cycles, e);
                        const tianhunHtml = renderTianhunCell(cycles, e);
                        const dihunHtml = renderDihunCell(cycles, e);
                        const narrativeHtml = e.narrative ? escapeHtml(e.narrative) : '<span style="color:var(--text-subtle)">-</span>';

                        return `<tr>` +
                            `<td><span class="tick-badge">T${escapeHtml(e.tick_id || "-")}</span></td>` +
                            `<td>${escapeHtml(e.agent_name || "-")}</td>` +
                            `<td>${escapeHtml(getLocationName(e.location || "-"))}</td>` +
                            `<td><span class="exp-action-badge">${escapeHtml(e.action_type_display || e.action_type || "-")}</span></td>` +
                            `<td class="soul-cell"><div class="soul-cell-inner">${renhunHtml}</div></td>` +
                            `<td class="soul-cell"><div class="soul-cell-inner">${tianhunHtml}</div></td>` +
                            `<td class="soul-cell"><div class="soul-cell-inner">${dihunHtml}</div></td>` +
                            `<td class="narrative-cell"><div class="narrative-cell-inner">${narrativeHtml}</div></td>` +
                            `<td>${resultBadge}</td>` +
                            `<td class="mono-text">${escapeHtml(timeStr)}</td>` +
                            `</tr>`;
                    })
                    .join("");
            }

            // LAYER_NAMES 已移至 utils.js（全局共享）

            // 渲染人魂单元格
            function renderRenhunCell(cycles, entry) {
                if (!cycles || cycles.length === 0) {
                    if (!entry.thought_log) return "-";
                    return `<div class="exp-meta-text" style="font-style:italic;color:var(--text-secondary);">${escapeHtml(entry.thought_log)}</div>`;
                }
                let html = "";
                cycles.forEach((cycle, idx) => {
                    if (cycles.length > 1) {
                        html += `<div class="tick-attempt-label">第${idx + 1}次</div>`;
                    }
                    const rh = cycle.renhun;
                    if (!rh) return;
                    if (rh.narrative) {
                        html += `<div class="exp-meta-text">${escapeHtml(rh.narrative)}</div>`;
                    }
                    if (rh.thought_log) {
                        html += `<div class="exp-meta-text" style="font-style:italic;color:var(--text-secondary);">${escapeHtml(rh.thought_log)}</div>`;
                    }
                });
                return html || "-";
            }

            // 渲染天魂单元格
            function renderTianhunCell(cycles, entry) {
                if (!cycles || cycles.length === 0) {
                    if (!entry.result) return "-";
                    const isApproved = entry.result === "success";
                    return `<span class="soul-layer-tag ${isApproved ? "passed" : "failed"}">${isApproved ? "✓通过" : "✗驳回"}</span>`;
                }
                let html = "";
                cycles.forEach((cycle, idx) => {
                    if (cycles.length > 1) {
                        html += `<div class="tick-attempt-label">第${idx + 1}次</div>`;
                    }
                    const th = cycle.tianhun;
                    if (!th) return;
                    const isApproved = th.result === "approved";
                    if (th.layers && th.layers.length > 0) {
                        html += `<div class="soul-layers">`;
                        th.layers.forEach((l) => {
                            const passed = l.passed;
                            const name = LAYER_NAMES[l.layer] || l.layer;
                            html += `<span class="soul-layer-tag ${passed ? "passed" : "failed"}">${escapeHtml(name)}${passed ? "" : ": " + escapeHtml(l.detail || "")}</span>`;
                        });
                        html += `</div>`;
                    }
                    if (th.reason) {
                        html += `<div class="exp-meta-text" style="color:var(--text-secondary);">${escapeHtml(th.reason)}</div>`;
                    }
                });
                return html || "-";
            }

            // 地魂 action_type 中文映射（数据库存中文，非英文）
            var DIHUN_SPEAK_TYPES = { "说话": true, "speak": true };
            var DIHUN_WHISPER_TYPES = { "私语": true, "whisper": true };
            var DIHUN_SHOUT_TYPES = { "大喊": true, "shout": true };

            // 解析 action_data（兼容 string / object / null）
            function parseActionData(raw) {
                if (!raw) return {};
                if (typeof raw === "object") return raw;
                if (typeof raw === "string") {
                    try { return JSON.parse(raw); } catch(e) { return {}; }
                }
                return {};
            }

            // resolveTargetName 已移至 utils.js（全局共享）

            // 渲染地魂单元格
            function renderDihunCell(cycles, entry) {
                if (!cycles || cycles.length === 0) {
                    // 无 cycles 时从顶层 action_data 渲染
                    const topData = parseActionData(entry.action_data);
                    const topType = entry.action_type || "";
                    const topContent = topData.content || "";
                    if (DIHUN_SPEAK_TYPES[topType] && topContent)
                        return `<div class="exp-meta-text">"${escapeHtml(topContent)}"</div>`;
                    if (DIHUN_WHISPER_TYPES[topType] && topContent) {
                        const name = resolveTargetName(topData.target_agent_id);
                        return `<div class="exp-meta-text">向${escapeHtml(name)}密语: "${escapeHtml(topContent)}"</div>`;
                    }
                    if (DIHUN_SHOUT_TYPES[topType] && topContent)
                        return `<div class="exp-meta-text">大喊: "${escapeHtml(topContent)}"</div>`;
                    return "-";
                }
                let html = "";
                cycles.forEach((cycle, idx) => {
                    if (cycles.length > 1) {
                        html += `<div class="tick-attempt-label">第${idx + 1}次</div>`;
                    }
                    const fi = cycle.final_intent;
                    if (!fi) return;
                    const fiActionType = fi.action_type || "";
                    let fiData = parseActionData(fi.action_data);
                    // final_intent.action_data 为空时 fallback 到顶层 action_data
                    if (!fiData.content && entry.action_data) {
                        const fallback = parseActionData(entry.action_data);
                        if (fallback.content) fiData = { ...fiData, ...fallback };
                    }
                    const fiContent = fiData.content || "";
                    let fiText = "";
                    if (DIHUN_SPEAK_TYPES[fiActionType] && fiContent)
                        fiText = `"${escapeHtml(fiContent)}"`;
                    else if (DIHUN_WHISPER_TYPES[fiActionType] && fiContent) {
                        const name = resolveTargetName(fiData.target_agent_id);
                        fiText = `向${escapeHtml(name)}密语: "${escapeHtml(fiContent)}"`;
                    }
                    else if (DIHUN_SHOUT_TYPES[fiActionType] && fiContent)
                        fiText = `大喊: "${escapeHtml(fiContent)}"`;
                    else {
                        fiText = escapeHtml(getActionTypeDisplay(fiActionType));
                        if (Object.keys(fiData).length > 0)
                            fiText += ` ${escapeHtml(JSON.stringify(fiData))}`;
                    }
                    html += `<div class="exp-meta-text">${fiText}</div>`;
                });
                return html || "-";
            }

            function updateExpPagination() {
                const totalPages = Math.ceil(expTotal / expPageSize);
                const pg = document.getElementById("exp-pagination");
                const info = document.getElementById("exp-page-info");
                if (expTotal === 0) {
                    pg.style.display = "none";
                    return;
                }
                pg.style.display = "flex";
                info.textContent = `第 ${expPage} / ${totalPages} 页，共 ${expTotal} 条`;
                document.getElementById("exp-prev-btn").disabled = expPage <= 1;
                document.getElementById("exp-next-btn").disabled =
                    expPage >= totalPages;
                document.getElementById("exp-page-size").value = expPageSize;
            }

            function changeExpPage(delta) {
                expPage = Math.max(1, expPage + delta);
                loadExperiences();
            }

            function changeExpPageSize() {
                expPageSize = parseInt(
                    document.getElementById("exp-page-size").value,
                );
                expPage = 1;
                loadExperiences();
            }

            function resetExpFilters() {
                document.getElementById("filter-agent").value = "";
                document.getElementById("filter-location").value = "";
                document.getElementById("filter-action").value = "";
                document.getElementById("filter-result").value = "success";
                document.getElementById("filter-from-tick").value = "";
                document.getElementById("filter-to-tick").value = "";
                expPage = 1;
                loadExperiences();
            }

            // ============================================================
            // ========== Daily Summaries Panel ==========
            // ============================================================
            let summariesData = [];
            let sumTotal = 0,
                sumPage = 1,
                sumPageSize = 20;
            let summariesLoaded = false;

            async function loadSummaries() {
                const container = document.getElementById(
                    "summaries-container",
                );
                container.innerHTML = '<div class="loading">加载中...</div>';

                await ensureAgentFilterPopulated();

                const params = new URLSearchParams();
                params.set("page", sumPage);
                params.set("limit", sumPageSize);
                const agentFilterVal =
                    document.getElementById("sum-agent-filter").value;
                const gameDayVal =
                    document.getElementById("sum-game-day-filter").value;
                if (agentFilterVal) params.set("agent_id", agentFilterVal);
                if (gameDayVal) params.set("game_day", gameDayVal);

                try {
                    const res = await apiFetch(
                        API.BASE + "/agent-daily-summaries?" + params,
                    );
                    const data = await res.json();
                    summariesData = data.summaries || [];
                    sumTotal = data.total || 0;
                    summariesLoaded = true;
                    applySumTextFilter();
                    updateSumPagination();
                } catch (e) {
                    if (e.name === "ApiError") {
                        container.innerHTML =
                            `<div class="empty-state"><p>${e.message === "UNAUTHORIZED" ? "请先登录" : "请求失败，请稍后重试"}</p></div>`;
                    } else {
                        container.innerHTML =
                            `<div class="empty-state"><p>加载失败: ${escapeHtml(e.message)}</p></div>`;
                    }
                }
            }

            // 客户端文本即时过滤（不影响 sumTotal/分页，仅在当前页内筛选显示）
            function applySumTextFilter() {
                const q = document.getElementById("sum-search-input").value.toLowerCase().trim();
                if (q) {
                    renderSummaries(summariesData.filter(s =>
                        (s.summary || "").toLowerCase().includes(q) ||
                        getAgentName(s.agent_id).toLowerCase().includes(q)
                    ));
                } else {
                    renderSummaries(summariesData);
                }
            }

            function searchSummaries() {
                if (summariesLoaded) {
                    applySumTextFilter();
                } else {
                    sumPage = 1;
                    loadSummaries();
                }
            }

            function resetSumFilters() {
                document.getElementById("sum-search-input").value = "";
                document.getElementById("sum-agent-filter").value = "";
                document.getElementById("sum-game-day-filter").value = "";
                sumPage = 1;
                loadSummaries();
            }

            async function ensureAgentFilterPopulated() {
                const sel = document.getElementById("sum-agent-filter");
                if (sel.options.length > 1) return;
                if (!allAgents.length) {
                    try {
                        const res = await apiFetch(API.BASE + "/agents");
                        if (res.ok) allAgents = await res.json();
                    } catch (e) {}
                }
                allAgents.forEach((a) => {
                    allAgentsMap[a.id] = a;
                    if (a.agent_id) allAgentsMap[a.agent_id] = a;
                    const opt = document.createElement("option");
                    opt.value = a.id;
                    opt.textContent = a.name;
                    sel.appendChild(opt);
                });
            }

            function getAgentName(agentId) {
                if (!agentId) return "未知角色";
                if (allAgentsMap && allAgentsMap[agentId])
                    return allAgentsMap[agentId].name || `Agent ${agentId.substring(0, 8)}`;
                return `Agent ${agentId.substring(0, 8)}`;
            }

            function renderSummaries(list) {
                const container = document.getElementById(
                    "summaries-container",
                );
                if (!list.length) {
                    container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                        </svg>
                        <p>暂无每日摘要</p>
                        <p style="font-size: 12px; margin-top: 8px; color: var(--text-subtle)">游戏日结束后自动生成</p>
                    </div>`;
                    return;
                }
                container.innerHTML = list
                    .map((s) => {
                        const d = new Date(s.created_at);
                        const dateStr = d.toLocaleString("zh-CN", {
                            year: "numeric",
                            month: "2-digit",
                            day: "2-digit",
                            hour: "2-digit",
                            minute: "2-digit",
                        });
                        return `
                    <div class="summary-card">
                        <div class="summary-header">
                            <span class="summary-agent">${escapeHtml(getAgentName(s.agent_id))}</span>
                            <span class="summary-game-day">第${escapeHtml(s.game_day)}日</span>
                        </div>
                        <div class="summary-meta">存档时间: ${escapeHtml(dateStr)}</div>
                        <div class="summary-content" data-sum-expanded="false">${escapeHtml(s.summary || "")}</div>
                        <button class="summary-expand-btn" onclick="toggleSummaryExpand(this)">展开全文</button>
                    </div>`;
                    })
                    .join("");
            }


            function updateSumPagination() {
                const totalPages = Math.ceil(sumTotal / sumPageSize);
                const pg = document.getElementById("sum-pagination");
                const info = document.getElementById("sum-page-info");
                if (sumTotal === 0) {
                    pg.style.display = "none";
                    return;
                }
                pg.style.display = "flex";
                info.textContent = `第 ${sumPage} / ${totalPages} 页，共 ${sumTotal} 条`;
                document.getElementById("sum-prev-btn").disabled = sumPage <= 1;
                document.getElementById("sum-next-btn").disabled =
                    sumPage >= totalPages;
                document.getElementById("sum-page-size").value = sumPageSize;
            }

            function changeSumPage(delta) {
                const totalPages = Math.ceil(sumTotal / sumPageSize);
                sumPage = Math.max(1, Math.min(totalPages, sumPage + delta));
                loadSummaries();
            }

            function changeSumPageSize() {
                sumPageSize = parseInt(
                    document.getElementById("sum-page-size").value,
                );
                sumPage = 1;
                loadSummaries();
            }

            function toggleSummaryExpand(btn) {
                const content = btn.previousElementSibling;
                const expanded = content.classList.toggle("expanded");
                btn.textContent = expanded ? "收起" : "展开全文";
            }

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeModal();
            });
            document.addEventListener("click", (e) => {
                const card = e.target.closest(
                    ".chronicle-card[data-chronicle-id]",
                );
                if (card) openChronicle(card.dataset.chronicleId);
            });

            // Load experiences on init (default tab)
            ensureExperiencesLoaded();
        </script>
    </body>
</html>
