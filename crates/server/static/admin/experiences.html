<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经历日志流水 | Cyber-Jianghu</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <style>
        /* page-private: cannot be scoped via .exp-container (body-level) */
        body {
            background: var(--bg-base);
            min-height: 100vh;
            padding: 24px;
            overflow-y: auto;
        }
        .exp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }
        .exp-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }
        .exp-header h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); }
        .exp-header h1 span { color: var(--accent); }
    </style>
</head>
<body>
    <div class="exp-header">
        <h1>经历<span>日志流水</span></h1>
        <a href="index.html" class="back-btn">← 返回仪表盘</a>
    </div>

    <div class="exp-controls">
        <div class="filter-group">
            <select id="filter-agent" class="filter-select">
                <option value="">所有角色</option>
            </select>
            <select id="filter-location" class="filter-select">
                <option value="">所有位置</option>
            </select>
            <select id="filter-action" class="filter-select">
                <option value="">所有动作</option>
            </select>
        </div>
        <div class="filter-group">
            <span class="filter-label">Tick:</span>
            <div class="tick-range">
                <input type="number" id="filter-from-tick" class="filter-input" placeholder="from">
                <span class="tick-range-sep">-</span>
                <input type="number" id="filter-to-tick" class="filter-input" placeholder="to">
            </div>
        </div>
        <button class="btn btn-secondary" onclick="resetFilters()">重置</button>
        <button class="btn btn-primary" onclick="loadExperiences()">刷新</button>
    </div>

    <div id="experiences-container" class="exp-list-wrap">
        <table class="exp-table">
            <thead>
                <tr>
                    <th class="col-tick">Tick</th>
                    <th class="col-agent">角色</th>
                    <th class="col-agent-id">Agent ID</th>
                    <th class="col-device-id">Device ID</th>
                    <th class="col-location">位置</th>
                    <th class="col-action">动作</th>
                    <th class="col-renhun">人魂</th>
                    <th class="col-tianhun">天魂</th>
                    <th class="col-dihun">地魂</th>
                    <th class="col-narrative">叙事</th>
                </tr>
            </thead>
            <tbody id="experiences-tbody">
                <!-- Rows injected by JS -->
            </tbody>
        </table>
        <div id="experiences-loading" class="exp-empty"><div class="spinner"></div>加载中...</div>
        <div id="experiences-empty" class="exp-empty" style="display:none;">暂无符合条件的经历记录</div>
    </div>

    <div id="pagination-container" class="exp-pagination" style="display: none;">
        <button id="prev-btn" class="btn btn-secondary" onclick="changePage(-1)">上一页</button>
        <select id="page-size" class="page-size-select" onchange="changePageSize()">
            <option value="20">20条/页</option>
            <option value="50">50条/页</option>
            <option value="100">100条/页</option>
        </select>
        <span id="page-info" class="page-info"></span>
        <button id="next-btn" class="btn btn-secondary" onclick="changePage(1)">下一页</button>
    </div>

    <script src="js/js-yaml.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/agents.js"></script>
    <script>
        let experiences = [];
        let total = 0;
        let currentPage = 1;
        let pageSize = 20;

        async function loadExperiences() {
            const loading = document.getElementById('experiences-loading');
            const empty = document.getElementById('experiences-empty');
            const tbody = document.getElementById('experiences-tbody');
            loading.style.display = 'block';
            empty.style.display = 'none';
            tbody.innerHTML = '';

            const agentId = document.getElementById('filter-agent').value;
            const location = document.getElementById('filter-location').value;
            const actionType = document.getElementById('filter-action').value;
            const fromTick = document.getElementById('filter-from-tick').value;
            const toTick = document.getElementById('filter-to-tick').value;

            const params = new URLSearchParams();
            params.set('page', currentPage);
            params.set('limit', pageSize);
            if (agentId) params.set('agent_id', agentId);
            if (location) params.set('location', location);
            if (actionType) params.set('action_type', actionType);
            if (fromTick) params.set('from_tick', fromTick);
            if (toTick) params.set('to_tick', toTick);

            try {
                const res = await apiFetch(API.BASE + "/experiences?" + params);

                if (!res.ok) {
                    throw new Error('加载失败');
                }

                const data = await res.json();
                experiences = data.entries || [];
                total = data.total || 0;

                renderExperiencesPage();
                updatePagination();
            } catch (e) {
                if (e.name !== "ApiError") {
                    loading.style.display = 'none';
                    tbody.innerHTML = `<tr><td colspan="10" class="exp-empty">加载失败: ${escapeHtml(e.message)}</td></tr>`;
                }
            }
        }

        function renderExperiencesPage() {
            const tbody = document.getElementById('experiences-tbody');
            const loading = document.getElementById('experiences-loading');
            const empty = document.getElementById('experiences-empty');

            if (experiences.length === 0) {
                tbody.innerHTML = '';
                loading.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            loading.style.display = 'none';
            empty.style.display = 'none';

            tbody.innerHTML = experiences.map(entry => {
                const locationDisplay = entry.location || '-';
                const actionDisplay = entry.action_type_display || entry.action_type || '-';
                const narrativeText = entry.narrative || '';
                const metadata = entry.soul_cycle_metadata || {};

                // 三魂 metadata 单元格（无 cycles 时为 '-'）
                const renhunCell = renderRenhunCell(metadata.cycles, entry);
                const tianhunCell = renderTianhunCell(metadata.cycles, entry);
                const dihunCell = renderDihunCell(metadata.cycles, entry);

                // 基础行：Tick | Agent | AgentID | DeviceID | Location | Action | 人魂 | 天魂 | 地魂 | 叙事
                let html = `<tr>` +
                    `<td class="col-tick"><span class="tick-badge">T${escapeHtml(entry.tick_id || '-')}</span></td>` +
                    `<td class="col-agent">${escapeHtml(entry.agent_name || '')}</td>` +
                    `<td class="col-agent-id"><span class="mono-text">${entry.agent_id ? escapeHtml(entry.agent_id.substring(0, 8)) : '-'}</span></td>` +
                    `<td class="col-device-id"><span class="mono-text">${entry.device_id ? escapeHtml(entry.device_id.substring(0, 8)) : '-'}</span></td>` +
                    `<td class="col-location"><span class="exp-location-text">${escapeHtml(locationDisplay)}</span></td>` +
                    `<td class="col-action"><span class="exp-action-badge">${escapeHtml(actionDisplay)}</span></td>` +
                    `<td class="col-renhun">${renhunCell}</td>` +
                    `<td class="col-tianhun">${tianhunCell}</td>` +
                    `<td class="col-dihun">${dihunCell}</td>` +
                    `<td class="col-narrative">`;

                // Narrative 文本
                if (narrativeText) {
                    html += `<div class="exp-narrative-full">${escapeHtml(narrativeText)}</div>`;
                }
                html += `</td></tr>`;
                return html;
            }).join('');
        }

        // 渲染人魂单元格
        function renderRenhunCell(cycles, entry) {
            if (!cycles || cycles.length === 0) {
                if (!entry.thought_log) return '-';
                return `<div class="exp-meta-text" style="font-style:italic;color:var(--text-secondary);">${escapeHtml(entry.thought_log)}</div>`;
            }
            let html = '';
            cycles.forEach((cycle, idx) => {
                if (cycles.length > 1) {
                    html += `<div class="tick-attempt-label">第${idx + 1}次</div>`;
                }
                const rh = cycle.renhun;
                if (!rh) return;
                if (rh.narrative) {
                    html += `<div class="exp-meta-text">${escapeHtml(rh.narrative)}</div>`;
                }
                if (rh.thought_log) {
                    html += `<div class="exp-meta-text" style="font-style:italic;color:var(--text-secondary);">${escapeHtml(rh.thought_log)}</div>`;
                }
            });
            return html || '-';
        }

        // 渲染天魂单元格
        function renderTianhunCell(cycles, entry) {
            if (!cycles || cycles.length === 0) {
                if (!entry.result) return '-';
                const isApproved = entry.result === 'success';
                return `<span class="soul-layer-tag ${isApproved ? 'passed' : 'failed'}">${isApproved ? '✓通过' : '✗驳回'}</span>`;
            }
            let html = '';
            cycles.forEach((cycle, idx) => {
                if (cycles.length > 1) {
                    html += `<div class="tick-attempt-label">第${idx + 1}次</div>`;
                }
                const th = cycle.tianhun;
                if (!th) return;
                const isApproved = th.result === 'approved';
                if (th.layers && th.layers.length > 0) {
                    html += `<div class="soul-layers">`;
                    th.layers.forEach(l => {
                        const passed = l.passed;
                        const name = LAYER_NAMES[l.layer] || l.layer;
                        html += `<span class="soul-layer-tag ${passed ? 'passed' : 'failed'}">${escapeHtml(name)}${passed ? '' : ': ' + escapeHtml(l.detail || '')}</span>`;
                    });
                    html += `</div>`;
                }
                if (th.reason) {
                    html += `<div class="exp-meta-text" style="color:var(--text-secondary);">${escapeHtml(th.reason)}</div>`;
                }
            });
            return html || '-';
        }

        // 渲染地魂单元格
        function renderDihunCell(cycles, entry) {
            if (!cycles || cycles.length === 0) return '-';
            let html = '';
            cycles.forEach((cycle, idx) => {
                if (cycles.length > 1) {
                    html += `<div class="tick-attempt-label">第${idx + 1}次</div>`;
                }
                const fi = cycle.final_intent;
                if (!fi) return;
                const fiActionType = fi.action_type || '';
                const fiData = (fi.action_data && typeof fi.action_data === 'object') ? fi.action_data : {};
                const fiContent = fiData.content || '';
                let fiText = getActionTypeDisplay(fiActionType);

                if (fiActionType === 'speak' && fiContent) {
                    fiText = `"${escapeHtml(fiContent)}"`;
                } else if (fiActionType === 'whisper' && fiContent) {
                    const targetId = fiData.target_agent_id;
                    const targetLabel = (targetId && allAgentsMap[targetId]) ? allAgentsMap[targetId].name : (targetId ? targetId.substring(0, 8) : null);
                    fiText = targetLabel
                        ? `向 ${escapeHtml(targetLabel)} 密语: "${escapeHtml(fiContent)}"`
                        : `密语: "${escapeHtml(fiContent)}"`;
                } else if (fiActionType === 'shout' && fiContent) {
                    fiText = `大喊: "${escapeHtml(fiContent)}"`;
                }

                html += `<div class="exp-meta-text">${escapeHtml(fiText)}</div>`;

                // 动作参数（非聊天内容）pretty-print
                const dataKeys = Object.keys(fiData).filter(k => k !== 'content' && k !== 'target_agent_id');
                if (dataKeys.length > 0) {
                    const prettyData = {};
                    dataKeys.forEach(k => prettyData[k] = fiData[k]);
                    html += `<div class="exp-meta-text" style="color:var(--text-subtle);font-size:11px;">${escapeHtml(JSON.stringify(prettyData, null, 2))}</div>`;
                }
            });
            return html || '-';
        }

        function updatePagination() {
            const totalPages = Math.ceil(total / pageSize);
            const pageInfo = document.getElementById('page-info');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const paginationContainer = document.getElementById('pagination-container');

            if (total === 0) {
                paginationContainer.style.display = 'none';
                return;
            }

            paginationContainer.style.display = 'flex';
            pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页，共 ${total} 条`;
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;

            // 设置当前页大小
            document.getElementById('page-size').value = pageSize;
        }

        function changePage(delta) {
            currentPage += delta;
            currentPage = Math.max(1, currentPage);
            loadExperiences();
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById('page-size').value);
            currentPage = 1;
            loadExperiences();
        }

        function resetFilters() {
            document.getElementById('filter-agent').value = '';
            document.getElementById('filter-location').value = '';
            document.getElementById('filter-action').value = '';
            document.getElementById('filter-from-tick').value = '';
            document.getElementById('filter-to-tick').value = '';
            currentPage = 1;
            loadExperiences();
        }

        // 初始化：加载过滤器选项
        async function initFilters() {
            try {
                // 加载 agent 列表
                const agentsRes = await apiFetch(API.BASE + "/agents");
                if (agentsRes.ok) {
                    const agents = await agentsRes.json();
                    const agentSelect = document.getElementById('filter-agent');
                    
                    allAgentsMap = {};
                    agents.forEach(agent => {
                        // 注入全局 O(1) map 以供私语和展示查找
                        allAgentsMap[agent.id] = agent;
                        if (agent.agent_id) allAgentsMap[agent.agent_id] = agent;

                        const option = document.createElement('option');
                        option.value = agent.id;
                        option.textContent = agent.name;
                        agentSelect.appendChild(option);
                    });
                }

                // 加载 action type 映射
                const actionMapRes = await apiFetch(API.BASE + "/actions-map");
                if (actionMapRes.ok) {
                    const actionMap = await actionMapRes.json();
                    const actionSelect = document.getElementById('filter-action');
                    Object.entries(actionMap).forEach(([key, value]) => {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = value;
                        actionSelect.appendChild(option);
                    });
                }
            } catch (e) {
                if (e.name !== "ApiError") {
                    console.warn('加载过滤器选项失败:', e);
                }
            }
        }

        // 页面加载时初始化
        initFilters().then(() => {
            if (Object.keys(locationNames).length === 0) {
                initLocationMapping();
            }
            if (Object.keys(attributeMeta).length === 0) {
                initAttributeMeta();
            }
            if (Object.keys(actionTypeMap).length === 0) {
                loadActionTypeMap().then(() => loadExperiences());
            } else {
                loadExperiences();
            }
        });
    </script>
</body>
</html>
