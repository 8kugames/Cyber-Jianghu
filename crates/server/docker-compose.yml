# ============================================================================
# Cyber-Jianghu Server Docker Compose (Development)
# 服务端开发环境配置
# ============================================================================
#
# 使用方式：
# 1. 复制 .env.example 为 .env 并修改配置
# 2. 启动服务：docker compose up -d
# 3. 查看日志：docker compose logs -f server
# 4. 停止服务：docker compose down
# ============================================================================

services:
  # ============================================================================
  # PostgreSQL 数据库
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: cyber-jianghu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cyber_jianghu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 挂载迁移文件（按文件名排序执行）
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-jianghu-network

  # ============================================================================
  # Rust 服务端
  # ============================================================================
  server:
    build:
      context: ../..
      dockerfile: ./crates/server/Dockerfile
    container_name: cyber-jianghu-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 服务端配置
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 23333

      # Tick 引擎配置
      TICK_DURATION_SECS: ${TICK_DURATION_SECS:-60}

      # 管理后台访问凭证
      ADMIN_READ_TOKEN: ${ADMIN_READ_TOKEN:-}
      ADMIN_WRITE_TOKEN: ${ADMIN_WRITE_TOKEN:-}

      # 数据库配置
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-changeme}@postgres:5432/cyber_jianghu

      # 日志级别
      RUST_LOG: ${RUST_LOG:-info}

      # 环境标识
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${SERVER_PORT:-23333}:23333"
    volumes:
      # 配置文件挂载（数据驱动架构）
      # 如果 ./config 目录为空，entrypoint 会自动填充默认配置
      - ./config:/app/config
      # 日志持久化
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cyber-jianghu-network

# ============================================================================
# 网络配置
# ============================================================================
networks:
  cyber-jianghu-network:
    external: true

# ============================================================================
# 数据卷配置
# ============================================================================
volumes:
  postgres_data:
    name: cyber-jianghu-postgres-data
