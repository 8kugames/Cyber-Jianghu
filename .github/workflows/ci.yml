# Cyber-Jianghu CI/CD
# 流程: version-bump -> build -> docker-build -> release (tag only)
# 触发: PR合并 | v* tag | 手动触发

name: CI

on:
  pull_request:
    types: [closed]
    branches: [main, master]
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_version_bump:
        description: "跳过版本更新"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================================================
  # Job 1: 版本自动更新
  # ==========================================================================
  version-bump:
    name: Version Bump
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_version_bump != true) ||
      startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed_crates: ${{ steps.detect.outputs.changed_crates }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
      update_info: ${{ steps.bump.outputs.update_info }}
      new_commit_sha: ${{ steps.commit.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect changed crates
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            BASE_SHA=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "HEAD~1")
            HEAD_SHA="HEAD"
          else
            BASE_SHA="HEAD~1"
            HEAD_SHA="HEAD"
          fi

          CHANGED_CRATES=""
          for crate in server protocol; do
            if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q "^crates/$crate/"; then
              CHANGED_CRATES="$CHANGED_CRATES $crate"
              echo "✓ 检测到 $crate 变更"
            fi
          done

          echo "changed_crates=$CHANGED_CRATES" >> $GITHUB_OUTPUT
          echo "has_changes=$([ -n "$CHANGED_CRATES" ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Bump versions
        id: bump
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          UPDATE_INFO=""
          for crate in ${{ steps.detect.outputs.changed_crates }}; do
            CARGO_FILE="crates/$crate/Cargo.toml"
            CURRENT=$(grep -E '^version[[:space:]]*=' "$CARGO_FILE" | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
            sed -i "s/^version[[:space:]]*=.*$/version = \"$NEW\"/" "$CARGO_FILE"
            UPDATE_INFO="${UPDATE_INFO}${crate}: ${CURRENT} → ${NEW}\n"
            echo "✓ $crate: $CURRENT -> $NEW"
          done
          echo "update_info<<EOF" >> $GITHUB_OUTPUT
          echo -e "$UPDATE_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Cargo.lock
        if: steps.detect.outputs.has_changes == 'true'
        run: cargo update --workspace

      - name: Commit version bump
        id: commit
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore: auto bump version [skip ci]"$'\n\n'"${{ steps.bump.outputs.update_info }}"
          git push origin HEAD:main
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          if [ "${{ steps.detect.outputs.has_changes }}" = "true" ]; then
            echo "## 版本更新完成"$'\n'"${{ steps.bump.outputs.update_info }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 无 crate 变更" >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================================================
  # Job 2: 跨平台构建 (5 targets)
  # Linux x86_64/arm64 (musl): cross 交叉编译
  # macOS x86_64/arm64: 原生构建
  # Windows x86_64: 原生构建
  # ==========================================================================
  build:
    name: Build ${{ matrix.platform }}
    needs: version-bump
    if: |
      always() &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped') &&
      ((github.event_name == 'pull_request' && github.event.pull_request.merged == true) || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-musl
            use_cross: true
            artifact_server: cyber-jianghu-server-linux-x86_64
            artifact_client: cyber-jianghu-agent-linux-x86_64
            bin_server: cyber-jianghu-server
            bin_client: cyber-jianghu-agent
          - os: ubuntu-latest
            platform: linux-arm64
            target: aarch64-unknown-linux-musl
            use_cross: true
            artifact_server: cyber-jianghu-server-linux-arm64
            artifact_client: cyber-jianghu-agent-linux-arm64
            bin_server: cyber-jianghu-server
            bin_client: cyber-jianghu-agent
          - os: macos-15
            platform: macos-x86_64
            target: x86_64-apple-darwin
            use_cross: false
            artifact_server: cyber-jianghu-server-macos-x86_64
            artifact_client: cyber-jianghu-agent-macos-x86_64
            bin_server: cyber-jianghu-server
            bin_client: cyber-jianghu-agent
          - os: macos-latest
            platform: macos-arm64
            target: aarch64-apple-darwin
            use_cross: false
            artifact_server: cyber-jianghu-server-macos-arm64
            artifact_client: cyber-jianghu-agent-macos-arm64
            bin_server: cyber-jianghu-server
            bin_client: cyber-jianghu-agent
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            use_cross: false
            artifact_server: cyber-jianghu-server-windows-x86_64.exe
            artifact_client: cyber-jianghu-agent-windows-x86_64.exe
            bin_server: cyber-jianghu-server.exe
            bin_client: cyber-jianghu-agent.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_commit_sha || 'main' }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Configure Cross.toml
        if: matrix.use_cross
        run: |
          cat > Cross.toml << 'EOF'
          [target.x86_64-unknown-linux-musl]
          pre-build = ["apt-get update && apt-get install -y libpq-dev pkg-config"]

          [target.aarch64-unknown-linux-musl]
          pre-build = ["apt-get update && apt-get install -y libpq-dev pkg-config"]
          EOF

      - name: Install native deps (Linux)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: sudo apt-get install -y libssl-dev libpq-dev pkg-config

      - name: Install native deps (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl libpq

      - name: Build (cross)
        if: matrix.use_cross
        run: |
          cross build --release --target ${{ matrix.target }} -p cyber-jianghu-server
          cross build --release --target ${{ matrix.target }} -p cyber-jianghu-agent

      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: |
          cargo build --release --target ${{ matrix.target }} -p cyber-jianghu-server
          cargo build --release --target ${{ matrix.target }} -p cyber-jianghu-agent

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.bin_server }} artifacts/${{ matrix.artifact_server }}
          cp target/${{ matrix.target }}/release/${{ matrix.bin_client }} artifacts/${{ matrix.artifact_client }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_server }}
          path: artifacts/${{ matrix.artifact_server }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_client }}
          path: artifacts/${{ matrix.artifact_client }}

      - name: Summary
        run: |
          echo "## ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target**: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          grep "^version" crates/*/Cargo.toml >> $GITHUB_STEP_SUMMARY || true

  # ==========================================================================
  # Job 3: Docker 镜像
  # ==========================================================================
  docker-build:
    name: Docker Image
    needs: [version-bump, build]
    if: |
      always() && needs.build.result == 'success' &&
      ((github.event_name == 'pull_request' && github.event.pull_request.merged == true) || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_commit_sha || 'main' }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./crates/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker 镜像" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Job 4: GitHub Release (tag only)
  # ==========================================================================
  release:
    name: GitHub Release
    needs: [build, docker-build]
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Summary
        run: |
          echo "## Release: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
